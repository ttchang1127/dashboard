<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航空城遷移項目儀表板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei',Arial,sans-serif;background:#f0f2f5;color:#333;font-size:13px;}
header{background:linear-gradient(135deg,#1a3a6c,#2b5ba8);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;}
header h1{font-size:18px;font-weight:700;}
header .subtitle{font-size:12px;opacity:.8;}
.stats-bar{display:flex;gap:12px;background:#fff;padding:8px 20px;border-bottom:2px solid #e0e6f0;flex-wrap:wrap;align-items:center;}
.stat-item{display:flex;align-items:center;gap:6px;padding:4px 12px;background:#f0f4ff;border-radius:20px;}
.stat-label{color:#666;font-size:11px;}
.stat-val{font-weight:700;color:#1a3a6c;font-size:14px;}
.main{display:flex;height:calc(100vh - 100px);}
.left-panel{width:400px;min-width:240px;background:#fff;border-right:2px solid #e0e6f0;display:flex;flex-direction:column;overflow:hidden;}
.map-header{padding:8px 12px;background:#1a3a6c;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.map-container{flex:1;overflow:auto;position:relative;background:#e8eaf0;cursor:zoom-in;}
.map-container img{width:100%;display:block;}
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.filter-bar{background:#fff;padding:10px 16px;border-bottom:2px solid #e0e6f0;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:3px;}
.filter-group label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
select,input{height:30px;padding:0 8px;border:1px solid #c8d0e0;border-radius:4px;font-size:12px;font-family:inherit;background:#fafbff;color:#333;outline:none;}
select:focus,input:focus{border-color:#2b5ba8;box-shadow:0 0 0 2px rgba(43,91,168,.15);}
select{min-width:110px;max-width:180px;}
input{min-width:160px;}
.btn{height:30px;padding:0 14px;border:none;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;}
.btn-reset{background:#e8eaed;color:#666;}
.btn-export{background:#1a6c3a;color:#fff;}
.btn-export:hover{background:#145530;}
.btn-reset:hover{background:#d0d3d8;}
.table-container{flex:1;overflow:auto;}
.result-info{padding:6px 16px;background:#f8f9fc;border-bottom:1px solid #e0e6f0;font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:center;}
.result-info span{color:#1a3a6c;font-weight:600;}
table{width:100%;border-collapse:collapse;}
thead th{position:sticky;top:0;background:#1a3a6c;color:#fff;padding:7px 10px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;z-index:2;}
tbody tr:nth-child(even){background:#f8f9fc;}
tbody tr:hover{background:#e8f0ff;}
td{padding:6px 10px;border-bottom:1px solid #edf0f5;font-size:12px;vertical-align:top;}
.id-col{font-family:monospace;color:#2b5ba8;font-weight:600;white-space:nowrap;}
.parcel-col{font-weight:700;color:#1a3a6c;white-space:nowrap;}
.item-col{color:#c0392b;font-weight:600;}
.land-col{color:#555;font-size:11px;}
.date-col{white-space:nowrap;color:#777;font-size:11px;}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.badge-migrate{background:#fff3cd;color:#856404;border:1px solid #ffd966;}
.badge-ramp{background:#d1ecf1;color:#0c5460;border:1px solid #9dd9e5;}
.badge-zhuer{background:#d4edda;color:#155724;border:1px solid #9dd8a9;}
.badge-yigong{background:#e2d9f3;color:#4a1d96;border:1px solid #c5b0e8;}
.no-result{text-align:center;padding:40px;color:#aaa;font-size:14px;}
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;}
#modal.active{display:flex;}
.modal-box{background:#fff;border-radius:8px;padding:24px;max-width:640px;width:94%;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-title{font-size:15px;font-weight:700;color:#1a3a6c;margin-bottom:14px;border-bottom:2px solid #e0e6f0;padding-bottom:8px;padding-right:30px;}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#666;line-height:1;margin-top:-2px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
.modal-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0;}
.modal-label{min-width:110px;font-size:11px;color:#888;font-weight:600;}
.modal-value{font-size:12px;color:#333;flex:1;word-break:break-all;}
.zoom-hint{font-size:10px;opacity:.7;margin-left:auto;}
.resize-handle{width:5px;cursor:col-resize;background:#e0e6f0;flex-shrink:0;}
.resize-handle:hover{background:#2b5ba8;}
.badge-taipower{background:#fff3cd;color:#856404;border:1px solid #ffd966;}
.badge-telecom{background:#d1ecf1;color:#0c5460;border:1px solid #9dd9e5;}
.badge-water{background:#cce5ff;color:#004085;border:1px solid #74ade5;}
.badge-sewer{background:#d4edda;color:#155724;border:1px solid #9dd8a9;}
.badge-traffic{background:#e2d9f3;color:#4a1d96;border:1px solid #c5b0e8;}
.badge-landscape{background:#ffeeba;color:#5d4e00;border:1px solid #f0c040;}
.tab-bar{display:flex;background:#1a3a6c;flex-shrink:0;border-bottom:2px solid #0f2347;}
.tab-btn{flex:1;padding:8px 6px;border:none;border-bottom:3px solid transparent;background:transparent;color:rgba(255,255,255,.55);font-size:12px;font-family:inherit;cursor:pointer;font-weight:600;transition:.15s;letter-spacing:.3px;}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.1);}
.tab-btn.tab-active{color:#fff;background:rgba(255,255,255,.15);border-bottom-color:#7eb8ff;}
.tab-pane{flex:1;display:none;flex-direction:column;overflow:hidden;}
.tab-pane.pane-active{display:flex;}
.sp-hdr .sp-info{font-size:10px;opacity:.75;margin-left:auto;}
.sp-body{flex:1;overflow:auto;}
.sp-tbl{width:100%;border-collapse:collapse;min-width:430px;}
.sp-tbl th{position:sticky;top:0;background:#34495e;color:#fff;padding:3px 5px;font-size:10px;white-space:nowrap;z-index:1;text-align:center;}
.sp-tbl th.lth{text-align:left;}
.sp-tbl td{padding:1px 4px;border-bottom:1px solid #f0f0f0;font-size:10px;vertical-align:middle;}
.sp-tbl .grp-hd td{background:#e8edf5;font-weight:700;color:#1a3a6c;font-size:10px;padding:3px 6px;}
.sp-tbl .sub-row td{background:#f5f7fa;color:#555;font-size:10px;}
.sp-tbl .ttl-row td{background:#1a3a6c;color:#fff;font-weight:700;font-size:10px;}
.sp-tbl tr.pr:hover{background:#e8f0ff;cursor:pointer;}
.sp-tbl tr.pr.sel{background:#c8dcff;}
.cn{text-align:right;padding:2px 6px;}
.cn0{color:#ddd;text-align:center;}
.cb-cell{width:18px;text-align:center;}
.stat-sep{width:1px;height:22px;background:#d0d8e8;align-self:center;flex-shrink:0;}
.stat-cat{cursor:default;}
.stat-cat .stat-label{font-size:10px;}
.stat-cat .stat-val{font-size:13px;}
.pf-body{flex:1;overflow-y:auto;padding:0;background:#fff;}
.pf-tree{padding:4px 2px 8px;}
.pf-item{display:flex;align-items:center;gap:3px;padding:2px 3px;cursor:pointer;user-select:none;border-radius:3px;}
.pf-item:hover{background:#e8f0ff;}
.pf-item.pf-sel{background:#d4e6ff;}
.pf-item.pf-all{background:#eef2fa;border-bottom:2px solid #d0d8e8;padding:5px 10px;width:100%;box-sizing:border-box;flex-shrink:0;}
.pf-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#2b5ba8;flex-shrink:0;}
.pf-item label{font-size:12px;cursor:pointer;color:#333;line-height:1.4;font-weight:500;}
.pf-item.pf-sel label{color:#2b5ba8;font-weight:700;}
.pf-item.pf-all label{font-size:13px;font-weight:700;color:#1a3a6c;}
.pf-group{margin-bottom:2px;width:100%;}
.pf-grp-hdr{display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;background:#eef2fa;border-radius:4px;border:1px solid #d8e4f5;user-select:none;}
.pf-grp-hdr:hover{background:#dce8f8;}
.pf-grp-hdr.grp-sel{background:#d4e6ff;border-color:#7eb8ff;}
.pf-arrow{font-size:9px;color:#555;width:10px;text-align:center;flex-shrink:0;transition:transform .15s;display:inline-block;}
.pf-arrow.open{transform:rotate(90deg);}
.pf-grp-hdr label{cursor:pointer;font-size:13px;font-weight:700;color:#1a3a6c;}
.grp-cnt{font-size:10px;color:#888;font-weight:400;margin-left:2px;}
.pf-grp-body{padding-left:14px;margin-top:1px;}
.pf-tree>.pf-item{width:100%;box-sizing:border-box;}
.pf-tree>.pf-item label{font-size:12px;flex:1;min-width:0;}
.pf-child-grid{display:block;}
.pf-child-grid .pf-item label{font-size:12px;flex:1;min-width:0;}
</style>
</head>

function getCat(item){
  const t=(item||'').replace(/\s/g,'');
  for(const c of CATS){ for(const k of c.kw){ if(t.includes(k)) return c; } }
  return CATS[5];
}
let selectedParcels=new Set();
function toggleParcel(p){
  if(selectedParcels.has(p)) selectedParcels.delete(p); else selectedParcels.add(p);
  applyFilters();
}
let allParcels=[];
let _prevParcelKey='';
function buildParcelFilter(src){
  const _newP=[...new Set(src.map(d=>d.parcel_no.trim()))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  [...selectedParcels].forEach(p=>{ if(!_newP.includes(p)) selectedParcels.delete(p); });
  const _newKey=_newP.join(',');
  if(_newKey===_prevParcelKey){ allParcels=_newP; return; }
  _prevParcelKey=_newKey;
  allParcels=_newP;
  // Build parent→children map  (e.g. R2→[R2-1,R2-2...])
  const childMap=new Map(); const childSet=new Set();
  for(const p of allParcels){
    const m=p.match(/^([A-Za-z]+\d+)-(\d+)$/);
    if(m){
      const par=m[1];
      if(!childMap.has(par)) childMap.set(par,[]);
      childMap.get(par).push(p);
      childSet.add(p);
    }
  }
  document.getElementById('pfAllBar').innerHTML='<div class="pf-item pf-all" onclick="toggleAllParcels()">'
    +'<input type="checkbox" id="pfAllCb" onclick="event.stopPropagation();toggleAllParcels()">'
    +'<label for="pfAllCb">全選 / 全不選</label></div>';
  let h='<div class="pf-tree">';
  const rendered=new Set();
  function grpHtml(gname,cList){
    const cItems=cList.map(c=>
      `<div class="pf-item" onclick="toggleParcel('${c}')">`
      +`<input type="checkbox" data-p="${c}" onclick="event.stopPropagation();toggleParcel('${c}')">`
      +`<label>${c}</label></div>`
    ).join('');
    return `<div class="pf-group" id="grp-${gname}">`
      +`<div class="pf-grp-hdr" onclick="toggleGroup('${gname}')">`
      +`<span class="pf-arrow" id="arr-${gname}">&#9654;</span>`
      +`<input type="checkbox" data-group="${gname}" id="gpcb-${gname}" onclick="event.stopPropagation();toggleGroupCheck('${gname}')">`
      +`<label onclick="event.stopPropagation();toggleGroupCheck('${gname}')">${gname}<span class="grp-cnt">(${cList.length})</span></label>`
      +`</div>`
      +`<div class="pf-grp-body" id="grpb-${gname}" style="display:none">`
      +`<div class="pf-child-grid">${cItems}</div></div></div>`;
  }
  for(const p of allParcels){
    if(childSet.has(p)) continue;
    rendered.add(p);
    if(childMap.has(p)){
      h+=grpHtml(p,childMap.get(p));
    } else {
      const _lbl=p||'坵塊空白';
      h+=`<div class="pf-item" onclick="toggleParcel('${p}')">`
        +`<input type="checkbox" data-p="${p}" onclick="event.stopPropagation();toggleParcel('${p}')">`
        +`<label>${_lbl}</label></div>`;
    }
  }
  // Virtual groups (prefix not itself a parcel)
  for(const [gname,cList] of [...childMap.entries()].sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}))){
    if(rendered.has(gname)) continue;
    h+=grpHtml(gname,cList);
  }
  h+='</div>';
  const _open=new Set([...document.querySelectorAll('#pfBody .pf-grp-body')].filter(el=>el.style.display!=='none').map(el=>el.id.replace('grpb-','')));
  document.getElementById('pfBody').innerHTML=h;
  _open.forEach(g=>{
    const b=document.getElementById('grpb-'+g),a=document.getElementById('arr-'+g);
    if(b) b.style.display='block';
    if(a) a.classList.add('open');
  });
}
function updateParcelFilter(){
  document.querySelectorAll('#pfBody input[data-p]').forEach(cb=>{
    const p=cb.dataset.p;
    const sel=selectedParcels.has(p);
    cb.checked=sel;
    cb.closest('.pf-item').classList.toggle('pf-sel',sel);
  });
  const allCb=document.getElementById('pfAllCb');
  if(allCb){
    allCb.indeterminate=selectedParcels.size>0&&selectedParcels.size<allParcels.length;
    allCb.checked=allParcels.length>0&&selectedParcels.size===allParcels.length;
  }
  const scPar=document.getElementById('sc-parcel');
  if(scPar){
    scPar.style.display=selectedParcels.size>0?'':'none';
    document.getElementById('cn-parcel').textContent=selectedParcels.size;
    document.getElementById('spInfo').textContent=selectedParcels.size?`已選 ${selectedParcels.size} 坵塊`:'';
  }
  // Sync group checkboxes
  document.querySelectorAll('#pfBody input[data-group]').forEach(gcb=>{
    const g=gcb.dataset.group;
    const kids=[...document.querySelectorAll(`#grpb-${g} input[data-p]`)].map(x=>x.dataset.p);
    const n=kids.filter(c=>selectedParcels.has(c)).length;
    gcb.checked=n===kids.length&&kids.length>0;
    gcb.indeterminate=n>0&&n<kids.length;
    const hdr=document.querySelector(`#grp-${g} .pf-grp-hdr`);
    if(hdr) hdr.classList.toggle('grp-sel',n>0);
  });
  const fpEl=document.getElementById('filterParcel');
  if(fpEl) fpEl.value=selectedParcels.size===1?[...selectedParcels][0]:'';
}
function toggleAllParcels(){
  if(selectedParcels.size===allParcels.length) selectedParcels.clear();
  else allParcels.forEach(p=>selectedParcels.add(p));
  applyFilters();
}
function toggleGroup(g){
  const body=document.getElementById('grpb-'+g);
  const arr=document.getElementById('arr-'+g);
  if(!body||!arr) return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  arr.classList.toggle('open',open);
}
function toggleGroupCheck(g){
  const kids=[...document.querySelectorAll(`#grpb-${g} input[data-p]`)].map(x=>x.dataset.p);
  const allChk=kids.every(c=>selectedParcels.has(c));
  if(allChk) kids.forEach(c=>selectedParcels.delete(c));
  else kids.forEach(c=>selectedParcels.add(c));
  applyFilters();
}
function onParcelSelect(val){
  selectedParcels.clear();
  if(val) selectedParcels.add(val);
  applyFilters();
}
function updateCatStats(){
  const catC=[0,0,0,0,0,0];
  for(const d of filtered){ catC[CATS.findIndex(c=>c.id===getCat(d.migrate_item).id)]++; }
  catC.forEach((n,i)=>{ const el=document.getElementById('cn-'+i); if(el) el.textContent=n; });
}

function switchTab(name){
  const names=['filter','map'];
  names.forEach(n=>{
    const btn=document.getElementById('tabBtn'+n[0].toUpperCase()+n.slice(1));
    const pane=document.getElementById('tab'+n[0].toUpperCase()+n.slice(1));
    const on=(n===name);
    if(btn){ btn.classList.toggle('tab-active',on); }
    if(pane){ pane.classList.toggle('pane-active',on); }
  });
}


function exportToExcel(){
  try{
    if(!filtered.length){ alert('目前篩選結果為空，無資料可匯出'); return; }
    const hdrs=['流水編','坵塊','安置街廓','建築地號','遷移項目','分類','申請人','申請日期','來源','廠商','會勘結論'];
    const rows=filtered.map(d=>{
      const item1=(d.migrate_item||'').split('\n')[0].trim();
      return [
        d.id, d.parcel_no.trim()||'坵塊空白', d.block_no||'',
        (d.land_no||'').replace(/\n/g,' '),
        item1, getCat(item1).label,
        d.applicant||d.owner||'', d.date||'',
        d.source||'', d.contractor||'', d.survey_result||''
      ];
    });
    const csv='﻿'+[hdrs,...rows]
      .map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(','))
      .join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='航空城遷移項目_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){ alert('匯出失敗: '+e.message); }
}
function init(){
  document.getElementById('statTotal').textContent = DATA.length;
  document.getElementById('statMigrate').textContent = DATA.filter(d=>d.type==='migrate').length;
  document.getElementById('statRamp').textContent = DATA.filter(d=>d.type==='ramp').length;
  document.getElementById('statZhu').textContent = DATA.filter(d=>d.source==='住二').length;
  document.getElementById('statYi').textContent = DATA.filter(d=>d.source==='乙工').length;
  document.getElementById('totalCount').textContent = DATA.length;
  applyFilters();
  initResize();
}

function applyFilters(){
  const source = document.getElementById('filterSource').value;
  const contractor = document.getElementById('filterContractor').value;
  const item = document.getElementById('filterItem').value;
  const text = document.getElementById('filterText').value.trim().toLowerCase();

  // Pre-filter (parcel handled by selectedParcels)
  const preFiltered = DATA.filter(d => {
    if(source && d.source.trim() !== source) return false;
    if(contractor && d.contractor.trim() !== contractor) return false;
    if(item && !d.migrate_item.split('\n')[0].trim().includes(item)) return false;
    if(text){
      const s = text;
      if(!d.land_no.toLowerCase().includes(s) &&
         !d.applicant.toLowerCase().includes(s) &&
         !(d.owner||'').toLowerCase().includes(s) &&
         !d.id.toLowerCase().includes(s) &&
         !d.block_no.toLowerCase().includes(s)) return false;
    }
    return true;
  });

  buildParcelFilter(preFiltered);
  filtered = selectedParcels.size > 0
    ? preFiltered.filter(d => selectedParcels.has(d.parcel_no.trim()))
    : preFiltered;

  document.getElementById('statFiltered').textContent = filtered.length;
  document.getElementById('resultCount').textContent = filtered.length;
  renderTable();
  updateCatStats();
  updateParcelFilter();
}

function resetFilters(){
  selectedParcels.clear();
  document.getElementById('filterParcel').value='';
  document.getElementById('filterSource').value='';
  document.getElementById('filterContractor').value='';
  document.getElementById('filterItem').value='';
  document.getElementById('filterText').value='';
  applyFilters();
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="11" class="no-result">⚠ 無符合條件的資料</td></tr>';
    return;
  }
  const limit = Math.min(filtered.length, 600);
  let html = '';
  for(let i=0;i<limit;i++){
    const d = filtered[i];
    const srcBadge = d.source==='住二' ?
      '<span class="badge badge-zhuer">住二</span>' :
      '<span class="badge badge-yigong">乙工</span>';
    const typeBadge = d.type==='migrate' ?
      '<span class="badge badge-migrate">遷移</span>' :
      '<span class="badge badge-ramp">斜坡</span>';
    const item1 = (d.migrate_item||'').split('\n')[0].trim();
    const cat = getCat(item1);
    const catBadge = `<span class="badge ${cat.badge}" title="${cat.label}">${cat.label}</span>`;
    const result = d.survey_result ?
      `<span style="color:#155724;font-weight:600;font-size:11px">${d.survey_result.substring(0,25)}</span>` :
      '<span style="color:#ccc">—</span>';
    html += `<tr onclick="showDetail(${i})" style="cursor:pointer">
      <td class="id-col">${d.id}</td>
      <td class="parcel-col">${d.parcel_no.trim()||'坵塊空白'}</td>
      <td style="font-size:11px;color:#555;max-width:130px;word-break:break-all">${d.block_no}</td>
      <td class="land-col">${d.land_no.replace(/\n/g,'<br>')}</td>
      <td class="item-col">${item1}</td>
      <td>${catBadge}</td>
      <td>${d.applicant||d.owner||'—'}</td>
      <td class="date-col">${d.date}</td>
      <td>${srcBadge}</td>
      <td style="font-size:11px;color:#555">${d.contractor}</td>
      <td>${result}</td>
    </tr>`;
  }
  if(filtered.length > 600){
    html += `<tr><td colspan="10" style="text-align:center;padding:12px;color:#888;font-size:12px;background:#fffbea">
      ⚠ 共 ${filtered.length} 筆，僅顯示前 600 筆，請使用篩選縮小範圍</td></tr>`;
  }
  tbody.innerHTML = html;
}

function showDetail(idx){
  const d = filtered[idx];
  document.getElementById('modalTitle').textContent = `${d.id}　　${d.parcel_no.trim()||'坵塊空白'}　　${(d.migrate_item||'').split('\n')[0]}`;
  const fields = [
    ['流水編', d.id],
    ['原流水編', d.orig_id],
    ['來源', d.source],
    ['申請日期', d.date],
    ['建築地號', d.land_no],
    ['安置街廓編號', d.block_no],
    ['施工分標廠商', d.contractor],
    ['坵塊編號', d.parcel_no.trim()||'坵塊空白'],
    ['坵塊所有權人', d.owner||'—'],
    ['申請人', d.applicant||'—'],
    ['遷移樣態', d.migrate_type||'—'],
    ['遷移項目', d.migrate_item||'—'],
    ['訴求', d.demand||'—'],
    ['民眾土地範圍', d.land_range||'—'],
    ['設施位置', d.facility_loc||'—'],
    ['民眾希望解法', d.desired_solution||'—'],
    ['工務所函覆', d.reply_doc||'—'],
    ['會勘日期', d.survey_date||'—'],
    ['會勘結論', d.survey_result||'—'],
    ['備註', d.remark||'—'],
  ];
  let html = '';
  for(const [label,val] of fields){
    const vStr = String(val).replace(/\n/g,'<br>');
    html += `<div class="modal-row"><div class="modal-label">${label}</div><div class="modal-value">${vStr}</div></div>`;
  }
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

// Image zoom
let zoomed = false;
let zoomPos = {x:0,y:0};
function toggleZoom(el){
  const img = el.querySelector('img');
  if(!zoomed){
    img.style.width = '200%';
    img.style.cursor = 'zoom-out';
    el.style.overflow = 'scroll';
    zoomed = true;
  } else {
    img.style.width = '100%';
    img.style.cursor = 'zoom-in';
    el.style.overflow = 'auto';
    zoomed = false;
  }
}

// Resize panel
function initResize(){
  const handle = document.getElementById('resizeHandle');
  const leftPanel = document.getElementById('leftPanel');
  let isResizing = false;
  handle.addEventListener('mousedown', e=>{
    isResizing = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e=>{
    if(!isResizing) return;
    const mainRect = document.querySelector('.main').getBoundingClientRect();
    const newWidth = e.clientX - mainRect.left;
    if(newWidth > 180 && newWidth < mainRect.width - 360){
      leftPanel.style.width = newWidth + 'px';
      leftPanel.style.minWidth = newWidth + 'px';
    }
  });
  document.addEventListener('mouseup', ()=>{
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

init();
</script>

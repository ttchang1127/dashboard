<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辦公室專案與人員儀表板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
:root{--bg:#f0f2f5;--card:#fff;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;--radius:14px;--hh:92px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.hd{background:linear-gradient(135deg,#1e40af,#3b82f6 55%,#06b6d4);color:#fff;padding:16px 28px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(37,99,235,.3);}
.hd-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.hd h1{font-size:20px;font-weight:900;letter-spacing:.5px;display:flex;align-items:center;gap:8px;flex:1;}
.hd .sub{font-size:11px;opacity:.8;}
.stats-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.stat-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:5px 14px;border-radius:50px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;transition:.2s;}
.stat-pill.clickable{cursor:pointer;border-color:rgba(255,255,255,.45);}
.stat-pill.clickable:hover{background:rgba(255,255,255,.3);transform:translateY(-1px);}
.stat-pill .n{font-weight:700;font-size:15px;}
.chart-hint{font-size:10px;opacity:.65;margin-left:2px;}

/* ── CHART PANEL ── */
.chart-panel{background:var(--card);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),padding .3s;}
.chart-panel.open{max-height:380px;padding:16px 28px;}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.chart-tab{padding:4px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-light);transition:.15s;}
.chart-tab.active{color:#2563eb;border-bottom:2px solid #2563eb;margin-bottom:-10px;}
.chart-pane{display:none;}
.chart-pane.active{display:block;}
.profit-chart{display:flex;align-items:flex-end;height:190px;justify-content:space-around;padding:0 8px;}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;max-width:110px;}
.bar-wrap{width:48px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:155px;position:relative;}
.bar{width:100%;border-radius:7px 7px 3px 3px;position:relative;transition:.3s;cursor:pointer;min-height:4px;}
.bar:hover{filter:brightness(1.12);transform:scaleY(1.04);transform-origin:bottom;}
.bar-lbl{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap;}
.bar-name{margin-top:6px;font-size:12px;font-weight:600;text-align:center;}
.bar-cnt{font-size:10px;color:var(--text-light);margin-top:1px;}
@keyframes growUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.bar{animation:growUp .7s cubic-bezier(.4,0,.2,1) both;transform-origin:bottom;}
#chartJsWrap{height:220px;}
.chartjs-legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;}
.cleg{display:flex;align-items:center;gap:5px;}
.cleg-dot{width:12px;height:12px;border-radius:3px;}

/* ── MAIN LAYOUT ── */
.save-bar{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;}
.save-bar .st{font-size:11px;color:var(--text-light);flex:1;}
.btn-save{padding:4px 12px;border-radius:6px;font-size:11px;font-family:inherit;font-weight:700;background:#2563eb;color:#fff;border:none;cursor:pointer;transition:.15s;}
.btn-save:hover{background:#1d4ed8;}
.btn-load{padding:4px 12px;border-radius:6px;font-size:11px;font-family:inherit;background:#f1f5f9;color:#475569;border:1px solid var(--border);cursor:pointer;}
.btn-load:hover{background:var(--border);}
.sdot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0;}
.sdot.saved{background:#10b981;}
.main-wrap{display:grid;grid-template-columns:38fr 32fr 30fr;gap:10px;padding:10px 14px 0;height:calc(100vh - var(--hh));overflow:hidden;}
.col{display:flex;flex-direction:column;gap:9px;height:100%;overflow-y:auto;overflow-x:hidden;padding-bottom:20px;}
.col::-webkit-scrollbar{width:4px;}
.col::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.col::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
.col-title{font-size:12px;font-weight:700;color:var(--text-light);padding:4px 2px 2px;display:flex;align-items:center;gap:5px;letter-spacing:.3px;flex-shrink:0;}

/* ── GRAPH ── */
.graph-section{background:#0d1117;border-radius:var(--radius);box-shadow:0 0 0 1px #30363d,0 8px 28px rgba(0,0,0,.4);overflow:hidden;flex-shrink:0;}
.graph-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 0;position:relative;z-index:1;}
.gtitle{font-size:13px;font-weight:700;color:#e6edf3;display:flex;align-items:center;gap:6px;}
.gtitle small{font-size:10px;font-weight:400;color:#8b949e;}
.gctrl{display:flex;gap:4px;}
.gbtn{padding:3px 9px;border-radius:5px;font-size:11px;font-family:inherit;background:#21262d;border:1px solid #30363d;color:#8b949e;cursor:pointer;transition:.15s;}
.gbtn:hover{background:#30363d;color:#e6edf3;}
.gbtn.active{background:#2563eb22;border-color:#2563eb88;color:#60a5fa;}
.g-leg-row{display:flex;gap:10px;padding:6px 14px 8px;flex-wrap:wrap;position:relative;z-index:1;}
.g-leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e;}
.g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#graphBox{height:calc(100vh - var(--hh) - 130px);min-height:300px;overflow:hidden;position:relative;}
#graphBox svg{width:100%;height:100%;}

/* ── BOARDS ── */
.boards-area{display:flex;flex-direction:column;gap:9px;}
.mgr-board{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.mgr-hdr{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;position:relative;}
.mgr-av{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.mgr-info{flex:1;}
.mgr-info h3{font-size:13px;font-weight:700;}
.mgr-meta{font-size:11px;color:var(--text-light);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap;}
.mgr-badge{font-size:10px;padding:1px 7px;border-radius:50px;font-weight:700;background:#f0f9ff;color:#0369a1;}
.mgr-tgl{width:24px;height:24px;border-radius:5px;border:none;background:#f1f5f9;cursor:pointer;font-size:11px;color:var(--text-light);transition:.25s;flex-shrink:0;}
.mgr-tgl.open{transform:rotate(180deg);}
.mgr-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.mgr-body.open{max-height:3000px;}
.proj-grid{display:grid;grid-template-columns:1fr;gap:7px;padding:7px 10px 10px;}
.pc{background:var(--bg);border-radius:9px;padding:9px 11px;border:1.5px dashed var(--border);transition:.15s;min-height:88px;}
.pc.dom{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.12);}
.pc.dos{border-color:#f59e0b;background:#fffbeb;box-shadow:0 0 0 2px rgba(245,158,11,.12);}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.pc-id{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;}
.pc-amt{font-size:11px;font-weight:700;color:#059669;white-space:nowrap;}
.pc-name{font-size:11px;font-weight:500;line-height:1.45;color:var(--text);margin-bottom:5px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.sbadge{font-size:10px;padding:2px 7px;border-radius:50px;font-weight:600;white-space:nowrap;cursor:pointer;}
.sbadge:hover{opacity:.75;}
.sb-d{background:#dbeafe;color:#1e40af;}
.sb-c{background:#dcfce7;color:#166534;}
.sb-e{background:#f3e8ff;color:#6b21a8;}
.sb-x{background:#fef3c7;color:#92400e;}
.sb-o{background:#f1f5f9;color:#475569;}
.pc-mems{display:flex;flex-wrap:wrap;gap:3px;min-height:22px;padding:4px 5px;background:rgba(255,255,255,.85);border-radius:5px;border:1px solid var(--border);}
.pc-mems.hint::before{content:'＋ 拖放組員';font-size:10px;color:#94a3b8;align-self:center;}
.mc{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:50px;font-size:10px;font-weight:600;cursor:pointer;transition:.1s;}
.mc:hover{opacity:.7;}
.mx{opacity:.45;font-size:10px;}
.mc:hover .mx{opacity:1;color:#ef4444;}

/* ── PANEL CARDS ── */
.panel-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.ptitle{padding:9px 11px 8px;font-size:11px;font-weight:700;color:var(--text-light);letter-spacing:.3px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;transition:background .15s;}
.ptitle:hover{background:#f8fafc;}
.ptitle span.sub{font-size:10px;font-weight:400;flex:1;}
.ptitle .ptgl{margin-left:auto;font-size:12px;color:var(--text-light);transition:transform .25s;flex-shrink:0;}
.ptitle.open .ptgl{transform:rotate(180deg);}
.panel-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1);}
.panel-body.open{grid-template-rows:1fr;}
.panel-body>*{overflow:hidden;}

/* ── MEMBER POOL ── */
.member-pool{padding:6px 8px;display:flex;flex-direction:column;gap:2px;}
.mgl{font-size:10px;font-weight:700;padding:5px 6px 4px;letter-spacing:.3px;border-top:1px solid var(--border);margin-top:3px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;border-radius:5px;transition:background .12s;}
.mgl:hover{background:#f1f5f9;}
.mgl:first-child{border-top:none;margin-top:0;}
.mgl .mgl-tgl{margin-left:auto;font-size:10px;color:var(--text-light);transition:transform .22s;}
.mgl.open .mgl-tgl{transform:rotate(180deg);}
.chip-row-wrap{overflow:hidden;display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1);}
.chip-row-wrap.open{grid-template-rows:1fr;}
.chip-row-wrap>div{overflow:hidden;}
.chip-row{display:flex;flex-wrap:wrap;gap:3px;padding:4px 4px 4px 10px;}
.chip-sm{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:50px;font-size:11px;font-weight:500;cursor:grab;user-select:none;transition:.15s;border:1.5px solid transparent;}
.chip-sm:hover{transform:translateY(-1px);box-shadow:0 2px 7px rgba(0,0,0,.12);}
.chip-sm:active{cursor:grabbing;}
.chip-sm.dragging{opacity:.35;}
.chip-av{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.chip-mgr{font-weight:700;font-size:12px;padding:4px 9px;}
.chip-info-btn{background:none;border:none;cursor:pointer;font-size:11px;opacity:.55;padding:0 1px;line-height:1;flex-shrink:0;}
.chip-info-btn:hover{opacity:1;}
.cert-icons{display:flex;gap:2px;align-items:center;}
.ci-star{color:#f59e0b;font-size:9px;}
.ci-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* ── STATUS POOL ── */
.status-pool{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.scd-grid{display:flex;flex-wrap:wrap;gap:4px;}
.scd{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:50px;font-size:11px;font-weight:600;cursor:grab;user-select:none;transition:.15s;border:1.5px solid transparent;}
.scd:hover{transform:translateY(-1px);box-shadow:0 2px 7px rgba(0,0,0,.12);}
.scd:active{cursor:grabbing;}
.scd-d{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.scd-c{background:#dcfce7;color:#166534;border-color:#86efac;}
.scd-e{background:#f3e8ff;color:#6b21a8;border-color:#c4b5fd;}
.scd-x{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.ci-input{width:100%;padding:4px 9px;border:1px solid var(--border);border-radius:7px;font-size:11px;font-family:inherit;outline:none;color:var(--text);background:var(--bg);margin-top:2px;}
.ci-input:focus{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.15);}
.shint{font-size:10px;color:var(--text-light);line-height:1.5;}

/* ── CERT STATS TABLE ── */
.cert-table{width:100%;border-collapse:collapse;font-size:11px;}
.cert-table th{padding:5px 7px;background:#f8fafc;font-weight:700;color:var(--text-light);text-align:center;border-bottom:2px solid var(--border);white-space:nowrap;}
.cert-table th:first-child{text-align:left;}
.cert-table td{padding:5px 7px;text-align:center;border-bottom:1px solid var(--border);}
.cert-table td:first-child{text-align:left;font-weight:600;}
.cert-table tr:last-child td{border-bottom:none;font-weight:700;background:#f8fafc;}
.cert-table tr:hover td{background:#f1f5f9;}
.cert-table tr:last-child:hover td{background:#f0f4fb;}
.cert-num{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;border-radius:9px;font-size:10px;font-weight:700;}
.cert-has{background:#dcfce7;color:#166534;}
.cert-no{color:#cbd5e1;}
.cert-table-wrap{padding:8px 10px;}

/* ── PERSON MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal-box{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:380px;max-width:92vw;max-height:85vh;overflow-y:auto;}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.modal-av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.modal-name{font-size:17px;font-weight:900;}
.modal-role{font-size:12px;color:var(--text-light);margin-top:2px;}
.modal-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-light);padding:4px;border-radius:6px;transition:.15s;}
.modal-close:hover{background:#f1f5f9;color:var(--text);}
.modal-body{padding:16px 20px;}
.modal-row{display:flex;gap:8px;margin-bottom:12px;}
.modal-kv{flex:1;background:#f8fafc;border-radius:10px;padding:9px 12px;}
.modal-kv .lbl{font-size:10px;color:var(--text-light);font-weight:600;margin-bottom:3px;}
.modal-kv .val{font-size:13px;font-weight:700;}
.modal-sect{margin-bottom:14px;}
.modal-sect-title{font-size:11px;font-weight:700;color:var(--text-light);margin-bottom:8px;letter-spacing:.3px;}
.cert-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:12px;font-weight:600;margin:3px 3px 3px 0;}
.cert-pill .exp{font-size:10px;font-weight:400;opacity:.75;margin-left:2px;}
.cert-永久{background:#dbeafe;color:#1e40af;}
.cert-品管{background:#fef3c7;color:#92400e;}
.cert-職安{background:#dcfce7;color:#166534;}
.cert-技師{background:#ede9fe;color:#5b21b6;}
.cert-工地主任{background:#fce7f3;color:#9d174d;}
.cert-管挖{background:#fff7ed;color:#9a3412;}
.cert-無人機{background:#ecfeff;color:#155e75;}
.cert-測量{background:#f0fdf4;color:#166534;}
.cert-other{background:#f1f5f9;color:#475569;}
.modal-proj-list{display:flex;flex-direction:column;gap:4px;}
.modal-proj-item{font-size:11px;padding:5px 9px;background:#f8fafc;border-radius:7px;border-left:3px solid #2563eb;}
.modal-proj-id{font-weight:700;color:#2563eb;margin-right:6px;}

/* ── DRAG ── */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.9;transform:rotate(2deg) scale(1.05);box-shadow:0 5px 18px rgba(0,0,0,.2);}

/* ── RESPONSIVE ── */
@media(max-width:900px){.main-wrap{grid-template-columns:1fr;height:auto;overflow:visible;}.col{height:auto;overflow:visible;}.graph-section{position:static;}}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="hd">
  <div class="hd-top">
    <h1>🏗️ 辦公室專案與人員儀表板</h1>
    <div class="sub">桃園辦公室 &amp; 新北辦公室 · 115年度</div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- ── CHART PANEL ── -->
<div class="chart-panel" id="chartPanel">
  <div class="chart-tabs">
    <div class="chart-tab active" onclick="switchTab('profit',this)">💰 獲利分布</div>
    <div class="chart-tab" onclick="switchTab('yearcomp',this)">📈 年度比較</div>
  </div>
  <div class="chart-pane active" id="pane-profit">
    <div class="profit-chart" id="profitChart"></div>
  </div>
  <div class="chart-pane" id="pane-yearcomp">
    <div class="chartjs-legend">
      <span class="cleg"><span class="cleg-dot" style="background:rgba(99,179,237,0.85)"></span>114年度</span>
      <span class="cleg"><span class="cleg-dot" style="background:rgba(251,146,60,0.85)"></span>115年度</span>
    </div>
    <div id="chartJsWrap"><canvas id="yearCompChart"></canvas></div>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main-wrap">

  <!-- COL 1: 關係圖譜 -->
  <div class="col">
    <div class="col-title">✦ 關係圖譜</div>
    <div class="graph-section">
      <div class="graph-hdr">
        <div class="gtitle">D3 Force Graph <small>拖曳 · 縮放</small></div>
        <div class="gctrl">
          <button class="gbtn" onclick="gZI()">＋</button>
          <button class="gbtn" onclick="gZO()">－</button>
          <button class="gbtn" onclick="gRst()">⟳</button>
          <button class="gbtn" id="btnFull" onclick="toggleFull()">全員</button>
        </div>
      </div>
      <div id="graphBox"></div>
      <div class="g-leg-row">
        <span class="g-leg"><span class="g-dot" style="background:#22d3ee;box-shadow:0 0 5px #22d3ee88"></span>副總</span>
        <span class="g-leg"><span class="g-dot" style="background:#818cf8;box-shadow:0 0 5px #818cf888"></span>副理</span>
        <span class="g-leg"><span class="g-dot" style="background:#34d399;box-shadow:0 0 5px #34d39988"></span>組員</span>
        <span class="g-leg"><span class="g-dot" style="background:#fbbf24;box-shadow:0 0 5px #fbbf2488;width:12px;height:6px;border-radius:2px"></span>專案</span>
        <span class="g-leg"><span class="g-dot" style="background:#fb923c;box-shadow:0 0 5px #fb923c88"></span>有狀態</span>
      </div>
    </div>
  </div>

  <!-- COL 2: 案件看板 -->
  <div class="col">
    <div class="col-title">📋 案件看板</div>
    <div class="boards-area" id="boardsArea"></div>
  </div>

  <!-- COL 3: 人員 & 資訊 -->
  <div class="col">
    <div class="col-title">👥 人員 &amp; 資訊</div>

    <!-- 存檔 + 狀態 -->
    <div class="panel-card">
      <div class="ptitle open" onclick="togPanel(this)">
        💾 存檔 &amp; 🏷️ 案件狀態 <span class="sub"></span> <span class="ptgl">▾</span>
      </div>
      <div class="panel-body open"><div>
        <div class="save-bar" style="margin:8px 10px 0;">
          <span class="sdot" id="sdot"></span>
          <span class="st" id="stxt">尚未存檔</span>
          <button class="btn-load" onclick="loadData()">讀取</button>
          <button class="btn-save" onclick="saveData()">存檔</button>
        </div>
        <div class="status-pool">
          <div class="scd-grid">
            <div class="scd scd-d" data-sv="設計中" data-tp="status">📐 設計中</div>
            <div class="scd scd-c" data-sv="施工中" data-tp="status">🚧 施工中</div>
            <div class="scd scd-e" data-sv="結案中" data-tp="status">✅ 結案中</div>

// 證照資料 — 從 personnelData.json 動態載入
let certInfo={};
function buildCertInfoFromJson(data){
  const result={};
  const certMap=[
    {re:/品管/,n:'品管'},
    {re:/管挖/,n:'管挖'},
    {re:/無人機/,n:'無人機'},
    {re:/技師/,n:'技師'},
    {re:/工地主任/,n:'工地主任'},
    {re:/測量/,n:'測量'},
    {re:/職安|職業安全|安全衛生|安全管理師|安全管理員/,n:'職安'},
  ];
  data.forEach(p=>{
    const seen=new Set();
    const certs=(p.certificates||[]).reduce((arr,c)=>{
      const raw=(c.name||'').replace(/^\d+\./,'').trim();
      const match=certMap.find(m=>m.re.test(raw));
      const shortName=match?match.n:raw;
      if(shortName&&!seen.has(shortName)){seen.add(shortName);arr.push({n:shortName,exp:'長期'});}
      return arr;
    },[]);
    result[p.name]={
      group:p.group||'—',
      seniority:p.seniority||'—',
      edu:(p.education||'—').replace(/\n/g,''),
      certs
    };
  });
  return result;
}

// ─────────────────────────────────────────
// DRAG
// ─────────────────────────────────────────
function onDown(e){if(e.button!==0)return;e.preventDefault();startDrag(e.currentTarget,e.clientX,e.clientY);document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);}
function onTouch(e){e.preventDefault();const t=e.touches[0];startDrag(e.currentTarget,t.clientX,t.clientY);document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE);}
function startDrag(chip,cx,cy){
  if(chip.classList.contains('chip-info-btn'))return;
  const isS=chip.dataset.tp==='status';
  let sv=chip.dataset.sv||chip.dataset.n;
  if(sv==='__custom__')sv=document.getElementById('cusInput').value.trim()||'其他';
  dragSt={n:chip.dataset.n||sv,isS,sv,chip};
  const r=chip.getBoundingClientRect();gOX=cx-r.left;gOY=cy-r.top;
  ghost=document.getElementById('dGhost');ghost.innerHTML=chip.outerHTML;
  ghost.style.cssText=`display:block;left:${cx-gOX}px;top:${cy-gOY}px;width:${r.width}px;`;
  chip.classList.add('dragging');
}
function onMove(e){mvG(e.clientX,e.clientY);hl(e.clientX,e.clientY);}
function onTM(e){e.preventDefault();const t=e.touches[0];mvG(t.clientX,t.clientY);hl(t.clientX,t.clientY);}
function mvG(x,y){if(ghost)ghost.style.cssText=`display:block;left:${x-gOX}px;top:${y-gOY}px;`;}
function hl(x,y){
  document.querySelectorAll('.pc').forEach(c=>{c.classList.remove('dom','dos');});
  const el=document.elementFromPoint(x,y);if(!el)return;
  const c=el.closest('.pc');if(c)c.classList.add(dragSt&&dragSt.isS?'dos':'dom');
}
function onUp(e){fin(e.clientX,e.clientY);document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
function onTE(e){const t=e.changedTouches[0];fin(t.clientX,t.clientY);document.removeEventListener('touchmove',onTM);document.removeEventListener('touchend',onTE);}
function fin(x,y){
  if(ghost)ghost.style.display='none';
  document.querySelectorAll('.pc').forEach(c=>{c.classList.remove('dom','dos');});
  if(dragSt){
    const el=document.elementFromPoint(x,y);
    if(el){const c=el.closest('.pc');if(c){if(dragSt.isS)doStatus(dragSt.sv,c.dataset.pid);else doAsgn(dragSt.n,c.dataset.pid);}}
    dragSt.chip.classList.remove('dragging');dragSt=null;
  }
}

// ─────────────────────────────────────────
// D3 FORCE GRAPH
// ─────────────────────────────────────────
let gSim=null,gSvg=null,gZoom=null;
function toggleFull(){showFull=!showFull;document.getElementById('btnFull').classList.toggle('active',showFull);drawGraph();}
function gZI(){if(gSvg&&gZoom)gSvg.transition().duration(280).call(gZoom.scaleBy,1.45);}
function gZO(){if(gSvg&&gZoom)gSvg.transition().duration(280).call(gZoom.scaleBy,0.68);}
function gRst(){if(gSvg&&gZoom)gSvg.transition().duration(450).call(gZoom.transform,d3.zoomIdentity);}
let gDB=null;
function drawGraph(){clearTimeout(gDB);gDB=setTimeout(_dG,70);}
function _dG(){
  const box=document.getElementById('graphBox');if(!box||typeof d3==='undefined')return;
  const W=box.offsetWidth||760,H=box.offsetHeight||320;
  if(gSim){gSim.stop();gSim=null;}
  d3.select('#graphBox').selectAll('*').remove();

  const aM=new Set(),aP=new Set();
  Object.entries(asgn).forEach(([id,ns])=>{ns.forEach(n=>aM.add(n));if(ns.length)aP.add(id);});
  Object.keys(stAsgn).forEach(id=>aP.add(id));

  const sM=showFull?new Set(org.mems.map(m=>m.name)):aM;
  const sG=showFull?new Set(org.mgrs.map(m=>m.name)):new Set([...sM].map(n=>{const m=org.mems.find(p=>p.name===n);return m?m.sup:null;}).filter(Boolean));
  org.mgrs.forEach(m=>{if([...aP].some(id=>projects.find(p=>p.id===id&&p.pm===m.name)))sG.add(m.name);});

  if(!showFull&&sM.size===0&&aP.size===0){
    const svg=d3.select('#graphBox').append('svg').attr('width',W).attr('height',H);
    svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#4b5563').attr('font-size',12).attr('font-family','Noto Sans TC,sans-serif').text('尚未配置 · 拖曳組員或狀態至案件，或點「全員」檢視組織');
    return;
  }

  const nodes=[],links=[];
  nodes.push({id:org.vgm.name,type:'vgm',r:25});
  org.mgrs.forEach((m,i)=>{
    if(!sG.has(m.name))return;
    nodes.push({id:m.name,type:'mgr',r:19,mi:i});
    links.push({source:org.vgm.name,target:m.name,lt:'org'});
  });
  [...sM].forEach(name=>{
    const m=org.mems.find(p=>p.name===name);if(!m)return;
    nodes.push({id:name,type:'mem',r:aM.has(name)?13:8,sup:m.sup});
    if(sG.has(m.sup))links.push({source:m.sup,target:name,lt:'org'});
  });
  [...aP].forEach(id=>{
    const p=projects.find(x=>x.id===id),st=stAsgn[id];
    nodes.push({id,type:'proj',r:11,st});
    (asgn[id]||[]).forEach(n=>{if(sM.has(n))links.push({source:n,target:id,lt:'asgn'});});
  });

  const gC=['#818cf8','#34d399','#fb923c','#f472b6','#a3e635'];
  const nCol=d=>{
    if(d.type==='vgm')return'#22d3ee';
    if(d.type==='mgr')return gC[d.mi%5];
    if(d.type==='mem'){const i=org.mgrs.findIndex(m=>m.name===d.sup);return gC[i%5]+(aM.has(d.id)?'':'88');}
    return'#fbbf24';
  };
  const nGl=d=>{if(d.type==='vgm')return'gv';if(d.type==='mgr')return'gm';if(d.type==='proj')return'gp';return'gme';};

  const svg=d3.select('#graphBox').append('svg').attr('width',W).attr('height',H);
  gSvg=svg;

  const sg=svg.append('g');
  for(let i=0;i<60;i++){const r=Math.random();sg.append('circle').attr('cx',Math.random()*W).attr('cy',Math.random()*H).attr('r',r<.6?.45:r<.9?1:1.4).attr('fill',`rgba(255,255,255,${.1+Math.random()*.28})`);}

  const defs=svg.append('defs');
  [['gv',7,3],['gm',5,2],['gme',4,2],['gp',4,2]].forEach(([id,blur,s])=>{
    const f=defs.append('filter').attr('id',id).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
    f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','b');
    const mg=f.append('feMerge');for(let i=0;i<s;i++)mg.append('feMergeNode').attr('in','b');mg.append('feMergeNode').attr('in','SourceGraphic');
  });

  const g=svg.append('g');
  gZoom=d3.zoom().scaleExtent([.12,6]).on('start',()=>svg.classed('panning',true)).on('zoom',e=>g.attr('transform',e.transform)).on('end',()=>svg.classed('panning',false));
  svg.call(gZoom);

  gSim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.lt==='asgn'?90:d.source.type==='vgm'?115:80).strength(d=>d.lt==='asgn'?.5:.4))
    .force('charge',d3.forceManyBody().strength(d=>d.type==='vgm'?-650:d.type==='mgr'?-380:d.type==='proj'?-190:-190))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide().radius(d=>d.r+15).strength(.9))
    .alphaDecay(.024);

  const lkC=d=>{
    if(d.lt==='org'&&d.source.type==='vgm')return'rgba(34,211,238,.14)';
    if(d.lt==='org'){const i=org.mgrs.findIndex(m=>m.name===(d.source.id||d.source));return(gC[i%5]||'#818cf8')+'44';}
    const n=d.source.id||d.source,m=org.mems.find(p=>p.name===n);const i=m?org.mgrs.findIndex(x=>x.name===m.sup):-1;return(gC[i%5]||'#fbbf24')+'bb';
  };
  const lk=g.append('g').selectAll('line').data(links).join('line').attr('stroke',lkC).attr('stroke-width',d=>d.lt==='asgn'?1.8:1).attr('stroke-dasharray',d=>d.lt==='org'?'4 3':'none');

  const nd=g.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)gSim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)gSim.alphaTarget(0);d.fx=null;d.fy=null;}));

  nd.append('circle').attr('r',d=>d.r+7).attr('fill','none').attr('stroke',d=>nCol(d)).attr('stroke-width',.7).attr('stroke-opacity',.18);
  nd.each(function(d){
    const sel=d3.select(this);
    if(d.type==='proj'){
      sel.append('rect').attr('x',-d.r*2.5).attr('y',-d.r*.82).attr('width',d.r*5).attr('height',d.r*1.64).attr('rx',5)
        .attr('fill','#1c1917').attr('stroke',d.st?'#fb923c':'#fbbf24').attr('stroke-width',d.st?2:1.5).attr('filter','url(#gp)');
      if(d.st){const sc={'設計中':'#60a5fa','施工中':'#34d399','結案中':'#c084fc'}[d.st]||'#fb923c';sel.append('circle').attr('cx',d.r*2.3).attr('cy',-d.r*.72).attr('r',4).attr('fill',sc).attr('filter','url(#gme)');}
    }else{
      sel.append('circle').attr('r',d.r).attr('fill',d.type==='vgm'?'#0c1a2e':d.type==='mgr'?'#0f1629':'#0a1812')
        .attr('stroke',nCol(d)).attr('stroke-width',d.type==='vgm'?2.5:1.8).attr('filter',`url(#${nGl(d)})`);
      sel.append('circle').attr('r',d.r*.38).attr('fill',nCol(d)).attr('fill-opacity',.55);
    }
  });
  nd.append('text').attr('text-anchor','middle').attr('dy',d=>d.type==='proj'?'0.35em':d.r+12)
    .attr('fill',d=>d.type==='proj'?'#fde68a':nCol(d))
    .attr('font-size',d=>d.type==='vgm'?12:d.type==='mgr'?11:10)
    .attr('font-weight',d=>(d.type==='vgm'||d.type==='mgr')?700:500)
    .attr('font-family','Noto Sans TC,sans-serif').attr('pointer-events','none')
    .text(d=>d.id.length>8?d.id.slice(0,8):d.id);
  nd.filter(d=>d.type==='vgm').append('text').attr('dy','-.9em').attr('text-anchor','middle').attr('fill','#67e8f9').attr('font-size',8).attr('font-family','Noto Sans TC,sans-serif').attr('pointer-events','none').text('副總');
  nd.filter(d=>d.type==='mgr').append('text').attr('dy','-.75em').attr('text-anchor','middle').attr('fill','#94a3b8').attr('font-size',8).attr('font-family','Noto Sans TC,sans-serif').attr('pointer-events','none').text('副理');

  const tt=d3.select('#graphBox').append('div').style('position','absolute').style('display','none').style('background','#1e293b').style('border','1px solid #334155').style('border-radius','8px').style('padding','6px 10px').style('font-size','11px').style('color','#e2e8f0').style('pointer-events','none').style('font-family','Noto Sans TC,sans-serif').style('z-index','10').style('line-height','1.55').style('max-width','180px');
  nd.on('mouseenter',(e,d)=>{
    let h=`<strong>${d.id}</strong>`;
    if(d.type==='mgr'){const n=projects.filter(p=>p.pm===d.id).length;h+=`<br><span style="color:#94a3b8">副理・${n}件</span>`;}
    if(d.type==='mem'){const pj=Object.entries(asgn).filter(([,ns])=>ns.includes(d.id)).map(([i])=>i);const ci=certInfo[d.id];h+=`<br><span style="color:#94a3b8">${d.sup}</span>${pj.length?`<br><span style="color:#34d399">${pj.join(' ')}</span>`:''}${ci&&ci.certs.length?`<br><span style="color:#fbbf24">${ci.certs.map(c=>c.n).join(' · ')}</span>`:''}`;}
    if(d.type==='proj'){const p=projects.find(x=>x.id===d.id),ms=(asgn[d.id]||[]).join(' ');h+=`<br><span style="color:#8b949e;font-size:10px">${p?p.name.slice(0,30)+'…':''}</span>${ms?`<br><span style="color:#34d399">${ms}</span>`:''}${d.st?`<br><span style="color:#fb923c">${d.st}</span>`:''}`;}
    tt.style('display','block').html(h);
  }).on('mousemove',e=>{const r=box.getBoundingClientRect();tt.style('left',e.clientX-r.left+12+'px').style('top',e.clientY-r.top-8+'px');}).on('mouseleave',()=>tt.style('display','none'));
  nd.on('click',(e,d)=>{if(d.type==='mem'||d.type==='mgr'||d.type==='vgm')openModal(d.id);});

  gSim.on('tick',()=>{lk.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);nd.attr('transform',d=>`translate(${d.x},${d.y})`);});

  setTimeout(()=>{
    const b=g.node().getBBox();if(!b.width)return;
    const sc=Math.min(.88,Math.min(W/(b.width+50),H/(b.height+50)));
    svg.transition().duration(650).call(gZoom.transform,d3.zoomIdentity.translate(W/2-sc*(b.x+b.width/2),H/2-sc*(b.y+b.height/2)).scale(sc));
  },1500);
}

// ─────────────────────────────────────────
// PANEL TOGGLE
// ─────────────────────────────────────────
function togPanel(titleEl){
  const body=titleEl.nextElementSibling;
  const open=body.classList.toggle('open');
  titleEl.classList.toggle('open',open);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
(async()=>{
  try{
    const res=await fetch('personnelData.json');
    if(res.ok){const data=await res.json();certInfo=buildCertInfoFromJson(data);}
    else{console.warn('personnelData.json 載入失敗，使用空資料');}
  }catch(e){console.warn('personnelData.json 載入錯誤:',e);}
  renderStats();
  renderProfitChart();
  renderMemberPool();
  bindStatusChips();
  renderCertTable();
  (()=>{const r=localStorage.getItem(LSK);if(r){const d=JSON.parse(r);asgn=d.asgn||{};stAsgn=d.stAsgn||{};dirty=false;updSaveUI();}})();
  renderBoards();
  updSaveUI();
  drawGraph();
})();
</script>

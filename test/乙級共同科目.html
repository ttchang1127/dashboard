<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共同科目線上測驗</title>
<style>
  :root {
    --bg:#1a1a1a; --surface:#242424; --card:#2e2e2e; --border:#3a3a3a;
    --accent:#d4a04a; --accent-light:#e8bf7a; --text:#e8e4dc; --text-dim:#9a9690;
    --correct:#4caf7a; --wrong:#e05555; --info:#7ab4e8;
    --correct-bg:rgba(76,175,122,0.12); --wrong-bg:rgba(224,85,85,0.12);
    --font-display:'Georgia','Times New Roman',serif;
    --font-body:'Segoe UI','Microsoft JhengHei',sans-serif;
    --radius:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.7; min-height:100vh; }
  header { background:linear-gradient(135deg,#1a1a1a 0%,#2a2418 100%); border-bottom:2px solid var(--accent); padding:24px 20px 18px; text-align:center; position:sticky; top:0; z-index:100; }
  header h1 { font-family:var(--font-display); font-size:clamp(17px,2.6vw,24px); font-weight:normal; letter-spacing:.05em; color:var(--accent-light); margin-bottom:4px; }
  header p { color:var(--text-dim); font-size:12px; }
  #scoreboard { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:78px; z-index:99; }
  .score-chip { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:3px 12px; font-size:13px; color:var(--text-dim); }
  .score-chip span { font-weight:bold; color:var(--accent); }
  #controls { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; padding:10px 16px 5px; }
  button { border:none; border-radius:var(--radius); cursor:pointer; font-family:var(--font-body); font-size:13px; padding:6px 16px; transition:all .18s; }
  .btn-primary { background:var(--accent); color:#1a1200; font-weight:bold; }
  .btn-primary:hover { background:var(--accent-light); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  #filter-bar { display:flex; gap:5px; flex-wrap:wrap; padding:5px 16px 8px; justify-content:center; }
  .filter-btn { background:var(--card); border:1px solid var(--border); border-radius:20px; color:var(--text-dim); font-size:12px; padding:3px 11px; }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#1a1200; font-weight:bold; }
  .filter-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
  #quiz-container { max-width:920px; margin:0 auto; padding:8px 14px 60px; }
  .question-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:14px; overflow:hidden; transition:border-color .2s; }
  .question-card.answered-correct { border-color:var(--correct); }
  .question-card.answered-wrong { border-color:var(--wrong); }
  .q-header { display:flex; align-items:baseline; gap:7px; padding:10px 14px 7px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .q-num { font-size:11px; color:var(--accent); font-weight:bold; letter-spacing:.08em; min-width:50px; }
  .q-tag { font-size:10px; color:var(--text-dim); background:var(--surface); border-radius:10px; padding:1px 7px; border:1px solid var(--border); }
  .q-deleted { font-size:10px; color:var(--wrong); background:rgba(224,85,85,.1); border-radius:10px; padding:1px 7px; border:1px solid rgba(224,85,85,.3); }
  .q-text { padding:9px 14px 3px; font-size:14.5px; line-height:1.65; }
  .q-image-wrap { padding:6px 14px 4px; }
  .q-image { display:block; max-width:100%; width:min(760px,100%); height:auto; background:#fff; border-radius:6px; border:1px solid rgba(255,255,255,.16); }
  .options { padding:5px 10px 10px; display:grid; gap:4px; }
  .option-label { display:flex; align-items:flex-start; gap:8px; padding:7px 9px; border-radius:6px; cursor:pointer; border:1px solid transparent; transition:all .15s; font-size:14px; line-height:1.55; user-select:none; }
  .option-label:hover { background:rgba(212,160,74,.07); border-color:rgba(212,160,74,.3); }
  .opt-key { min-width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; color:var(--text-dim); flex-shrink:0; margin-top:1px; transition:all .15s; }
  .option-label.selected .opt-key { background:var(--accent); border-color:var(--accent); color:#1a1200; }
  .option-label.correct-answer { background:var(--correct-bg); border-color:var(--correct); }
  .option-label.correct-answer .opt-key { background:var(--correct); border-color:var(--correct); color:#fff; }
  .option-label.wrong-answer { background:var(--wrong-bg); border-color:var(--wrong); }
  .option-label.wrong-answer .opt-key { background:var(--wrong); border-color:var(--wrong); color:#fff; }
  .explanation { display:none; margin:2px 10px 10px; padding:8px 11px; background:var(--surface); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; font-size:13px; color:var(--text-dim); line-height:1.6; }
  .explanation.show { display:block; }
  #progress-wrap { max-width:920px; margin:0 auto; padding:0 14px 3px; }
  #progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  #progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-light)); border-radius:2px; width:0; transition:width .4s ease; }
  #hidden-count { max-width:920px; margin:0 auto; padding:3px 14px 10px; font-size:12px; color:var(--text-dim); text-align:center; }
  #result-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:center; justify-content:center; padding:18px; }
  #result-modal.show { display:flex; }
  .modal-box { background:var(--card); border:1px solid var(--accent); border-radius:12px; padding:30px 34px; max-width:430px; width:100%; text-align:center; }
  .modal-box h2 { font-family:var(--font-display); color:var(--accent-light); font-size:20px; margin-bottom:12px; }
  .modal-score { font-size:50px; font-weight:bold; color:var(--accent); line-height:1; margin:12px 0; }
  .modal-detail { color:var(--text-dim); font-size:14px; margin-bottom:18px; }
  .modal-grade { font-size:15px; margin:5px 0 18px; font-weight:bold; }
  @media (max-width:640px) {
    header { position:static; }
    #scoreboard { position:static; }
    .q-num { min-width:auto; }
    button { padding:6px 12px; }
  }
</style>
</head>

</div>

，應保持警戒，嚴禁煙火"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-50","id":50,"source":"900090A11","tag":"節能減碳","q":"全球暖化潛勢（GlobalWarmingPotential, GWP） 是衡量溫室氣體對全球暖化的影響，以何者為比較基準？","opts":["CO","CH","SF","NO。 2462"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-51","id":51,"source":"900090A11","tag":"節能減碳","q":"有關建築之外殼節能設計，下列敘述何者錯誤？","opts":["開窗區域設置遮陽設備","大開窗面避免設置於東西日曬方位","做好屋頂隔熱設施","宜採用全面玻璃造型設計， 以利自然採光"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-52","id":52,"source":"900090A11","tag":"節能減碳","q":"下列何者燈泡的發光效率最高？","opts":["LED 燈泡","省電燈泡","白熾燈泡","鹵素燈泡"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-53","id":53,"source":"900090A11","tag":"節能減碳","q":"有關吹風機使用注意事項，下列敘述何者錯誤？","opts":["請勿在潮濕的地方使用，以免觸電危險","應保持吹風機進、出風口之空氣流通，以免造成過熱","應避免長時間使用，使用時應保持適當的距離","可用來作為烘乾棉被及床單等用途"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-54","id":54,"source":"900090A11","tag":"節能減碳","q":"有關無風管空氣調節機的能源效率的描述，下列何者正確？","opts":["冷氣季節性能因數（CSPF） 越高越好","能源效率比（EnergyEfficiencyRate）越低越好","能源效率等級為 5 級時，最省電且對環境也較友善","廠商銷售此類產品時，無須張貼能源效率分級標示圖"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-55","id":55,"source":"900090A11","tag":"節能減碳","q":"為了避免漏電而危害生命安全，下列「不正確」的做法是？","opts":["做好用電設備金屬外殼的接地","有濕氣的用電場合， 線路加裝漏電斷路器","加強定期的漏電檢查及維護","使用保險絲來防止漏電的危險性"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-56","id":56,"source":"900090A11","tag":"節能減碳","q":"用電設備的線路保護用電力熔絲（保險絲）經常燒斷，造成停電的不便， 下列「不正確」的作法是？","opts":["換大一級或大兩級規格的保險絲或斷路器就不會燒斷了","減少線路連接的電氣設備， 降低用電量","重新設計線路， 改較粗的導線或用兩迴路並聯","提高用電設備的功率因數"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-57","id":57,"source":"900090A11","tag":"節能減碳","q":"政府為推廣節能設備而補助民眾汰換老舊設備，下列何者的節電效益最佳？","opts":["將桌上檯燈光源由螢光燈換為 LED 燈","優先淘汰 10 年以上的老舊冷氣機為能源效率標示分級中之一級冷氣機","汰換電風扇， 改裝設能源效率標示分級為一級的冷氣機","因為經費有限，選擇便宜的產品比較重要"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-58","id":58,"source":"900090A11","tag":"節能減碳","q":"依據我國現行國家標準規定， 冷氣機的冷氣能力標示應以何種單位表示？","opts":["kW","BTU /h","kcal/h","RT"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-59","id":59,"source":"900090A11","tag":"節能減碳","q":"漏電影響節電成效， 並且影響用電安全， 簡易的查修方法為","opts":["電氣材料行買支驗電起子， 碰觸電氣設備的外殼，就可查出漏電與否","用手碰觸就可以知道有無漏電","用三用電表檢查","看電費單有無紀錄"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-60","id":60,"source":"900090A11","tag":"節能減碳","q":"使用了 10 幾年的通風換氣扇老舊又骯髒，噪音又大，維修時採取下列哪一種對策最為正確及節能？","opts":["定期拆下來清洗油垢","不必再猶豫， 10 年以上的電扇效率偏低，直接換為高效率通風扇","直接噴沙拉脫清潔劑就可以了，省錢又方便","高效率通風扇較貴， 換同機型的廠內備用品就好了"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-61","id":61,"source":"900090A11","tag":"節能減碳","q":"電氣設備維修時，在關掉電源後，最好停留 1 至 5 分鐘才開始檢修，其主要的理由為下列何者？","opts":["先平靜心情，做好準備才動手","讓機器設備降溫下來再查修","讓裡面的電容器有時間放電完畢， 才安全","法規沒有規定，這完全沒有必要"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-62","id":62,"source":"900090A11","tag":"節能減碳","q":"電氣設備裝設於有潮濕水氣的環境時，最應該優先檢查及確認的措施是？","opts":["有無在線路上裝設漏電斷路器","電氣設備上有無安全保險絲","有無過載及過熱保護設備","有無可能傾倒及生鏽"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-63","id":63,"source":"900090A11","tag":"節能減碳","q":"對於使用冷氣如何節能的描述，下列何者錯誤？","opts":["冷氣溫度設定範圍以 26- 28℃ 為宜","開冷氣同時開啟窗戶有助於省電","冷氣房內配合電風扇使用，可適度調高溫度以節省用電","加裝設自動溫控設備， 可以避免過冷而浪費能源"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-64","id":64,"source":"900090A11","tag":"節能減碳","q":"家庭用電最大宗來自於","opts":["冷氣機","電腦","電視","吹風機"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-65","id":65,"source":"900090A11","tag":"節能減碳","q":"冷氣房內為減少日照高溫及降低空調負載，下列何種處理方式錯誤？","opts":["窗戶裝設窗簾或貼隔熱紙","將窗戶或門開啟，讓屋內外空氣自然對流","屋頂加裝隔熱材、 高反射率塗料或噴水","於屋頂進行薄層綠化"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-66","id":66,"source":"900090A11","tag":"節能減碳","q":"有關電冰箱放置位置的處理方式，下列何者正確？","opts":["背後緊貼牆壁節省空間","背後距離牆壁應有 10 公分以上空間，以利散熱","室內空間有限， 側面緊貼牆壁就可以了","冰箱最好貼近流理台，以便存取食材"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-67","id":67,"source":"900090A11","tag":"節能減碳","q":"下列何項「不是」照明節能改善需優先考量之因素？","opts":["照明方式是否適當","燈具之外型是否美觀","照明之品質是否適當","照度是否適當"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-68","id":68,"source":"900090A11","tag":"節能減碳","q":"醫院、飯店或宿舍之熱水系統耗能大，要設置熱水系統時，應優先選用何種熱水系統較節能？","opts":["電能熱水系統","熱泵熱水系統","瓦斯熱水系統","重油熱水系統"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-69","id":69,"source":"900090A11","tag":"節能減碳","q":"如下圖示為","opts":["省水標章","環保標章","奈米標章","能源效率標示"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-70","id":70,"source":"900090A11","tag":"節能減碳","q":"台灣電力公司電價表所指的夏月用電月份（電價比其他月份高）是為","opts":["4/1〜 7/31","5/1 〜8/ 31","6 /1〜 9/30","7/1 〜10/ 31"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-71","id":71,"source":"900090A11","tag":"節能減碳","q":"屋頂隔熱可有效降低空調用電，下列何項措施較不適當？","opts":["屋頂儲水隔熱","屋頂綠化","於適當位置設置太陽能板發電同時加以隔熱","鋪設隔熱磚"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-72","id":72,"source":"900090A11","tag":"節能減碳","q":"電腦機房使用時間長、耗電量大，下列何項措施對電腦機房之用電管理較不適當？","opts":["機房設定較低之溫度","設置冷熱通道","使用較高效率之空調設備","使用新型高效能電腦設備"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-73","id":73,"source":"900090A11","tag":"節能減碳","q":"有關省水標章之敘述，下列何者正確？","opts":["省水標章是環境部為推動使用節水器材， 特別研定以作為消費者辨識省水產品的一種標誌","獲得省水標章的產品並無嚴格測試，所以對消費者並無一定的保障","省水標章能激勵廠商重視省水產品的研發與製造，進而達到推廣節水良性循環之目的","省水標章除有用水設備外，亦可使用於冷氣或冰箱上"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-74","id":74,"source":"900090A11","tag":"節能減碳","q":"透過淋浴習慣的改變就可以節約用水，下列何者正確？","opts":["淋浴時抹肥皂， 無需將蓮蓬頭暫時關上","等待熱水前流出的冷水可以用水桶接起來再利用","淋浴流下的水不可以刷洗浴室地板","淋浴沖澡流下的水，可以儲蓄洗菜使用"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-75","id":75,"source":"900090A11","tag":"節能減碳","q":"家人洗澡時，一個接一個連續洗，也是一種有效的省水方式嗎？","opts":["是，因為可以節省等待熱水流出之前所先流失的冷水","否，這跟省水沒什麼關係，不用這麼麻煩","否，因為等熱水時流出的水量不多","有可能省水也可能不省水，無法定論"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-76","id":76,"source":"900090A11","tag":"節能減碳","q":"下列何種方式有助於節省洗衣機的用水量？","opts":["洗衣機洗滌的衣物盡量裝滿，一次洗完","購買洗衣機時選購有省水標章的洗衣機， 可有效節約用水","無需將衣物適當分類","洗濯衣物時盡量選擇高水位才洗得乾淨"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-77","id":77,"source":"900090A11","tag":"節能減碳","q":"如果水龍頭流量過大，下列何種處理方式錯誤？","opts":["加裝節水墊片或起波器","加裝可自動關閉水龍頭的自動感應器","直接換裝沒有省水標章的水龍頭","直接調整水龍頭到適當水量"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-78","id":78,"source":"900090A11","tag":"節能減碳","q":"洗菜水、 洗碗水、洗衣水、洗澡水等的清洗水，不可直接利用來做什麼用途？","opts":["洗地板","沖馬桶","澆花","飲用水"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-79","id":79,"source":"900090A11","tag":"節能減碳","q":"如果馬桶有不正常的漏水問題，下列何者處理方式錯誤？","opts":["因為馬桶還能正常使用，所以不用著急，等到不能用時再報修即可","立刻檢查馬桶水箱零件有無鬆脫， 並確認有無漏水","滴幾滴食用色素到水箱裡， 檢查有無有色水流進馬桶， 代表可能有漏水","通知水電行或檢修人員來檢修，徹底根絕漏水問題"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-80","id":80,"source":"900090A11","tag":"節能減碳","q":"水費的計量單位是「度」，一度水的容量大約有多少？","opts":["2, 000 公升","3000 個 600cc 的寶特瓶","1 立方公尺的水量","3 立方公尺的水量"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-81","id":81,"source":"900090A11","tag":"節能減碳","q":"臺灣在一年中什麼時期會比較缺水（即枯水期）？","opts":["6 月至 9 月","9 月至 12 月","11 月至次年 4 月","臺灣全年不缺水"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-82","id":82,"source":"900090A11","tag":"節能減碳","q":"下列何種現象「不是」直接造成台灣缺水的原因？","opts":["降雨季節分布不平均，有時候連續好幾個月不下雨，有時又會下起豪大雨","地形山高坡陡， 所以雨一下很快就會流入大海","因為民生與工商業用水需求量都愈來愈大，所以缺水季節很容易無水可用","台灣地區夏天過熱， 致蒸發量過大"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-83","id":83,"source":"900090A11","tag":"節能減碳","q":"冷凍食品該如何讓它退冰，才是既「節能」又「省水」？","opts":["直接用水沖食物強迫退冰","使用微波爐解凍快速又方便","烹煮前盡早拿出來放置退冰","用熱水浸泡， 每 5 分鐘更換一次"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-84","id":84,"source":"900090A11","tag":"節能減碳","q":"洗碗、洗菜用何種方式可以達到清洗又省水的效果？","opts":["對著水龍頭直接沖洗，且要盡量將水龍頭開大才能確保洗得乾淨","將適量的水放在盆槽內洗濯，以減少用水","把碗盤、菜等浸在水盆裡，再開水龍頭拼命沖水","用熱水及冷水大量交叉沖洗達到最佳清洗效果"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-85","id":85,"source":"900090A11","tag":"節能減碳","q":"解決台灣水荒（缺水）問題的無效對策是","opts":["興建水庫、蓄洪（豐） 濟枯","全面節約用水","水資源重複利用， 海水淡化…等","積極推動全民體育運動"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900090A11-86","id":86,"source":"900090A11","tag":"節能減碳","q":"如下圖， 這是什麼標章？","opts":["奈米標章","環保標章","省水標章","節能標章"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-87","id":87,"source":"900090A11","tag":"節能減碳","q":"澆花的時間何時較為適當，水分不易蒸發又對植物最好？","opts":["正中午","下午時段","清晨或傍晚","半夜十二點"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-88","id":88,"source":"900090A11","tag":"節能減碳","q":"下列何種方式沒有辦法降低洗衣機之使用水量，不建議採用？","opts":["使用低水位清洗","選擇快洗行程","兩、三件衣服也丟洗衣機洗","選擇有自動調節水量的洗衣機"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-89","id":89,"source":"900090A11","tag":"節能減碳","q":"有關省水馬桶的使用方式與觀念認知，下列何者錯誤？","opts":["選用衛浴設備時最好能採用省水標章馬桶","如果家裡的馬桶是傳統舊式， 可以加裝二段式沖水配件","省水馬桶因為水量較小， 會有沖不乾淨的問題，所以應該多沖幾次","因為馬桶是家裡用水的大宗， 所以應該儘量採用省水馬桶來節約用水"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-90","id":90,"source":"900090A11","tag":"節能減碳","q":"下列的洗車方式，何者「無法」節約用水？","opts":["使用有開關的水管可以隨時控制出水","用水桶及海綿抹布擦洗","用大口徑強力水注沖洗","利用機械自動洗車，洗車水處理循環使用"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900090A11-91","id":91,"source":"900090A11","tag":"節能減碳","q":"下列何種現象「無法」看出家裡有漏水的問題？","opts":["水龍頭打開使用時， 水表的指針持續在轉動","牆面、 地面或天花板忽然出現潮濕的現象","馬桶裡的水常在晃動，或是沒辦法止水","水費有大幅度增加"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900090A11-92","id":92,"source":"900090A11","tag":"節能減碳","q":"蓮蓬頭出水量過大時，下列對策何者「無法」達到省水？","opts":["換裝有省水標章的低流量（5 〜10 L /min）蓮蓬頭","淋浴時水量開大，無需改變使用方法","洗澡時間盡量縮短，塗抹肥皂時要把蓮蓬頭關起來","調整熱水器水量到適中位置"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900090A11-93","id":93,"source":"900090A11 d":18,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關著作權的敘述， 下列何者錯誤？","opts":["撰寫碩博士論文時，在合理範圍內引用他人的著作，只要註明出處，不會構成侵害著作權","在網路散布盜版光碟，不管有沒有營利，會構成侵害著作權","在網路的部落格看到一篇文章很棒， 只要註明出處，就可以把文章複製在自己的部落格","將補習班老師的上課內容錄音檔，放到網路上拍賣， 會構成侵害著作權"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-19","id":19,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關商標權的敘述， 下列何者錯誤？","opts":["要取得商標權一定要申請商標註冊","商標註冊後可取得 10 年商標權","商標註冊後， 3 年不使用，會被廢止商標權","在夜市買的仿冒品， 品質不好， 上網拍賣，不會構成侵權"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-20","id":20,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關營業秘密的敘述，下列何者錯誤？","opts":["受雇人於非職務上研究或開發之營業秘密，仍歸雇用人所有","營業秘密不得為質權及強制執行之標的","營業秘密所有人得授權他人使用其營業秘密","營業秘密得全部或部分讓與他人或與他人共有"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-21","id":21,"source":"900070A17","tag":"工作倫理與職業道德","q":"甲公司將其新開發受營業秘密法保護之技術，授權乙公司使用，下列何者錯誤？","opts":["乙公司已獲授權，所以可以未經甲公司同意，再授權丙公司使用","約定授權使用限於一定之地域、時間","約定授權使用限於特定之內容、 一定之使用方法","要求被授權人乙公司在一定期間負有保密義務"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-22","id":22,"source":"900070A17","tag":"工作倫理與職業道德","q":"甲公司嚴格保密之最新配方產品大賣，下列何者侵害甲公司之營業秘密？","opts":["鑑定人 A 因司法審理而知悉配方","甲公司授權乙公司使用其配方","甲公司之 B 員工擅自將配方盜賣給乙公司","甲公司與乙公司協議共有配方"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-23","id":23,"source":"900070A17","tag":"工作倫理與職業道德","q":"故意侵害他人之營業秘密，法院因被害人之請求， 最高得酌定損害額幾倍之賠償？","opts":["1 倍","2 倍","3 倍","4 倍"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-24","id":24,"source":"900070A17","tag":"工作倫理與職業道德","q":"受雇者因承辦業務而知悉營業秘密， 在離職後對於該營業秘密的處理方式，下列敘述何者正確？","opts":["聘雇關係解除後便不再負有保障營業秘密之責","僅能自用而不得販售獲取利益","自離職日起 3 年後便不再負有保障營業秘密之責","離職後仍不得洩漏該營業秘密"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-25","id":25,"source":"900070A17","tag":"工作倫理與職業道德","q":"按照現行法律規定， 侵害他人營業秘密， 其法律責任為","opts":["僅需負刑事責任","僅需負民事損害賠償責任","刑事責任與民事損害賠償責任皆須負擔","刑事責任與民事損害賠償責任皆不須負擔"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-26","id":26,"source":"900070A17","tag":"工作倫理與職業道德","q":"企業內部之營業秘密，可以概分為「商業性營業秘密」及「技術性營業秘密」二大類型， 請問下列何者屬於「技術性營業秘密」？","opts":["人事管理","經銷據點","產品配方","客戶名單"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-27","id":27,"source":"900070A17","tag":"工作倫理與職業道德","q":"某離職同事請求在職員工將離職前所製作之某份文件傳送給他，請問下列回應方式何者正確？","opts":["由於該項文件係由該離職員工製作，因此可以傳送文件","若其目的僅為保留檔案備份， 便可以傳送文件","可能構成對於營業秘密之侵害， 應予拒絕並請他直接向公司提出請求","視彼此交情決定是否傳送文件"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-28","id":28,"source":"900070A17","tag":"工作倫理與職業道德","q":"行為人以竊取等不正當方法取得營業秘密，下列敘述何者正確？","opts":["已構成犯罪","只要後續沒有洩漏便不構成犯罪","只要後續沒有出現使用之行為便不構成犯罪","只要後續沒有造成所有人之損害便不構成犯罪"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-29","id":29,"source":"900070A17","tag":"工作倫理與職業道德","q":"針對在我國境內竊取營業秘密後，意圖在外國、中國大陸或港澳地區使用者，營業秘密法是否可以適用？","opts":["無法適用","可以適用，但若屬未遂犯則不罰","可以適用並加重其刑","能否適用需視該國家或地區與我國是否簽訂相互保護營業秘密之條約或協定"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-30","id":30,"source":"900070A17","tag":"工作倫理與職業道德","q":"所謂營業秘密， 係指方法、技術、製程、 配方、程式、設計或其他可用於生產、銷售或經營之資訊，但其保障所需符合的要件不包括下列何者？","opts":["因其秘密性而具有實際之經濟價值者","所有人已採取合理之保密措施者","因其秘密性而具有潛在之經濟價值者","一般涉及該類資訊之人所知者"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-31","id":31,"source":"900070A17","tag":"工作倫理與職業道德","q":"因故意或過失而不法侵害他人之營業秘密者，負損害賠償責任該損害賠償之請求權，自請求權人知有行為及賠償義務人時起，幾年間不行使就會消滅？","opts":["2 年","5 年","7 年","10 年"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-32","id":32,"source":"900070A17","tag":"工作倫理與職業道德","q":"公司負責人為了要節省開銷， 將員工薪資以高報低來投保全民健保及勞保，是觸犯了刑法上之何種罪刑？","opts":["詐欺罪","侵占罪","背信罪","工商秘密罪"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-33","id":33,"source":"900070A17","tag":"工作倫理與職業道德","q":"A 受僱於公司擔任會計，因自己的財務陷入危機， 多次將公司帳款轉入妻兒戶頭， 是觸犯了刑法上之何種罪刑？","opts":["洩漏工商秘密罪","侵占罪","詐欺罪","偽造文書罪"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-34","id":34,"source":"900070A17","tag":"工作倫理與職業道德","q":"某甲於公司擔任業務經理時， 未依規定經董事會同意，私自與自己親友之公司訂定生意合約， 會觸犯下列何種罪刑？","opts":["侵占罪","貪污罪","背信罪","詐欺罪"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-35","id":35,"source":"900070A17","tag":"工作倫理與職業道德","q":"如果你擔任公司採購的職務， 親朋好友們會向你推銷自家的產品，希望你要採購時，你應該","opts":["適時地婉拒，說明利益需要迴避的考量， 請他們見諒","既然是親朋好友， 就應該互相幫忙","建議親朋好友將產品折扣，折扣部分歸於自己，就會採購","可以暗中地幫忙親朋好友，進行採購，不要被發現有親友關係便可"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-36","id":36,"source":"900070A17","tag":"工作倫理與職業道德","q":"小美是公司的業務經理，有一天巧遇國中同班的死黨小林，發現他是公司的下游廠商老闆。最近小美處理一件公司的招標案件，小林的公司也在其中，私下約小美見面，請求她提供這次招標案的底標，並馬上要給予幾十萬元的前謝金， 請問小美該怎麼辦？","opts":["退回錢，並告訴小林都是老朋友， 一定會全力幫忙","收下錢，將錢拿出來給單位同事們分紅","應該堅決拒絕，並避免每次見面都與小林談論相關業務問題","朋友一場， 給他一個比較接近底標的金額， 反正又不是正確的， 所以沒關係"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-37","id":37,"source":"900070A17","tag":"工作倫理與職業道德","q":"公司發給每人一台平板電腦提供業務上使用，但是發現根本很少在使用， 為了讓它有效的利用，所以將它拿回家給親人使用，這樣的行為是","opts":["可以的，這樣就不用花錢買","可以的， 反正放在那裡不用它， 也是浪費資源","不可以的，因為這是公司的財產， 不能私用","不可以的，因為使用年限未到，如果年限到報廢了，便可以拿回家"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-38","id":38,"source":"900070A17","tag":"工作倫理與職業道德","q":"公司的車子，假日又沒人使用，你是鑰匙保管者， 請問假日可以開出去嗎？","opts":["可以， 只要付費加油即可","可以， 反正假日不影響公務","不可以，因為是公司的， 並非私人擁有","不可以，應該是讓公司想要使用的員工，輪流使用才可"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-39","id":39,"source":"900070A17","tag":"工作倫理與職業道德","q":"阿哲是財經線的新聞記者，某次採訪中得知 A 公司在一個月內將有一個大的併購案，這個併購案顯示公司的財力， 且能讓 A 公司股價往上飆升。 請問阿哲得知此消息後，可以立刻購買該公司的股票嗎？","opts":["可以，有錢大家賺","可以，這是我努力獲得的消息","可以，不賺白不賺","不可以，屬於內線消息，必須保持記者之操守，不得洩漏"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-40","id":40,"source":"900070A17","tag":"工作倫理與職業道德","q":"與公務機關接洽業務時，下列敘述何者正確？","opts":["沒有要求公務員違背職務，花錢疏通而已， 並不違法","唆使公務機關承辦採購人員配合浮報價額，僅屬偽造文書行為","口頭允諾行賄金額但還沒送錢， 尚不構成犯罪","與公務員同謀之共犯，即便不具公務員身分，仍可依據貪污治罪條例處刑"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-41","id":41,"source":"900070A17","tag":"工作倫理與職業道德","q":"與公務機關有業務往來構成職務利害關係者，下列敘述何者正確？","opts":["將餽贈之財物請公務員父母代轉， 該公務員亦已違反規定","與公務機關承辦人飲宴應酬為增進基本關係的必要方法","高級茶葉低價售予有利害關係之承辦公務員，有價購行為就不算違反法規","機關公務員藉子女婚宴廣邀業務往來廠商之行為，並無不妥"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-42","id":42,"source":"900070A17","tag":"工作倫理與職業道德","q":"廠商某甲承攬公共工程，工程進行期間， 甲與其工程人員經常招待該公共工程委辦機關之監工及驗收之公務員喝花酒或招待出國旅遊， 下列敘述何者正確？","opts":["公務員若沒有收現金，就沒有罪","只要工程沒有問題，某甲與監工及驗收等相關公務員就沒有犯罪","因為不是送錢， 所以都沒有犯罪","某甲與相關公務員均已涉嫌觸犯貪污治罪條例"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-43","id":43,"source":"900070A17","tag":"工作倫理與職業道德","q":"行（受） 賄罪成立要素之一為具有對價關係，而作為公務員職務之對價有「賄賂」或「不正利益」，下列何者不屬於「賄賂」或「不正利益」？","opts":["開工邀請公務員觀禮","送百貨公司大額禮券","免除債務","招待吃米其林等級之高檔大餐"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-44","id":44,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列有關貪腐的敘述何者錯誤？","opts":["貪腐會危害永續發展和法治","貪腐會破壞民主體制及價值觀","貪腐會破壞倫理道德與正義","貪腐有助降低企業的經營成本"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-45","id":45,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者不是設置反貪腐專責機構須具備的必要條件？","opts":["賦予該機構必要的獨立性","使該機構的工作人員行使職權不會受到不當干預","提供該機構必要的資源、 專職工作人員及必要培訓","賦予該機構的工作人員有權力可隨時逮捕貪污嫌疑人"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-46","id":46,"source":"900070A17","tag":"工作倫理與職業道德","q":"檢舉人向有偵查權機關或政風機構檢舉貪污瀆職， 必須於何時為之始可能給與獎金？","opts":["犯罪未起訴前","犯罪未發覺前","犯罪未遂前","預備犯罪前"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-47","id":47,"source":"900070A17","tag":"工作倫理與職業道德","q":"檢舉人應以何種方式檢舉貪污瀆職始能核給獎金？","opts":["匿名","委託他人檢舉","以真實姓名檢舉","以他人名義檢舉"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-48","id":48,"source":"900070A17","tag":"工作倫理與職業道德","q":"我國制定何種法律以保護刑事案件之證人，使其勇於出面作證，俾利犯罪之偵查、 審判？","opts":["貪污治罪條例","刑事訴訟法","行政程序法","證人保護法"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-49","id":49,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者非屬公司對於企業社會責任實踐之原則？","opts":["加強個人資料揭露","維護社會公益","發展永續環境","落實公司治理"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-50","id":50,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者並不屬於「職業素養」規範中的範疇？","opts":["增進自我獲利的能力","擁有正確的職業價值觀","積極進取職業的知識技能","具備良好的職業行為習慣"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-51","id":51,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者符合專業人員的職業道德？","opts":["未經雇主同意，於上班時間從事私人事務","利用雇主的機具設備私自接單生產","未經顧客同意， 任意散佈或利用顧客資料","盡力維護雇主及客戶的權益"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-52","id":52,"source":"900070A17","tag":"工作倫理與職業道德","q":"身為公司員工必須維護公司利益，下列何者是正確的工作態度或行為？","opts":["將公司逾期的產品更改標籤","施工時以省時、省料為獲利首要考量，不顧品質","服務時優先考量公司的利益， 顧客權益次之","工作時謹守本分， 以積極態度解決問題"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-53","id":53,"source":"900070A17","tag":"工作倫理與職業道德","q":"身為專業技術工作人士，應以何種認知及態度服務客戶？","opts":["若客戶不瞭解，就儘量減少成本支出，抬高報價","遇到維修問題，儘量拖過保固期","主動告知可能碰到問題及預防方法","隨著個人心情來提供服務的內容及品質"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-54","id":54,"source":"900070A17","tag":"工作倫理與職業道德","q":"因為工作本身需要高度專業技術及知識， 所以在對客戶服務時應如何？","opts":["不用理會顧客的意見","保持親切、真誠、 客戶至上的態度","若價錢較低，就敷衍了事","以專業機密為由， 不用對客戶說明及解釋"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-55","id":55,"source":"900070A17","tag":"工作倫理與職業道德","q":"從事專業性工作，在與客戶約定時間應","opts":["保持彈性，任意調整","儘可能準時，依約定時間完成工作","能拖就拖， 能改就改","自己方便就好，不必理會客戶的要求"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-56","id":56,"source":"900070A17","tag":"工作倫理與職業道德","q":"從事專業性工作，在服務顧客時應有的態度為何？","opts":["選擇最安全、經濟及有效的方法完成工作","選擇工時較長、獲利較多的方法服務客戶","為了降低成本，可以降低安全標準","不必顧及雇主和顧客的立場"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-57","id":57,"source":"900070A17","tag":"工作倫理與職業道德","q":"以下哪一項員工的作為符合敬業精神？","opts":["利用正常工作時間從事私人事務","運用雇主的資源， 從事個人工作","未經雇主同意擅離工作崗位","謹守職場紀律及禮節，尊重客戶隱私"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-58","id":58,"source":"900070A17","tag":"工作倫理與職業道德","q":"小張獲選為小孩學校的家長會長，這個月要召開會議，沒時間準備資料， 所以，利用上班期間有空檔非休息時間來完成，請問是否可以？","opts":["可以， 因為不耽誤他的工作","可以， 因為他能力好，能夠同時完成很多事","不可以，因為這是私事，不可以利用上班時間完成","可以，只要不要被發現"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-59","id":59,"source":"900070A17","tag":"工作倫理與職業道德","q":"小吳是公司的專用司機，為了能夠隨時用車，經過公司同意， 每晚都將公司的車開回家， 然而，他發現反正每天上班路線， 都要經過女兒學校， 就順便載女兒上學，請問可以嗎？","opts":["可以， 反正順路","不可以， 這是公司的車不能私用","可以，只要不被公司發現即可","可以， 要資源須有效使用"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-60","id":60,"source":"900070A17","tag":"工作倫理與職業道德","q":"小江是職場上的新鮮人，剛進公司不久， 他應該具備怎樣的態度？","opts":["上班、下班，管好自己便可","仔細觀察公司生態，加入某些小團體，以做為後盾","只要做好人脈關係，這樣以後就好辦事","努力做好自己職掌的業務，樂於工作， 與同事之間有良好的互動，相互協助"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-61","id":61,"source":"900070A17","tag":"工作倫理與職業道德","q":"在公司內部行使商務禮儀的過程，主要以參與者在公司中的何種條件來訂定順序？","opts":["年齡","性別","社會地位","職位"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-62","id":62,"source":"900070A17","tag":"工作倫理與職業道德","q":"一位職場新鮮人剛進公司時， 良好的工作態度是","opts":["多觀察、多學習，了解企業文化和價值觀","多打聽哪一個部門比較輕鬆， 升遷機會較多","多探聽哪一個公司在找人，隨時準備跳槽走人","多遊走各部門認識同事，建立自己的小圈圈"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-63","id":63,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據消除對婦女一切形式歧視公約(CEDAW) ，下列何者正確？","opts":["對婦女的歧視指基於性別而作的任何區別、 排斥或限制","只關心女性在政治方面的人權和基本自由","未要求政府需消除個人或企業對女性的歧視","傳統習俗應予保護及傳承，即使含有歧視女性的部分， 也不可以改變"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-64","id":64,"source":"900070A17","tag":"工作倫理與職業道德","q":"某規範明定地政機關進用女性測量助理名額，不得超過該機關測量助理名額總數二分之一，根據消除對婦女一切形式歧視公約(CEDAW) ，下列何者正確？","opts":["限制女性測量助理人數比例，屬於直接歧視","土地測量經常在戶外工作，基於保護女性所作的限制，不屬性別歧視","此項二分之一規定是為促進男女比例平衡","此限制是為確保機關業務順暢推動， 並未歧視女性"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-65","id":65,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據消除對婦女一切形式歧視公約(CEDAW) 之間接歧視意涵， 下列何者錯誤？","opts":["一項法律、政策、方案或措施表面上對男性和女性無任何歧視， 但實際上卻產生歧視女性的效果","察覺間接歧視的一個方法， 是善加利用性別統計與性別分析","如果未正視歧視之結構和歷史模式， 及忽略男女權力關係之不平等， 可能使現有不平等狀況更為惡化","不論在任何情況下， 只要以相同方式對待男性和女性，就能避免間接歧視之產生"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-66","id":66,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者不是菸害防制法之立法目的？","opts":["防制菸害","保護未成年免於菸害","保護孕婦免於菸害","促進菸品的使用"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-67","id":67,"source":"900070A17","tag":"工作倫理與職業道德","q":"按菸害防制法規定， 在禁菸場所吸菸會被罰多少錢？","opts":["新臺幣 2 千元至 1 萬元罰鍰","新臺幣 1 千元至 5 千元罰鍰","新臺幣 1 萬元至 5 萬元罰鍰","新臺幣 2 萬元至 10 萬元罰鍰"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-68","id":68,"source":"900070A17","tag":"工作倫理與職業道德","q":"請問下列何者不是個人資料保護法所定義的個人資料？","opts":["身分證號碼","最高學歷","職稱","護照號碼"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-69","id":69,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關專利權的敘述， 下列何者正確？","opts":["專利有規定保護年限， 當某商品、 技術的專利保護年限屆滿，任何人皆可免費運用該項專利","我發明了某項商品，卻被他人率先申請專利權，我仍可主張擁有這項商品的專利權","製造方法可以申請新型專利權","在本國申請專利之商品進軍國外，不需向他國申請專利權"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-70","id":70,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者行為會有侵害著作權的問題？","opts":["將報導事件事實的新聞文字轉貼於自己的社群網站","直接轉貼高普考考古題在 FACEBOOK","以分享網址的方式轉貼資訊分享於社群網站","將講師的授課內容錄音，複製多份分贈友人"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-71","id":71,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關著作權之概念， 下列何者正確？","opts":["國外學者之著作， 可受我國著作權法的保護","公務機關所函頒之公文， 受我國著作權法的保護","著作權要待向智慧財產權申請通過後才可主張","以傳達事實之新聞報導的語文著作，依然受著作權之保障"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-72","id":72,"source":"900070A17","tag":"工作倫理與職業道德","q":"某廠商之商標在我國已經獲准註冊， 請問若希望將商品行銷販賣到國外， 請問是否需在當地申請註冊才能主張商標權？","opts":["是，因為商標權註冊採取屬地保護原則","否， 因為我國申請註冊之商標權在國外也會受到承認","不一定， 需視我國是否與商品希望行銷販賣的國家訂有相互商標承認之協定","不一定， 需視商品希望行銷販賣的國家是否為 WTO 會員國"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-73","id":73,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列何者不屬於營業秘密？","opts":["具廣告性質的不動產交易底價","須授權取得之產品設計或開發流程圖示","公司內部管制的各種計畫方案","不是公開可查知的客戶名單分析資料"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-74","id":74,"source":"900070A17","tag":"工作倫理與職業道德","q":"營業秘密可分為「技術機密」與「商業機密」，下列何者屬於「商業機密」？","opts":["程式","設計圖","商業策略","生產製程"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-75","id":75,"source":"900070A17","tag":"工作倫理與職業道德","q":"某甲在公務機關擔任首長，其弟弟乙是某協會的理事長， 乙為舉辦協會活動，決定向甲服務的機關申請經費補助， 下列有關利益衝突迴避之敘述， 何者正確？","opts":["協會是舉辦慈善活動， 甲認為是好事，所以指示機關承辦人補助活動經費","機關未經公開公平方式， 私下直接對協會補助活動經費新臺幣 10 萬元","甲應自行迴避該案審查， 避免瓜田李下， 防止利益衝突","乙為順利取得補助， 應該隱瞞是機關首長甲之弟弟的身分"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-76","id":76,"source":"900070A17","tag":"工作倫理與職業道德","q":"依公職人員利益衝突迴避法規定，公職人員甲與其小舅子乙（二親等以內的關係人）間， 下列何種行為不違反該法？","opts":["甲要求受其監督之機關聘用小舅子乙","小舅子乙以請託關說之方式， 請求甲之服務機關通過其名下農地變更使用申請案","關係人乙經政府採購法公開招標程序，並主動在投標文件表明與甲的身分關係，取得甲服務機關之年度採購標案","甲、乙兩人均自認為人公正，處事坦蕩， 任何往來都是清者自清，不需擔心任何問題"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-77","id":77,"source":"900070A17","tag":"工作倫理與職業道德","q":"大雄擔任公司部門主管，代表公司向公務機關投標，為使公司順利取得標案，可以向公務機關的採購人員為以下何種行為？","opts":["為社交禮俗需要， 贈送價值昂貴的名牌手錶作為見面禮","為與公務機關間有良好互動，招待至有女陪侍場所飲宴","為了解招標文件內容，提出招標文件疑義並請說明","為避免報價錯誤， 要求提供底價作為參考"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-78","id":78,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列關於政府採購人員之敘述，何者未違反相關規定？","opts":["非主動向廠商求取，是偶發地收到廠商致贈價值在新臺幣 500 元以下之廣告物、促銷品、 紀念品","要求廠商提供與採購無關之額外服務","利用職務關係向廠商借貸","利用職務關係媒介親友至廠商處所任職"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-79","id":79,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列敘述何者錯誤？","opts":["憲法保障言論自由，但散布假新聞、假消息仍須面對法律責任","在網路或 Line 社群網站收到假訊息， 可以敘明案情並附加截圖檔， 向法務部調查局檢舉","對新聞媒體報導有意見， 向國家通訊傳播委員會申訴","自己或他人捏造、扭曲、竄改或虛構的訊息，只要一小部分能證明是真的， 就不會構成假訊息"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-80","id":80,"source":"900070A17","tag":"工作倫理與職業道德","q":"下列敘述何者正確？","opts":["公務機關委託的代檢（代驗）業者，不是公務員， 不會觸犯到刑法的罪責","賄賂或不正利益，只限於法定貨幣， 給予網路遊戲幣沒有違法的問題","在靠北公務員社群網站，覺得可受公評且匿名發文，就可以謾罵公務機關對特定案件的檢查情形","受公務機關委託辦理案件，除履行採購契約應辦事項外，對於蒐集到的個人資料， 也要遵守相關保護及保密規定"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-81","id":81,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關促進參與及預防貪腐的敘述，下列何者錯誤？","opts":["我國非聯合國會員國，無須落實聯合國反貪腐公約規定","推動政府部門以外之個人及團體積極參與預防和打擊貪腐","提高決策過程之透明度， 並促進公眾在決策過程中發揮作用","對公職人員訂定執行公務之行為守則或標準"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-82","id":82,"source":"900070A17","tag":"工作倫理與職業道德","q":"為建立良好之公司治理制度， 公司內部宜納入何種檢舉人制度？","opts":["告訴乃論制度","吹哨者（whistleblower）保護程序及保護制度","不告不理制度","非告訴乃論制度"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-83","id":83,"source":"900070A17","tag":"工作倫理與職業道德","q":"有關公司訂定誠信經營守則時，下列何者錯誤？","opts":["避免與涉有不誠信行為者進行交易","防範侵害營業秘密、商標權、專利權、著作權及其他智慧財產權","建立有效之會計制度及內部控制制度","防範檢舉"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-84","id":84,"source":"900070A17","tag":"工作倫理與職業道德","q":"乘坐轎車時，如有司機駕駛， 按照國際乘車禮儀， 以司機的方位來看， 首位應為","opts":["後排右側","前座右側","後排左側","後排中間"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-85","id":85,"source":"900070A17","tag":"工作倫理與職業道德","q":"今天好友突然來電， 想來個「說走就走的旅行」， 因此， 無法去上班， 下列何者作法不適當？","opts":["發送 E -MAIL 給主管與人事部門， 並收到回覆","什麼都無需做， 等公司打電話來確認後， 再告知即可","用 LINE 傳訊息給主管，並確認讀取且有回覆","打電話給主管與人事部門請假"],"ans":1,"is_deleted":false,"image":null,"exp":"正確答案：②"},{"uid":"900070A17-86","id":86,"source":"900070A17","tag":"工作倫理與職業道德","q":"每天下班回家後，就懶得再出門去買菜， 利用上班時間瀏覽線上購物網站，發現有很多限時搶購的便宜商品，還能在下班前就可以送到公司， 下班順便帶回家， 省掉好多時間，下列何者最適當？","opts":["可以，又沒離開工作崗位，且能節省時間","可以， 還能介紹同事一同團購，省更多的錢，增進同事情誼","不可以， 應該把商品寄回家， 不是公司","不可以， 上班不能從事個人私務， 應該等下班後再網路購物"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-87","id":87,"source":"900070A17","tag":"工作倫理與職業道德","q":"宜樺家中養了一隻貓，由於最近生病，獸醫師建議要有人一直陪牠，這樣會恢復快一點， 辦公室雖然禁止攜帶寵物，但因為上班家裡無人陪伴， 所以準備帶牠到辦公室一起上班，下列何者最適當？","opts":["可以，只要我放在寵物箱，不要影響工作即可","可以， 同事們都答應也不反對","可以，雖然貓會發出聲音， 大小便有異味，只要處理好不影響工作即可","不可以， 可以送至專門機構照護或請專人照顧， 以免影響工作"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-88","id":88,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據性別平等工作法，下列何者非屬職場性騷擾？","opts":["公司員工執行職務時，客戶對其講黃色笑話，該員工感覺被冒犯","雇主對求職者要求交往， 作為僱用與否之交換條件","公司員工執行職務時， 遭到同事以「女人就是沒大腦」性別歧視用語加以辱罵，該員工感覺其人格尊嚴受損","公司員工下班後搭乘捷運，在捷運上遭到其他乘客偷拍"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-89","id":89,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據性別平等工作法，下列何者非屬職場性別歧視？","opts":["雇主考量男性賺錢養家之社會期待，提供男性高於女性之薪資","雇主考量女性以家庭為重之社會期待，裁員時優先資遣女性","雇主事先與員工約定倘其有懷孕之情事，必須離職","有未滿 2 歲子女之男性員工，也可申請每日六十分鐘的哺乳時間"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900070A17-90","id":90,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據性別平等工作法，有關雇主防治性騷擾之責任與罰則，下列何者錯誤？","opts":["僱用受僱者 30 人以上者，應訂定性騷擾防治措施、申訴及懲戒規範","雇主知悉性騷擾發生時， 應採取立即有效之糾正及補救措施","雇主違反應訂定性騷擾防治措施之規定時，處以罰鍰即可，不用公布其姓名","雇主違反應訂定性騷擾申訴管道者， 應限期令其改善，屆期未改善者， 應按次處罰"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-91","id":91,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據性騷擾防治法， 有關性騷擾之責任與罰則，下列何者錯誤？","opts":["對他人為性騷擾者，如果沒有造成他人財產上之損失，就無需負擔金錢賠償之責任","對於因教育、訓練、 醫療、公務、業務、求職，受自己監督、照護之人，利用權勢或機會為性騷擾者，得加重科處罰鍰至二分之一","意圖性騷擾，乘人不及抗拒而為親吻、 擁抱或觸摸其臀部、 胸部或其他身體隱私處之行為者，處 2 年以下有期徒刑、拘役或併科 10 萬元以下罰金","對他人為權勢性騷擾以外之性騷擾者，由直轄市、縣（市）主管機關處 1 萬元以上 10 萬元以下罰鍰"],"ans":0,"is_deleted":false,"image":null,"exp":"正確答案：①"},{"uid":"900070A17-92","id":92,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據性別平等工作法規範職場性騷擾範疇，下列何者錯誤？","opts":["上班執行職務時，任何人以性要求、具有性意味或性別歧視之言詞或行為，造成敵意性、脅迫性或冒犯性之工作環境","對僱用、求職或執行職務關係受自己指揮、監督之人， 利用權勢或機會為性騷擾","與朋友聚餐後回家時，被陌生人以盯梢、守候、尾隨跟蹤","雇主對受僱者或求職者為明示或暗示之性要求、具有性意味或性別歧視之言詞或行為"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900070A17-93","id":93,"source":"900070A17","tag":"工作倫理與職業道德","q":"根據消除對婦女一切形式歧視公約（CEDAW）之直接歧視及間接歧視意涵，下列何者錯誤？","opts":["老闆得知小黃懷孕後，故意將小黃調任薪資待遇較差的工作，意圖使其自行離開職場， 小黃老闆的行為是直接歧視","某餐廳於網路上招募外場服務生，條件以未婚年輕女性優先錄取，明顯以性或性別差異為由所實施的差別待遇，為直接歧視","某公司員工值班注意事項排除女性員工參與夜間輪值，是考量女性有人 age":null,"exp":"正確答案：④"},{"uid":"900060A18-97","id":97,"source":"900060A18","tag":"職業安全衛生","q":"下列何者較屬安全、 尊嚴的職場組織文化？","opts":["不斷責備勞工","公開在眾人面前長時間責罵勞工","強求勞工執行業務上明顯不必要或不可能之工作","不介入勞工私人事宜"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900060A18-98","id":98,"source":"900060A18","tag":"職業安全衛生","q":"下列何者與職場母性健康保護較不相關？","opts":["職業安全衛生法","妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準","性別平等工作法","動力堆高機型式驗證"],"ans":3,"is_deleted":false,"image":null,"exp":"正確答案：④"},{"uid":"900060A18-99","id":99,"source":"900060A18","tag":"職業安全衛生","q":"油漆塗裝工程應注意防火防爆事項， 下列何者錯誤？","opts":["確實通風","注意電氣火花","緊密門窗以減少溶劑擴散揮發","嚴禁煙火"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"},{"uid":"900060A18-100","id":100,"source":"900060A18","tag":"職業安全衛生","q":"依職業安全衛生設施規則規定，雇主對於物料儲存，為防止氣候變化或自然發火發生危險者， 下列何者為最佳之採取措施？","opts":["保持自然通風","密閉","與外界隔離及溫濕控制","靜置於倉儲區，避免陽光直射"],"ans":2,"is_deleted":false,"image":null,"exp":"正確答案：③"}];
const TOTAL = QUESTIONS.length;
const KEYS = ['①','②','③','④'];
let userAnswers = {};
let showExplanations = false;
let currentFilter = 'all';
let wrongMode = false;

function sourceLabel(code) {
  const s = SOURCES.find(x => x.code === code);
  return s ? s.title : code;
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '全部 ' + TOTAL + ' 題';
  allBtn.onclick = () => filterSource('all', allBtn);
  bar.appendChild(allBtn);
  SOURCES.forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = src.title + ' ' + src.count + '題';
    btn.onclick = () => filterSource(src.code, btn);
    bar.appendChild(btn);
  });
}

function getBaseQuestions() {
  return currentFilter === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.source === currentFilter);
}

function getVisibleQuestions() {
  const base = getBaseQuestions();
  if (!wrongMode) return base;
  return base.filter(q => userAnswers[q.uid] !== undefined && !isCorrectAnswer(q));
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function buildQuiz(questions) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.uid;
    const imageHtml = q.image ? '<div class="q-image-wrap"><img class="q-image" src="' + q.image + '" alt="圖示選項"></div>' : '';
    const optsHtml = q.opts.map((opt, i) => {
      return '<div class="option-label" id="opt-' + q.uid + '-' + i + '" data-uid="' + q.uid + '" data-opt="' + i + '">' +
        '<span class="opt-key">' + KEYS[i] + '</span>' +
        '<span>' + escapeHtml(opt) + '</span></div>';
    }).join('');
    const delBadge = q.is_deleted ? '<span class="q-deleted">本題刪題</span>' : '';
    card.innerHTML =
      '<div class="q-header">' +
        '<span class="q-num">Q ' + q.id + '</span>' +
        '<span class="q-tag">' + escapeHtml(sourceLabel(q.source)) + '</span>' + delBadge +
      '</div>' +
      '<div class="q-text">' + escapeHtml(q.q) + '</div>' + imageHtml +
      '<div class="options">' + optsHtml + '</div>' +
      '<div class="explanation" id="exp-' + q.uid + '">💡 ' + escapeHtml(q.exp) + '</div>';
    container.appendChild(card);
    card.querySelectorAll('.option-label').forEach(el => {
      el.addEventListener('click', () => selectSingle(el.dataset.uid, parseInt(el.dataset.opt, 10)));
    });
    if (userAnswers[q.uid] !== undefined) restoreAnswer(q);
    if (showExplanations) document.getElementById('exp-' + q.uid).classList.add('show');
  });
}

function findQuestion(uid) {
  return QUESTIONS.find(q => q.uid === uid);
}

function selectSingle(uid, optIdx) {
  const q = findQuestion(uid);
  if (!q || userAnswers[uid] !== undefined) return;
  userAnswers[uid] = optIdx;
  applyAnswerState(q);
  updateScore();
  updateProgress();
}

function applyAnswerState(q) {
  const selected = userAnswers[q.uid];
  const correct = q.ans;
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById('opt-' + q.uid + '-' + i);
    if (!lbl) continue;
    lbl.classList.remove('selected','correct-answer','wrong-answer');
    if (i === selected) lbl.classList.add(selected === correct ? 'correct-answer' : 'wrong-answer', 'selected');
    if (i === correct && selected !== correct) lbl.classList.add('correct-answer');
  }
  const card = document.getElementById('card-' + q.uid);
  if (card) card.classList.add(selected === correct ? 'answered-correct' : 'answered-wrong');
  if (showExplanations) document.getElementById('exp-' + q.uid).classList.add('show');
}

function restoreAnswer(q) {
  applyAnswerState(q);
}

function isCorrectAnswer(q) {
  return userAnswers[q.uid] !== undefined && userAnswers[q.uid] === q.ans;
}

function updateScore() {
  const base = getBaseQuestions();
  const answered = base.filter(q => userAnswers[q.uid] !== undefined).length;
  const correct = base.filter(q => isCorrectAnswer(q)).length;
  const wrong = answered - correct;
  const rate = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('s-total').textContent = base.length;
  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-rate').textContent = answered > 0 ? rate + '%' : '—';
}

function updateProgress() {
  const base = getBaseQuestions();
  const answered = base.filter(q => userAnswers[q.uid] !== undefined).length;
  document.getElementById('progress-fill').style.width = (answered / Math.max(base.length, 1) * 100) + '%';
}

function updateAnswerButton() {
  const btn = document.getElementById('toggle-answer-btn');
  if (btn) btn.textContent = showExplanations ? '🙈 隱藏答案' : '💡 顯示答案';
}

function updateHiddenText() {
  const base = getBaseQuestions();
  const visible = getVisibleQuestions();
  let text = '';
  if (currentFilter !== 'all') text = '目前顯示 ' + base.length + ' 題（隱藏 ' + (TOTAL - base.length) + ' 題）';
  if (wrongMode) text = '顯示 ' + visible.length + ' 道錯題';
  document.getElementById('hidden-count').textContent = text;
}

function filterSource(source, btn) {
  currentFilter = source;
  wrongMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildQuiz(getVisibleQuestions());
  updateHiddenText();
  updateScore();
  updateProgress();
}

function toggleExplanations() {
  showExplanations = !showExplanations;
  document.querySelectorAll('.explanation').forEach(el => {
    el.classList.toggle('show', showExplanations);
  });
  updateAnswerButton();
}

function showOnlyWrong() {
  const wrongIds = getBaseQuestions().filter(q => userAnswers[q.uid] !== undefined && !isCorrectAnswer(q));
  if (wrongIds.length === 0) { alert('目前沒有錯題！'); return; }
  wrongMode = true;
  buildQuiz(getVisibleQuestions());
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  updateHiddenText();
}

function resetAll() {
  userAnswers = {};
  showExplanations = false;
  wrongMode = false;
  currentFilter = 'all';
  buildQuiz(getVisibleQuestions());
  document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  updateHiddenText();
  updateScore();
  updateProgress();
  updateAnswerButton();
}

function showResult() {
  const base = getBaseQuestions();
  const answered = base.filter(q => userAnswers[q.uid] !== undefined).length;
  const correct = base.filter(q => isCorrectAnswer(q)).length;
  const score = Math.round(correct / base.length * 100);
  document.getElementById('modal-score-num').textContent = score;
  document.getElementById('modal-detail').textContent = '共 ' + base.length + ' 題，已作答 ' + answered + ' 題，答對 ' + correct + ' 題，答錯 ' + (answered - correct) + ' 題';
  let grade = '';
  if (answered < base.length) grade = '⚠️ 尚有 ' + (base.length - answered) + ' 題未作答';
  else if (score >= 90) grade = '🏆 優異！知識掌握精熟';
  else if (score >= 80) grade = '✅ 良好！建議複習錯題';
  else if (score >= 70) grade = '📖 及格！仍有進步空間';
  else grade = '❌ 需加強！建議重新研讀';
  document.getElementById('modal-grade').textContent = grade;
  document.getElementById('result-modal').classList.add('show');
}

buildFilters();
buildQuiz(QUESTIONS);
updateScore();
updateProgress();
</script>

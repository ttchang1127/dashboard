<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瀝青混凝土鋪面施工規範題庫</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --card: #2e2e2e;
    --border: #3a3a3a;
    --accent: #d4a04a;
    --accent-light: #e8bf7a;
    --text: #e8e4dc;
    --text-dim: #9a9690;
    --correct: #4caf7a;
    --wrong: #e05555;
    --correct-bg: rgba(76,175,122,0.12);
    --wrong-bg: rgba(224,85,85,0.12);
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2418 100%);
    border-bottom: 2px solid var(--accent);
    padding: 32px 24px 28px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 26px);
    font-weight: normal;
    letter-spacing: 0.06em;
    color: var(--accent-light);
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  /* ── Scoreboard ── */
  #scoreboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 97px;
    z-index: 99;
  }

  .score-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .score-chip span {
    font-weight: bold;
    color: var(--accent);
  }

  /* ── Controls ── */
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px 8px;
  }

  button {
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px 20px;
    transition: all 0.18s;
  }

  .btn-primary {
    background: var(--accent);
    color: #1a1200;
    font-weight: bold;
  }
  .btn-primary:hover { background: var(--accent-light); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Filter Tabs ── */
  #filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 24px 12px;
    justify-content: center;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 14px;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1200;
    font-weight: bold;
  }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* ── Question Grid ── */
  #quiz-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px 20px 60px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong   { border-color: var(--wrong); }

  .q-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }

  .q-num {
    font-size: 11px;
    color: var(--accent);
    font-weight: bold;
    letter-spacing: 0.08em;
    min-width: 38px;
  }

  .q-tag {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border-radius: 10px;
    padding: 1px 8px;
    border: 1px solid var(--border);
  }

  .q-text {
    padding: 12px 18px 4px;
    font-size: 14.5px;
    line-height: 1.65;
  }

  /* ── Options ── */
  .options {
    padding: 8px 14px 14px;
    display: grid;
    gap: 6px;
  }

  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1.55;
  }

  .option-label:hover { background: rgba(212,160,74,0.07); border-color: rgba(212,160,74,0.3); }

  .option-label input[type=radio] { display: none; }

  .opt-key {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .option-label.selected .opt-key {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1200;
  }

  .option-label.correct-answer {
    background: var(--correct-bg);
    border-color: var(--correct);
  }
  .option-label.correct-answer .opt-key {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }

  .option-label.wrong-answer {
    background: var(--wrong-bg);
    border-color: var(--wrong);
  }
  .option-label.wrong-answer .opt-key {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin: 2px 14px 14px;
    padding: 10px 14px;
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .explanation.show { display: block; }

  /* ── Progress bar ── */
  #progress-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 6px;
  }

  #progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
    width: 0;
    transition: width 0.4s ease;
  }

  /* ── Result modal ── */
  #result-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #result-modal.show { display: flex; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 36px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }

  .modal-box h2 {
    font-family: var(--font-display);
    color: var(--accent-light);
    font-size: 22px;
    margin-bottom: 16px;
  }

  .modal-score {
    font-size: 56px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
    margin: 16px 0;
  }

  .modal-detail {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .modal-grade {
    font-size: 15px;
    margin: 8px 0 24px;
    font-weight: bold;
  }

  #hidden-count {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px 16px 14px;
    max-width: 900px;
    margin: 0 auto;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>⬛ 瀝青混凝土鋪面施工規範題庫</h1>
  <p>桃工規 02741 · 02742 · 02747 · 02966 ｜共 100 題</p>
</header>

<div id="scoreboard">
  <div class="score-chip">作答 <span id="s-answered">0</span> / 100</div>
  <div class="score-chip">正確 <span id="s-correct">0</span></div>
  <div class="score-chip">錯誤 <span id="s-wrong">0</span></div>
  <div class="score-chip">正確率 <span id="s-rate">—</span></div>
</div>

<div id="controls">
  <button class="btn-primary" onclick="showResult()">📊 查看成績</button>
  <button class="btn-outline" onclick="resetAll()">🔄 重新作答</button>
  <button class="btn-outline" onclick="toggleExplanations()">💡 顯示解析</button>
  <button class="btn-outline" onclick="showOnlyWrong()">❌ 只看錯題</button>
</div>

<div id="filter-bar">
  <button class="filter-btn active" onclick="filterTag('all',this)">全部 (100)</button>
  <button class="filter-btn" onclick="filterTag('02741',this)">02741 一般要求</button>
  <button class="filter-btn" onclick="filterTag('02742',this)">02742 鋪面</button>
  <button class="filter-btn" onclick="filterTag('02747',this)">02747 黏層</button>
  <button class="filter-btn" onclick="filterTag('02966',this)">02966 再生瀝青</button>
</div>

<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="hidden-count"></div>

<div id="quiz-container"></div>

<div id="result-modal">
  <div class="modal-box">
    <h2>測驗結果</h2>
    <div class="modal-score" id="modal-score-num">0</div>
    <div style="color:var(--text-dim);font-size:13px;">分（滿分 100 分）</div>
    <div class="modal-detail" id="modal-detail"></div>
    <div class="modal-grade" id="modal-grade"></div>
    <button class="btn-primary" onclick="document.getElementById('result-modal').classList.remove('show')" style="width:100%;padding:10px">關閉</button>
    <br><br>
    <button class="btn-outline" onclick="resetAll();document.getElementById('result-modal').classList.remove('show')" style="width:100%;padding:10px">重新作答</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // ── 02741 一般要求（25題）──
  {
    id:1, tag:'02741',
    q:'根據第02741章，停留於幾mm（何號篩）以上之粒料定義為粗粒料？',
    opts:['A. 4.75mm（No.4）','B. 2.36mm（No.8）','C. 1.18mm（No.16）','D. 0.075mm（No.200）'],
    ans:1,
    exp:'第02741章第1.5.1款：粗粒料為停留於2.36mm（No.8）試驗篩以上之部分。'
  },
  {
    id:2, tag:'02741',
    q:'黏度分級AC1-20瀝青膠泥，在60℃時黏度規定為何？',
    opts:['A. 1000±200 poises','B. 2000±400 poises','C. 3000±600 poises','D. 4000±800 poises'],
    ans:1,
    exp:'表02741-3：AC1-20黏度在60℃時為2000±400 poises。'
  },
  {
    id:3, tag:'02741',
    q:'粗粒料依CNS 490洛杉磯磨損試驗，密級配用粗粒料旋轉500轉後磨損率不得大於幾%？',
    opts:['A. 30%','B. 35%','C. 40%','D. 45%'],
    ans:2,
    exp:'第02741章第2.1.4款：密級配粗粒料磨損率不得大於40%，開放級配不得大於35%。'
  },
  {
    id:4, tag:'02741',
    q:'礦物填縫料依CNS 5088試驗法，其塑性指數（PI）不得大於多少？（石灰和水泥不受此限）',
    opts:['A. 2','B. 4','C. 6','D. 8'],
    ans:1,
    exp:'第02741章第2.1.4(4)C款：礦物填縫料塑性指數不得大於4，但石灰和水泥不受此限。'
  },
  {
    id:5, tag:'02741',
    q:'瀝青混凝土拌和料倒入拌和機後，乾拌時間規定最少不得少於幾秒？',
    opts:['A. 10秒','B. 15秒','C. 20秒','D. 30秒'],
    ans:1,
    exp:'第02741章第3.2.1(3)C款：乾拌時間不得少於15秒。'
  },
  {
    id:6, tag:'02741',
    q:'瀝青混凝土拌和料的濕拌時間規定最少不得少於幾秒？',
    opts:['A. 15秒','B. 20秒','C. 30秒','D. 45秒'],
    ans:2,
    exp:'第02741章第3.2.1(3)C款：濕拌時間不得少於30秒，亦不得超過50秒。'
  },
  {
    id:7, tag:'02741',
    q:'密級配瀝青混凝土，自拌和廠輸出時之溫度上限為何？',
    opts:['A. 140℃','B. 150℃','C. 163℃','D. 185℃'],
    ans:2,
    exp:'第02741章第3.2.1(3)B款：密級配輸出溫度不得低於135℃或高於163℃。'
  },
  {
    id:8, tag:'02741',
    q:'瀝青膠泥針入度分級60~70，其軟化點要求為何？',
    opts:['A. ≧38℃','B. ≧42℃','C. ≧46℃','D. ≧50℃'],
    ans:2,
    exp:'表02741-2：針入度分級60~70之軟化點≧46℃。'
  },
  {
    id:9, tag:'02741',
    q:'瀝青材料之儲存槽總容量最低規定為本工程每日施工最高需要量的幾倍？',
    opts:['A. 2倍','B. 3倍','C. 4倍','D. 5倍'],
    ans:1,
    exp:'第02741章第2.1.3款：儲存槽總容量不得少於每日施工最高需要量之3倍。'
  },
  {
    id:10, tag:'02741',
    q:'瀝青材料經試驗合格後，超過幾天未使用者需重新試驗？',
    opts:['A. 14天','B. 21天','C. 30天','D. 45天'],
    ans:2,
    exp:'第02741章第2.1.3款：瀝青材料試驗合格後超過30天未使用，應重新試驗合格方可使用。'
  },
  {
    id:11, tag:'02741',
    q:'瀝青混凝土配合設計報告，同一種規格數量在多少噸以下，且符合其他條件者，得引用1年內之配合設計報告？',
    opts:['A. 2000t','B. 3000t','C. 3500t','D. 5000t'],
    ans:2,
    exp:'第02741章第2.2.3款：同一規格且同一料源同一拌和廠，數量在3500t以下者得引用過去1年內之報告。'
  },
  {
    id:12, tag:'02741',
    q:'加入礦物填縫料之重量，除設計圖說另有規定外，不得超過拌和粒料總重之幾%？',
    opts:['A. 5%','B. 7%','C. 10%','D. 12%'],
    ans:1,
    exp:'第02741章第2.1.4(4)E款：礦物填縫料重量不得超過拌和粒料總重之7%。'
  },
  {
    id:13, tag:'02741',
    q:'粒料進入拌和機前，粗、細粒料的烘乾加熱溫度規定為何範圍？',
    opts:['A. 100℃～135℃','B. 120℃～150℃','C. 135℃～163℃','D. 150℃～180℃'],
    ans:2,
    exp:'第02741章第3.2.1(2)A款：粒料進入拌和機之溫度為135℃～163℃。'
  },
  {
    id:14, tag:'02741',
    q:'鋼質粒料（氧化碴細粒料）依CNS 15311測試浸水膨脹比，7天最終膨脹量須小於多少才可使用？',
    opts:['A. 0.3%','B. 0.5%','C. 1.0%','D. 2.0%'],
    ans:1,
    exp:'第02741章第2.1.4(3)B款：鋼質粒料浸水7天最終膨脹量須小於0.5%始可再利用。'
  },
  {
    id:15, tag:'02741',
    q:'密級配瀝青混凝土用於面層時，拌和粒料之含砂當量不得少於多少？',
    opts:['A. 30','B. 40','C. 50','D. 60'],
    ans:2,
    exp:'第02741章第2.1.4(5)款：用於面層含砂當量不得少於50，底層不得少於40。'
  },
  {
    id:16, tag:'02741',
    q:'磅秤計量設備之靈敏度規定，應為所需最大荷重之幾%以內？',
    opts:['A. ±0.2%','B. ±0.5%','C. ±1.0%','D. ±2.0%'],
    ans:1,
    exp:'第02741章第3.1.1(1)A款：磅秤靈敏度應為最大荷重之±0.5%（含）以內。'
  },
  {
    id:17, tag:'02741',
    q:'瀝青含量及粒料級配之抽驗，同一天供應之同一種瀝青混凝土，未達200t時，可抽驗幾次？',
    opts:['A. 1次','B. 2次','C. 3次','D. 免驗'],
    ans:0,
    exp:'第02741章第3.3.1款：數量未達200t時得僅抽驗1次。'
  },
  {
    id:18, tag:'02741',
    q:'開放級配瀝青混凝土依肯塔堡飛散試驗，磨耗量規定應不超過幾%？',
    opts:['A. 10%','B. 15%','C. 20%','D. 25%'],
    ans:2,
    exp:'第02741章第2.2.2(3)B款：肯塔堡磨耗試驗磨耗量應≦20%。'
  },
  {
    id:19, tag:'02741',
    q:'開放級配瀝青混凝土依AASHTO T305試驗，瀝青垂流量應不超過多少%？',
    opts:['A. ≦0.1%','B. ≦0.3%','C. ≦0.5%','D. ≦1.0%'],
    ans:1,
    exp:'第02741章第2.2.2(3)A款：垂流量應≦0.3%。'
  },
  {
    id:20, tag:'02741',
    q:'粒料與瀝青材料在拌和時之溫度，兩者相差不得超過幾℃？',
    opts:['A. 10℃','B. 15℃','C. 20℃','D. 25℃'],
    ans:1,
    exp:'第02741章第3.2.1(2)A款：粒料與瀝青拌和時之溫度，彼此相差不得超過15℃。'
  },
  {
    id:21, tag:'02741',
    q:'細粒料依硫酸鈉健度試驗（五循環），重量損失不得大於多少%？',
    opts:['A. 10%','B. 12%','C. 15%','D. 18%'],
    ans:2,
    exp:'第02741章第2.1.4(2)B款：細粒料硫酸鈉健度試驗（五循環）重量損失不得大於15%（粗粒料為12%）。'
  },
  {
    id:22, tag:'02741',
    q:'用於底層之瀝青混凝土，包裹百分率不得少於多少%？',
    opts:['A. 80%','B. 85%','C. 90%','D. 95%'],
    ans:2,
    exp:'第02741章第3.2.1(3)E款：用於底層包裹百分率不得少於90%，面層不得少於95%。'
  },
  {
    id:23, tag:'02741',
    q:'礦物填縫料（石粉）通過0.075mm（No.200）篩的百分率規定為何？',
    opts:['A. 90～100%','B. 80～100%','C. 70～100%','D. 60～100%'],
    ans:2,
    exp:'表02741-4：礦物填縫料通過0.075mm篩之百分率為70～100%。'
  },
  {
    id:24, tag:'02741',
    q:'每部貨車之空重應至少每天測定幾次？',
    opts:['A. 1次','B. 2次','C. 3次','D. 每載一次'],
    ans:0,
    exp:'第02741章第3.1.1(12)E款：每部貨車空重每天工作開始時至少應測定1次。'
  },

// ── State ──
let userAnswers = {};
let showExplanations = false;
let currentFilter = 'all';

function buildQuiz(questions) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.id}`;
    card.dataset.tag = q.tag;

    const tagLabel = { '02741':'02741 一般要求','02742':'02742 鋪面','02747':'02747 黏層','02966':'02966 再生瀝青' }[q.tag];

    const optsHtml = q.opts.map((opt, i) => {
      const key = ['A','B','C','D'][i];
      return `<label class="option-label" id="opt-${q.id}-${i}" onclick="selectAnswer(${q.id}, ${i})">
        <input type="radio" name="q${q.id}" value="${i}">
        <span class="opt-key">${key}</span>
        <span>${opt.substring(3)}</span>
      </label>`;
    }).join('');

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q ${q.id}</span>
        <span class="q-tag">${tagLabel}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div class="explanation" id="exp-${q.id}">💡 ${q.exp}</div>
    `;

    // Restore state
    if (userAnswers[q.id] !== undefined) {
      restoreAnswer(q, card);
    }

    container.appendChild(card);
  });
}

function selectAnswer(qid, optIdx) {
  if (userAnswers[qid] !== undefined) return; // already answered

  const q = QUESTIONS.find(x => x.id === qid);
  userAnswers[qid] = optIdx;

  const card = document.getElementById(`card-${qid}`);
  const correct = q.ans;

  // Style options
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById(`opt-${qid}-${i}`);
    if (i === optIdx) {
      lbl.classList.add(optIdx === correct ? 'correct-answer' : 'wrong-answer');
      lbl.classList.add('selected');
    }
    if (i === correct && optIdx !== correct) {
      lbl.classList.add('correct-answer');
    }
  }

  card.classList.add(optIdx === correct ? 'answered-correct' : 'answered-wrong');

  if (showExplanations) {
    document.getElementById(`exp-${qid}`).classList.add('show');
  }

  updateScore();
  updateProgress();
}

function restoreAnswer(q, card) {
  const optIdx = userAnswers[q.id];
  const correct = q.ans;

  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById(`opt-${q.id}-${i}`);
    if (!lbl) continue;
    if (i === optIdx) {
      lbl.classList.add(optIdx === correct ? 'correct-answer' : 'wrong-answer');
      lbl.classList.add('selected');
    }
    if (i === correct && optIdx !== correct) {
      lbl.classList.add('correct-answer');
    }
  }

  card.classList.add(optIdx === correct ? 'answered-correct' : 'answered-wrong');
}

function updateScore() {
  const answered = Object.keys(userAnswers).length;
  const correct = Object.entries(userAnswers).filter(([id, ans]) => {
    const q = QUESTIONS.find(x => x.id === parseInt(id));
    return q && q.ans === ans;
  }).length;
  const wrong = answered - correct;
  const rate = answered > 0 ? Math.round(correct / answered * 100) : 0;

  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-rate').textContent = answered > 0 ? rate + '%' : '—';
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('progress-fill').style.width = (answered / 100 * 100) + '%';
}

function showResult() {
  const answered = Object.keys(userAnswers).length;
  const correct = Object.entries(userAnswers).filter(([id, ans]) => {
    const q = QUESTIONS.find(x => x.id === parseInt(id));
    return q && q.ans === ans;
  }).length;

  const score = Math.round(correct / 100 * 100);
  document.getElementById('modal-score-num').textContent = score;
  document.getElementById('modal-detail').textContent = `共作答 ${answered} 題，答對 ${correct} 題，答錯 ${answered - correct} 題`;

  let grade = '';
  if (answered < 100) grade = '⚠️ 尚有 ' + (100 - answered) + ' 題未作答';
  else if (score >= 90) grade = '🏆 優異！技術規範掌握精熟';
  else if (score >= 80) grade = '✅ 良好！建議複習錯題';
  else if (score >= 70) grade = '📖 及格！仍有進步空間';
  else grade = '❌ 需加強！建議重新研讀規範';

  document.getElementById('modal-grade').textContent = grade;
  document.getElementById('result-modal').classList.add('show');
}

function resetAll() {
  userAnswers = {};
  buildQuiz(filterQuestions(currentFilter));
  updateScore();
  updateProgress();
  document.getElementById('hidden-count').textContent = '';
  showExplanations = false;
}

function toggleExplanations() {
  showExplanations = !showExplanations;
  document.querySelectorAll('.explanation').forEach(el => {
    const qid = parseInt(el.id.replace('exp-', ''));
    if (userAnswers[qid] !== undefined) {
      showExplanations ? el.classList.add('show') : el.classList.remove('show');
    }
  });
}

function filterQuestions(tag) {
  if (tag === 'all') return QUESTIONS;
  return QUESTIONS.filter(q => q.tag === tag);
}

function filterTag(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const filtered = filterQuestions(tag);
  buildQuiz(filtered);

  const hidden = 100 - filtered.length;
  const info = document.getElementById('hidden-count');
  info.textContent = tag !== 'all' ? `目前顯示 ${filtered.length} 題（共隱藏 ${hidden} 題）` : '';
}

function showOnlyWrong() {
  const wrongIds = Object.entries(userAnswers)
    .filter(([id, ans]) => {
      const q = QUESTIONS.find(x => x.id === parseInt(id));
      return q && q.ans !== ans;
    })
    .map(([id]) => parseInt(id));

  if (wrongIds.length === 0) {
    alert('目前沒有錯題！');
    return;
  }

  const wrongQ = QUESTIONS.filter(q => wrongIds.includes(q.id));
  buildQuiz(wrongQ);

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const info = document.getElementById('hidden-count');
  info.textContent = `顯示 ${wrongQ.length} 道錯題`;
}

// Init
buildQuiz(QUESTIONS);
updateScore();

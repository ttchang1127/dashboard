<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全街道與空間概論 - 考古題刷題系統</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            background-color: #eef2f5;
            color: var(--dark);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .quiz-info {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-left: 5px solid var(--primary);
        }
        .question-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
            transition: all 0.3s ease;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            gap: 15px;
        }
        .btn-option {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #cbd5e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-option:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .btn-option.selected {
            background: #e0f2fe;
            border-color: var(--primary);
            color: #0369a1;
        }
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #2980b9;
        }
        
        /* 結果樣式 */
        .result-box {
            display: none;
            background: #f0fdf4;
            border: 2px solid var(--success);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #166534;
            margin-bottom: 15px;
        }
        .score-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 1.2rem;
        }
        .score-correct { color: var(--success); font-weight: bold; }
        .score-wrong { color: var(--danger); font-weight: bold; }
        
        /* 交卷後的解答樣式 */
        .status-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .status-correct { background: #dcfce7; color: #15803d; }
        .status-wrong { background: #fee2e2; color: #b91c1c; }
        
        .explanation {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
            font-size: 0.95rem;
            background: #f8fafc;
            padding: 10px;
            border-radius: 4px;
        }
        .correct-ans-highlight {
            font-weight: bold;
            color: #15803d;
        }
        .wrong-ans-highlight {
            font-weight: bold;
            color: #b91c1c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 考古題自我刷題系統</h1>
    <div class="subtitle">單選是非題庫測驗</div>

    <div class="quiz-info">
        <span id="quiz-count-info">正在準備題目...</span>
        <span>題庫總數：<span id="total-pool-count">0</span> 題</span>
    </div>

    <div id="result-box" class="result-box">
        <div class="result-title">🎉 測驗完成！</div>
        <div class="score-container">
            <div>正確：<span id="correct-count" class="score-correct">0</span> 題</div>
            <div>錯誤：<span id="wrong-count" class="score-wrong">0</span> 題</div>
        </div>
        <button onclick="window.location.reload()" style="margin-top:15px; padding:8px 15px; cursor:pointer;">再做一次新測驗</button>
    </div>

    <div id="quiz-container"></div>

    <div class="actions">
        <button id="submit-btn" class="btn-submit" onclick="submitQuiz()">提交試卷查看結果</button>
    </div>
</div>

<script>
// 已統一校正 ans 欄位為標準全形字符 "○" 與 "✕"
const rawBank = [
    { id: 1, q: "完整街道理念強調道路設計應僅優先考慮機動車輛和公共運輸系統，不需包含行人或自行車使用者的需求。", ans: "✕", exp: "完整街道理念旨在包容所有道路使用者需求（行人、自行車、公共運輸等）。" },
    { id: 2, q: "瑞典提出的 Vision Zero（零死亡願景）核心精神認為，交通死亡是現代生活無可避免的結果。", ans: "✕", exp: "Vision Zero 的核心精神是車禍死亡是可以預防和避免的，而非現代生活的必然，且責任應由道路設計者 and 政策制定者承擔更多。" },
    { id: 3, q: "在人本街道的五大核心價值中，「健康」效益主要體體現在鼓勵民眾多走路或騎自行車，增加運動機會。", ans: "○", exp: "街道對個人的健康好處包括增加運動機會，遠離慢性病風險，並提升心理健康。" },
    { id: 4, q: "台灣曾在1943年就有街道塑造的觀念，並指定要有騎樓空間給人遮陽休息。", ans: "○", exp: "1943年台灣已有街道塑造觀念，並重視騎樓遮蔭空間的功能。" },
    { id: 5, q: "韓國為改善「行人地獄」形象，所推行的「5030政策」是指全國市區限速50公里，學區和行人多的地方限速30公里。", ans: "○", exp: "韓國的5030政策明確規定了全國市區限速50公里，學區及行人多處限速30公里。" },
    { id: 6, q: "在街道設計中，將道路空間的重新分配視為一種追求人與車之間最大公約數的「正義」。", ans: "○", exp: "重新平衡人車關係的目標，是讓大家都達到一個安全又便利的平衡狀態（正義）。" },
    { id: 7, q: "根據 M/P 矩陣的街道定位，商業大街通常屬於車行流通性（M）高但活動場所屬性（P）低的類型。", ans: "✕", exp: "商業大街屬於人流強度（P）高的類型，其設計需兼顧流通與活動，與城市要道流通性高但活動屬性低不同。" },
    { id: 8, q: "台灣在1998年將人行道建設正式納入法規《省市區道路工程設計標準》中。", ans: "○", exp: "1998年人行道建設納入法規《省市區道路工程設計標準》。" },
    { id: 9, q: "紐約時代廣場的改造計畫主要是透過縮減人行道空間來增加車道數，以改善交通擁塞。", ans: "✕", exp: "時代廣場改造是透過「道路空間轉換」將道路縮減，擴大行人廣場，創造城市活力。" },
    { id: 10, q: "街道空間概論認為，傳統道路的設計思維將道路視為承載多種生活活動與生態功能的複合空間。", ans: "✕", exp: "過去的認知是「道路只是開車穿越的路徑」。" },
    { id: 11, q: "為了提升城市韌性，街道基盤應積極推動透水鋪面及低影響開發（LID）設計，以利降溫和緩解淹水。", ans: "○", exp: "透水鋪面與LID設計是城市基盤回應氣候的措施，有助於都市降溫和排洪。" },
    { id: 12, q: "根據 Vision Zero 的核心理念，道路設計和政策制定者應該承擔較少的責任，安全問題應主要由駕駛人負責。", ans: "✕", exp: "Vision Zero 認為道路設計和政策制定者應該承擔更多責任確保安全，而不全是駕駛的責任。" },
    { id: 13, q: "歐洲城市在1973年石油危機後，開始反思汽車社會，並選擇轉向發展自行車社會，例如荷蘭。", ans: "○", exp: "全球石油危機（1973年）帶動反思汽車社會，荷蘭選擇了自行車社會。" },
    { id: 14, q: "台灣當前主要的道路議題之一是車道淨寬往往過寬，導致機車鑽車、併行等無序且不安全的現象。", ans: "○", exp: "台灣街道現存問題包括寬車道因違停鑽車變得無序不安全，例如車道寬達5.5公尺。" },
    { id: 15, q: "人本街道的設計理念主張，在今日每一個道路使用者（包括行人、自行車、公共運輸、汽機車）都是重要的。", ans: "○", exp: "核心精神是每一個使用者都是重要的，因為所有乘客與駕駛下了車後，大家都會是行人。" },
    { id: 16, q: "紐約的數據顯示，將路邊車道轉換為公共座位區，對於鄰近企業的銷售額並無顯著影響，主要效益僅在於改善空氣品質。", ans: "✕", exp: "該轉換導致鄰近企業銷售增長了14%，且擴建步行設施降低了商業空置率達49%。" },
    { id: 17, q: "雖然韓國推行了全面的交通改革，但由於未能有效擴充人行與自行車空間，其交通安全死亡人數的下降幅度仍不如日本。", ans: "✕", exp: "韓國成功降低了50%的交通事故死亡人數，其措施包括車道瘦身和擴充人行自行車空間。" },
    { id: 18, q: "在處理路口人車交織問題時，友善停等街角的考量應包括提供充足的空間，但應避免設置轉角防護設施，以確保車輛可靈活轉彎。", ans: "✕", exp: "友善停等街角需要充足的空間，更需要設置確實的防護隔離措施，避免機動車輛入侵干擾行人。" },
    { id: 19, q: "在台灣，都市計畫中關於建築物附設停車空間的規定是近年才新增的法規，用以應對汽機車普及後停車位不足的壓力。", ans: "✕", exp: "《民國82年都市計畫法台北市施行細則》即已規定建築物應附設停車空間，這是在汽機車大量進入生活前環境就建立起來的法規。" },
    { id: 20, q: "依據 M/P 矩陣的定位，城市要道（Movement Corridors）的道路設計目標應該將速度管理設定得相對保守，以兼顧路側的商業活動。", ans: "✕", exp: "城市要道強調高流通性（M），其設計目標應確保車行順暢，因此應盡量降低路側活動需求。" },
    { id: 21, q: "台北市推行路邊停車收費後，主要目的是透過價格機制將車輛轉移至更適合長時間停放的停車場，而非增加周轉率服務更多短時臨停者。", ans: "✕", exp: "停車收費是為了縮短停車時間，提升車位周轉率，使臨停消費更便利，並將長時間停車轉移到更適合的地方。" },
    { id: 22, q: "要在有限的巷弄空間內創造連續的步行空間，可行的策略之一是縮減路邊停車位，並設置至少2公尺寬的標線型人行道以利輪椅交會。", ans: "✕", exp: "輪椅交會所需寬度約為2.2公尺（單人輪椅1.1m），且受限條件下人行道淨寬最低為0.9公尺，故2公尺淨寬通常難以達成。" },
    { id: 23, q: "在行人安全事故的預防上，將車道寬度變窄至3.0m以下將會大幅影響行車效率，導致車輛在尖峰時段的運行效率急遽下降。", ans: "✕", exp: "數據顯示，車道寬度變窄可減少事故，但對行車效率的影響是微乎其微的。" },
    { id: 24, q: "韓國的交通改革不僅包含道路設施的調整，也包括了《交通弱者便利移動增進法》等法規，引進「行人優先區域」來改善安全。", ans: "○", exp: "南韓的交通治理是綜合性的，包括道路瘦身、5030政策以及2005年引進「行人優先區域」的《交通弱者便利移動增進法》。" },
    { id: 25, q: "儘管行人地獄的形象已引起社會重視，但台灣目前在市區道路規範上，對於人行道的最小淨寬要求，並沒有針對輪椅族群的特殊考量。", ans: "✕", exp: "《市區道路及附屬工程設計規範》在受限條件下規定淨寬不得小於0.9公尺，此為輪椅族的最低需求寬度。" },
    { id: 26, q: "理想街道的設計概念中，涵蓋了生態保育的目標，例如透過行道樹的綠蔭和複層植栽的設計來促進生物多樣性。", ans: "○", exp: "理想街道設計概念包括生態（綠樹遮蔭、韌性城市、動植物生活）和多種功能，複層植栽能提高生物多樣性。" },
    { id: 27, q: "在規劃主要道路（如 30m路幅）時，人本街道的理念認為應優先增加車道寬度，以確保車輛高速通過，從而提升整體路網的流通能力。", ans: "✕", exp: "30m道路的目標是不需求寬，而是要求順暢，重點在於設置左轉專用車道，而非拓寬車道以追求高速。" },
    { id: 28, q: "紐約市的完整街道政策推動效益顯示，擴大步行設施後其商業空置率反而出現了顯著的上升。", ans: "✕", exp: "擴建步行設施降低了商業空置率達49%。" },
    { id: 29, q: "根據日本的交通安全改善經驗，透過持續強化道路設計規範，可以顯著降低交通事故的死亡人數。", ans: "○", exp: "日本從1960年代決心改善交通安全，一步一步強化道路設計規範，使交通死亡人數大幅下降。" },
    { id: 30, q: "城市地下基盤設施的集中整合（共同管道）主要應應用於既有城市的改造工程中，以減少重複開挖的成本。", ans: "✕", exp: "地下基盤設施的集中整合主要應用於新市鎮開發。" },
    { id: 31, q: "在設計路口時，應將行人穿越馬路的路徑設計得越長越好，以確保行人有足夠的時間觀察各方向來車。", ans: "✕", exp: "友善行人穿越馬路應「縮短行穿線路徑」，以減少行人暴露於車道上的時間。" },
    { id: 32, q: "儘管人本街道設計提供了許多益處，但目前的研究尚未能證實它對於兒童安全上學是否有實際幫助。", ans: "✕", exp: "美國完整街道的推動效益中包含「提供兒童一個安全的通勤方式」。" },
    { id: 33, q: "由於大眾運輸系統和共享運具的普及，城市不再需要傳統的私人汽車或機車停車位，應完全取消以確保人行空間。", ans: "✕", exp: "仍需平衡人與車的關係，共享運具是提升大眾運輸效率的關鍵，而非完全取消私人運具空間。" },
    { id: 34, q: "台灣自從高速公路通車後，機動車輛的擁有量快速增加，但保障人行的基礎設施未能同步跟上，導致了人車混雜的街道空間。", ans: "○", exp: "1978年中山高通車後（民國67年），機動車輛快速普及，但缺乏相應基礎建設保障人行空間，形成人車混雜。" },
    { id: 35, q: "依據實測結果，拼砌磚透水鋪面站點在晴天正午時的溫度比混凝土鋪面站點高出約5℃，證明透水鋪面反而會加劇都市熱島效應。", ans: "✕", exp: "拼砌磚透水鋪面站點的溫度比混凝土鋪面站點低5℃（32°C vs 37°C），證明其有助於都市降溫。" },
    { id: 36, q: "為了讓路口人車交織更有秩序，道路設計應著重於減少交織機會，例如設置行人專用時相和左轉專用車道。", ans: "○", exp: "減少人車交織機會是路口設計的關鍵，包括人車分離穿越、左轉專用道及專用時相。" },
    { id: 37, q: "道路設計的思維應當認識到，道路不僅是用於開車穿越的路徑，更是一個複雜介面組成的生活空間。", ans: "○", exp: "道路設計思維應從「道路只是開車穿越的路徑」轉變為一個複雜介面組成的生活空間。" },
    { id: 38, q: "丹麥學者簡·蓋爾（Jan Gehl）認為，城市中車與人的競合，主要導致歐洲城市以車為本佔據都市空間，最終只能保障車行為先治理。", ans: "✕", exp: "歐洲城市在石油危機後走向收復型城市，將人行空間從車行空間收復。" },
    { id: 39, q: "紐約第一大道改造的成功經驗顯示，透過道路瘦身和增設自行車道，能有效提升公共運輸的服務效率。", ans: "○", exp: "改造包括道路瘦身、增加自行車道 and 公共運輸（公車）服務，零售銷售額因此增長71%。" },
    { id: 40, q: "台灣因車輛保有量極高，為確保駕駛便利，道路使用者文化普遍接受為了停車便利和做生意而犧牲步行空間。", ans: "○", exp: "台灣的用路文化存在「停車買東西要便利」、「做生意要賺錢」等導致「被迫不能走路」的現象。" },
    { id: 41, q: "道路的橫斷面組成元素中，公共設施帶包含路邊停車帶、變電箱和路燈桿，但不包括人行道或交通島。", ans: "✕", exp: "人行道和交通島是道路橫斷面的主要構成要素，公共設施帶則包含路邊停車帶、燈桿、候車亭、街道家具等。" },
    { id: 42, q: "美國公路及交通協會（AASHTO）將高速公路車道的建議寬度訂為3.6公尺（12英尺）。", ans: "○", exp: "AASHTO的規範將12英尺（約3.6公尺）作為高速公路車道的建議設計寬度。" },
    { id: 43, q: "「自我解釋道路」（SER）的核心設計精神是創造直覺且符合駕駛人預期的道路環境，使其自然地調整行為。", ans: "○", exp: "自我解釋道路強調創建直觀且預期的道路環境，使駕駛者和行人能自然地理解並調整行為。" },
    { id: 44, q: "台灣現行的市區道路分類體系（快速道路、主要道路、次要道路、服務道路），其設計上最優先考慮的指標是車輛通行設計速率。", ans: "○", exp: "台灣的道路分類體系主要著重於車輛通行設計速率，缺乏活動人潮的步行空間需求考量。" },
    { id: 45, q: "根據《市區道路及附屬工程設計規範》，對於一般情況下的行人淨寬要求是以2.5公尺以上為宜，且不得小於1.5公尺。", ans: "○", exp: "人行道淨寬一般情況下不得小於1.5公尺，以2.5公尺以上為宜。" },
    { id: 46, q: "在多車道的主要道路路段，建議的車道寬度應不小於3.0公尺，且不建議大於3.2公尺，以避免同車道併行。", ans: "○", exp: "多車道路段不建議大於3.2公尺，以維持各車種保持車道化行駛樣態避免同車道併行，但不應小於3.0公尺。" },
    { id: 47, q: "人因工程（Human Factors Engineering）在道路設計上的主要應用原則是以車輛為設計主體，追求最大通行效率。", ans: "✕", exp: "人因工程在道路設計中的應用原則是以「用路人」為設計主體，認識人的限制和能力。" },
    { id: 48, q: "在道路設計的考量因素中，道路的設計速率一旦設定後很難透過簡單的法規調整來改變，且過高的設計速度可能導致駕駛人超速行駛。", ans: "○", exp: "道路的設計速率一旦設立便難以更改，與可通過法規輕易調整的法定限速不同，過高的設計速度可能鼓勵駕駛者加速。" },
    { id: 49, q: "在彎曲路段使用「楔形標線」是人因工程解決方案的一種，其目的是利用視覺錯覺，讓駕駛人感覺車道變窄，不自覺地降速。", ans: "○", exp: "楔形標線利用視覺錯覺，製造車道寬度縮減之錯覺，讓駕駛人不自覺地事先降低車速。" },
    { id: 50, q: "在道路分級中，高可行性（Mobility）但低可及性（Access）的道路，最可能對應到服務性道路或巷道。", ans: "✕", exp: "高可行性但低可及性的道路對應聯外道路/城市要道（主要道路）。" },
    { id: 51, q: "根據研究分析，都市道路中最安全的車道寬度範圍大約在3.0公尺至3.2公尺之間。", ans: "○", exp: "研究顯示，最安全的道路寬度範圍大約在3.1公尺至3.2公尺之間。" },
    { id: 52, q: "「寬容設計」（Forgiving Design）強調即使人們犯下無心之錯，道路設計也應盡力降低錯誤帶來的傷害。", ans: "○", exp: "寬容設計的核心是除了預防人們犯錯之外，更重要的是人們犯錯之後如何盡力降低傷害。" },
    { id: 53, q: "荷蘭城市路段採用50公里/小時的速度管理情境時，會故意將路側設施（如樹木）靠近車道放置，以製造視野狹隘感來降低駕駛速度。", ans: "○", exp: "在50公里/小時的情境下，會故意將路側設施靠近車道放置，給予視野狹隘感，促使駕駛人降速。" },
    { id: 54, q: "在道路設計的七步驟流程中，「確保基本人行寬度」必須在「配置主車道」之前處理，以實踐人本交通。", ans: "○", exp: "斷面設計流程強調先確保基本人行寬度，避免機動車道擠壓行人空間，體現人本優先。" },
    { id: 55, q: "透過將寬車道收窄至合宜寬度，對於行車效率會產生顯著影響，但能讓機車鑽車的空間變少。", ans: "✕", exp: "縮窄車道對行車效率影響微乎其微，但能降低事故率並減少機車鑽車。" },
    { id: 56, q: "台灣在進行道路橫斷面設計時，為了避免機動車道擠壓人行空間，應優先以確保行人淨寬為首要，然後才是配置主車道。", ans: "○", exp: "斷面設計流程強調先確保基本人行寬度，再配置主車道以實踐人本優先。" },
    { id: 57, q: "在人因工程的理念下，為了有效減少駕駛人因資訊超載而分心，應將路標集中設置於行穿線正上方，以確保標誌能被快速閱讀。", ans: "✕", exp: "應避免將路標設置於需要駕駛人注意力的路段，例如行穿線正上方，以避免資訊超載導致分心。" },
    { id: 58, q: "服務性道路的設計中，採用「模糊行車界線」配置（如 5.5-6公尺單車道雙向通行）的目的，是透過緊湊設計促使駕駛人降速。", ans: "✕", exp: "模糊配置（5.5-6米）是透過不確定的行車界線來提高駕駛人警覺心；緊湊配置（2.8-3.0米）才是透過縮小空間降速。" },
    { id: 59, q: "根據事故率與車道寬度的關係，在主要道路上，車道越寬則行車越安全，因此應盡量設計達4.5公尺以上的寬度。", ans: "✕", exp: "車道寬度超過3.3公尺的道路會使得整體的側撞事故次數上升，且外車道越寬，事故越多。" },
    { id: 60, q: "在主要幹道進行出入口管理時，應優先透過調整路網結構，將高強度路側活動導向次要道路或服務性道路。", ans: "○", exp: "應合理調整路網結構，讓舊市區道路吸收高強度路側活動，新建道路吸收通過性車流，以平衡可行性與可及性。" },
    { id: 61, q: "「自我解釋道路」的理念強調，道路設計應具有一致性，即同一位階道路的幾何設計和視覺特徵應保持高度相似，以符合駕駛人期望。", ans: "○", exp: "SER強調同一位階的差異要小，不同位階的差異要大。" },
    { id: 62, q: "根據人因工程對駕駛人視覺的理解，採用高對比度、更大字體的標誌，是為了彌補人眼辨識能力有限的缺陷，同時考慮弱視力族群。", ans: "○", exp: "這是人因工程應用原則，旨在認識人的限制和能力，設計應考慮弱勢視力族群。" },
    { id: 63, q: "為了實踐「大道至簡」的理念，設計者應追求簡單和直觀，減少所有交通號誌，以避免用路人受到繁瑣規則的干擾。", ans: "✕", exp: "「大道至簡」是減少「不必要的」交通管制和複雜性，追求簡單和直觀，而非取消所有號誌。" },
    { id: 64, q: "台灣在進行道路設計時，應建立設計速率漸變的指引，以避免在設計速率差異過大的路段，因駕駛人心態未能及時調整而成為事故熱點。", ans: "○", exp: "國內規範課題是缺乏漸變指引，設計速率變化大的路段易成為事故熱點。" },
    { id: 65, q: "根據《市區道路及附屬工程設計規範》，服務道路若路寬在12公尺以下，經主管機關同意，其人行道淨寬可不小於0.9公尺。", ans: "○", exp: "道路寬度12公尺以下，淨寬不得小於1.2公尺，若受限於現況，經同意可不小於0.9公尺。" },
    { id: 66, q: "在主要道路上，設置路段行人庇護島（Pedestrian Refuge Island）可使行人一次只需注意單一方向來車，並藉此製造狹窄節點促使駕駛人降速。", ans: "○", exp: "路段庇護島設計可將穿越分成兩段，行人一次只需注意一側來車，且實體設施可促使駕駛人降速。" },
    { id: 67, q: "在次要道路的設計中，直線路段的車道寬度應盡量維持最低設計需求寬度即可，以避免過度設計導致駕駛人超速。", ans: "○", exp: "次要道路的設計應避免過度設計，直線路段建議維持最低設計需求寬度即可。" },
    { id: 68, q: "根據道路的構成要素，供給管（如瓦斯、自來水）由於有接戶需求，通常埋設於鄰近建築的公共設施帶下方。", ans: "○", exp: "供給管有接戶需求之管線，通常埋在鄰近建築的公共設施帶下方。" },
    { id: 69, q: "荷蘭主要幹道（80kph）的速度管理情境，要求必須增設中央分隔帶以防止對向車輛的正面碰撞，並且路側不允許設置任何行人或自行車設施。", ans: "✕", exp: "80kph情境應透過中央分隔帶防止正面碰撞；若有行人和自行車設施，應設置護欄進行物理分離，而非不允許設置。" },
    { id: 70, q: "透過調整路網結構來達成速度管理，可以藉由正交路口的轉向行為，重整進入市區道路駕駛人的用路心態。", ans: "○", exp: "路網調整是速度管理手段之一，正交化路口轉向有助於重整駕駛人心態。" },
    { id: 71, q: "儘管縮減車道寬度對行車效率影響甚微，但其連帶好處是能將騰出的空間劃設給機車專用道或額外的汽車停車格。", ans: "✕", exp: "騰出的空間應優先劃歸人行道或其他公共設施帶，而非僅用於增加機車專用道或汽車停車格。" },
    { id: 72, q: "在次要道路路段設計中，由於車流量大但車速較慢，因此在橫斷面配置上通常不會設置任何分隔帶。", ans: "✕", exp: "次要道路的典型斷面圖中，仍可設置中央分隔帶。" },
    { id: 73, q: "道路橫斷面構成要素中的「人行道」和「自行車道」，在道路功能定位為「主要道路」時，通常是與機動車道實體隔離的。", ans: "○", exp: "主要道路（高流量高車速）的設計要求寬闊的人行道、自行車道通常與機動車道隔離。" },
    { id: 74, q: "透過人因工程的理念，將寬車道收窄至合宜寬度，可以帶來機車不再鑽行，並減少汽車被高速刷卡的共同好處。", ans: "○", exp: "縮窄車道可維持車道化行駛，減少機車鑽行和汽車被高速刷卡的現象。" },
    { id: 75, q: "根據「大道至簡」的理念，所有道路的設計都應該追求極低的設計速率，以確保最大的安全性。", ans: "✕", exp: "大道至簡強調設計應簡單直觀，符合駕駛人期望，用工程手段營造出符合位階的道路，而非所有道路都追求極低設計速率。" },
    { id: 76, q: "在人行道淨寬無法滿足一般標準時，可以考慮將電箱等大型公共設施地下化，以爭取更多連續的行人通行空間。", ans: "○", exp: "將公共設施帶地下化（如變電箱地下化）是確保人行淨寬連續性的策略之一。" },
    { id: 77, q: "根據人因工程的理念，應避免在路口處設置任何形式的交通標誌，因為標誌是注意力稀缺資源的干擾。", ans: "✕", exp: "應是避免在同一處放置過多交通標誌，或避免設於需要駕駛人注意力的路段，而非完全取消。" },
    { id: 78, q: "寬容設計（容錯設計）的目的是：除了預防人們犯錯之外，更重要的是認清人非聖賢孰能無過，當人們犯錯時，環境能包容並將傷害降到最低。", ans: "○", exp: "寬容設計的核心在於當人們犯下無心之錯時，環境防護與物理緩衝能降低其帶來的實體傷害。" },
    { id: 79, q: "荷蘭在城市路段採用 50 公里/小時的速度管理情境時，為了抑制駕駛速度，設計上可以故意將樹木和電線桿等路側設施靠近車道放置。", ans: "○", exp: "荷蘭經驗顯示，靠近車道路側的設施可以給予駕駛人視野狹隘感與邊界危機感，從而使其自然降低車速。" },
    { id: 80, q: "為了徹底落實人本交通，在既有城市的主要道路上應完全開放所有巷道與主要道路自由交會，不應進行出入口管理。", ans: "✕", exp: "主要道路應實施出入口管理（Access Management），合理調整路網結構，讓舊市區道路吸收路側活動，新建道路吸收通過性車流，以平衡可行性與可及性。" },
    { id: 81, q: "在斷面設計流程中，應優先配置中央主車道寬度，最後剩下的剩餘空間再分配給人行道使用。", ans: "✕", exp: "斷面設計流程應遵循人本優先原則，優先確保基本人行與非機動車通行寬度，避免機動車道無止境擠壓行人空間。" },
    { id: 82, q: "研究表明，縮減過寬的車道寬度（例如主要幹道縮減至 3.0-3.2 公尺），對整體行車效率和車速的下降幅度微乎其微，但能顯著降低事故率。", ans: "○", exp: "適度縮減車道寬度可強迫駕駛者保持車道化行駛樣態，顯著降低車禍事故率，且對總通行效率影響極小。" },
    { id: 83, q: "服務性道路（鄰里巷弄）的設計中，採用「模糊行車界線」配置（如單車道雙向通行5.5-6公尺寬），其目的是透過行車空間的不確定性，主動讓駕駛人保持警覺心並促使降速。", ans: "○", exp: "不刻意劃分明確車道線的模糊配置，能使機動車輛在社區巷弄內主動提高注意力並自然減速，保障行人與活動安全。" },
    { id: 84, q: "人因工程在道路設計中的應用原則是：以車輛為設計主體，追求最大通行效率，用路人必須絕對配合環境標誌。", ans: "✕", exp: "人因工程在道路設計中的核心原則是以「用路人」為設計主體，充分認識人的生物與心理限制，並創造直覺、友善的道路環境。" },
    { id: 85, q: "「自我解釋道路」(Self-Explaining Roads) 核心精神是藉由大量、複雜的文字警告告示牌，來強迫駕駛人降速。", ans: "✕", exp: "SER 強調的是利用道路物理幾何（如路幅寬窄、鋪面材質、綠化形式）的一致性與直覺性，讓駕駛人自行採取安全速度，而非依賴過多警示告示牌。" },
    { id: 86, q: "道路設計中，「設計速率」一旦在規劃初期設定過高，往往會導致完工後的實際行駛速率偏高，進而增加超速與事故風險。", ans: "○", exp: "過高的設計速度會使得道路環境呈現寬闊、平直與直順的物理狀態，容易誘導駕駛人無意間超速行駛。" },
    { id: 87, q: "在彎曲路段或進入村落前，路面上劃設的「楔形標線」（視覺縮減標線），是利用人因工程視覺錯覺來促使駕駛人提前降速。", ans: "○", exp: "楔形標線是利用人因工程視覺錯覺，製造車道寬度快速縮減之錯覺，讓駕駛人不自覺地事先降低車速以保障安全。" },
    { id: 88, q: "根據我國《市區道路及附屬工程設計標準》，一般情況下市區道路人行道的淨寬度最低不得小於 1.5 公尺。", ans: "○", exp: "法規規定人行道淨寬一般情況下不得小於 1.5 公尺，受限條件下才可局部放寬至 0.9 公尺。" },
    { id: 89, q: "為了防止車輛同車道併行或機車任意鑽行危險，都市多車道主要道路的單一車道寬度建議不要大於 3.2 公尺。", ans: "○", exp: "維持 3.0 ~ 3.2 公尺的適度車道寬，能有效約束車種各行其道，維持車道化行駛樣態，避免超速或同車道倂行危險。" },
    { id: 90, q: "美國公路及交通協會 (AASHTO) 規範將 12 英尺（約 3.6 公尺）作為所有都市地區一般市區道路車道的基本唯一標準寬度。", ans: "✕", exp: "3.6 公尺（12英尺）是高速公路（Highways）或快速道路的基本設計寬度，都市一般市區道路應視速限與功能位階適度縮減。" },
    { id: 91, q: "在台灣市區道路法規體系中，《市區道路及附屬工程設計標準》屬於經立法院三讀通過的「法律」層級文件。", ans: "✕", exp: "《市區道路及附屬工程設計標準》是由行政機關（內政部）頒布執行的法規命令層級，而非立法院通過的「法律」。" },
    { id: 92, q: "「交通寧靜區」的主要手段是透過法律宣宣導與提高罰金，不需要進行實體工程（如減速丘、縮小路口等）的改造。", ans: "✕", exp: "交通寧靜區主要依賴實體、物理性的工程設計手段（如曲折道路、減速丘、窄化車道、路口外推）來達成強制降速。" },
    { id: 93, q: "路側「設施帶」的集中整合設計，除了可以安放路燈、植栽與變電箱外，還能有效保障人行道淨空間的連續與順暢。", ans: "○", exp: "設施帶能有效收納各類路側公共障礙物，避免其侵入人行道通行淨空，保障步行動線順暢。" },
    { id: 94, q: "為了美化環境，主要道路上的植栽帶設計應盡量選擇高大且根系會嚴重盤根、突出的樹種，不需考慮對鋪面的破壞。", ans: "✕", exp: "路側植栽應避免選擇易造成根突或盤根的植物，以免破壞人行道鋪面結構、造成高低斷差，影響通行安全。" },
    { id: 95, q: "「標線型人行道」是台灣在空間受限巷弄內的一種階段性過渡手段，長遠來看仍應以實體實高人行道為最終改進目標。", ans: "○", exp: "標線型人行道缺乏實體物理防護，仍屬於過渡期手段，長遠來看仍應落實實體人車分流與防護空間。" },
    { id: 96, q: "路口「行人保護時相」（包含行人專用時相）的劃設，能徹底分離行人與轉彎車輛的衝突，大幅提升交織路口的安全度。", ans: "○", exp: "行人專用時相能完全隔絕行人與轉彎車流的交織衝突點，是解決交織路口安全極為重要的工程措施。" },
    { id: 97, q: "路口進行「街角擴大」（或稱人行道外推）的設計，會拉長行人在路口通過馬路的步行距離，增加暴露風險。", ans: "✕", exp: "街角擴大（人行道外推）能縮減車道寬度，反而能顯著縮短行人穿越馬路的暴露距離，同時降低車輛轉彎車速。" },
    { id: 98, q: "行道樹的植穴空間如果設計得過於狹小，不僅會限制喬木的生長，更會加速其根系往地表鋪面生長，進而造成嚴重的「根突」問題。", ans: "○", exp: "都市人行道環境對植栽來說是特殊限制條件，縮小植穴只會限制根系呼吸並加速其向上破壞鋪面，故植穴空間應盡量放大。" },
    { id: 99, q: "理想的無障礙人行道設計中，當人行道與騎樓或建築物出入口相接時，介面應儘量維持整平順接，避免產生突兀的階梯斷差。", ans: "○", exp: "整平順接是確保高齡者、身障輪椅族與推車族能無障礙通行的最關鍵、最基本的空間設計要素。" },
    { id: 100, q: "「完整街道」政策核心在於將所有的道路空間平均分配給每一種運具，因此不論道路寬窄，都必須塞入自行車道與輕軌軌道。", ans: "✕", exp: "完整街道強調的是因地制宜包容多元使用者需求，而非盲目在所有狹窄道路內強制塞入固定的硬體基礎設施。" },
    { id: 101, q: "捷運或輕軌等大眾運輸系統的引進，能有效承載大量的通勤旅次，進而騰出更多的地面道路空間來進行人本街道改造。", ans: "○", exp: "大眾運輸的普及與高運量特性，能大幅降低私人機動車輛的密度，進而為地面的步行空間與人本街道收復創造空間條件。" },
    { id: 102, q: "推動人本交通環境的改善，其最大的阻力往往來自於民眾對於「路邊免費停車便利性」傳統觀念的依賴與抗拒。", ans: "○", exp: "習慣車輛隨意臨停、免費佔用路側空間作為私人停車位的舊思維，常是人行空間拓寬工程中最需溝通與克服的社會阻力。" },
    { id: 103, q: "在規劃人本街道時，車行空間和人行空間是一對不可調和的矛盾，因此必須在所有道路上徹底消滅汽車通行權。", ans: "✕", exp: "人本街道追求的是「重新平衡人與車的關係」，使兩者在有限空間內各司其職，實現空間分配的安全與正義，而非完全禁止汽車。" },
    { id: 104, q: "道路橫斷面設計中的「主車道瘦身」工程，會造成城市物流效率雪崩式下跌，因此不應在市區幹道推廣。", ans: "✕", exp: "國際實證顯示，車道瘦身（Lane Narrowing）可約束車速並提高安全性，對於物流通行效率的整體影響微乎其微。" },
    { id: 105, q: "「大道至簡」的道路規劃理念是指，應盡量去除城市中繁雜、疊加、且容易互相干擾的交通標誌與號誌，用直觀、安全的幾何工程引導駕駛人行為。", ans: "○", exp: "大道至簡強調道路設計應追求簡單、直觀與一致，降低不必要的視覺負載與管制混亂，進而營造安全高效的人性化環境。" },
    { id: 106, q: "寬容設計（容錯設計）的目的是：除了預防人們犯錯之外，更重要的是認清人非聖賢孰能無過，當人們犯錯時，環境能包容並將傷害降到最低。", ans: "○", exp: "寬容設計的核心在於當人們犯下無心之錯時，環境防護能降低其帶來的傷害。" },
    { id: 107, q: "在 50 公里/小時的道路環境中，為了抑制駕駛速度，設計上可以故意將樹木和電線桿等路側設施靠近車道放置。", ans: "○", exp: "荷蘭經驗顯示，靠近車道路側的設施可以給予駕駛人視野狹隘感，從而自然降低車速。" },
    { id: 108, q: "為了徹底落實人本交通，在既有城市的主要道路上應完全開放所有巷道與主要道路自由交會，不應進行出入口管理。", ans: "✕", exp: "主要道路應實施出入口管理，合理調整路網結構，讓舊市區道路吸收路側活動，新建外環道路吸收通過性車流，以平衡可行性與可及性。" },
    { id: 109, q: "在斷面設計流程中，應優先配置中央主車道寬度，最後剩下的剩餘空間再分配給人行道使用。", ans: "✕", exp: "斷面設計應優先確保基本人行寬度，避免機動車道擠壓行人空間，以體現人本優先原則。" },
    { id: 110, q: "研究表明，縮減過寬的車道寬度（例如縮減至 3.0-3.2 公尺），對整體行車效率和車速的下降幅度微乎其微，但能顯著降低事故率。", ans: "○", exp: "適度縮減車道寬度可降低事故率，且對通行效率影響極小。" },
    { id: 111, q: "服務性道路（鄰里巷弄）的設計中，採用「模糊行車界線」配置，其目的是透過行車空間的不確定性，主動讓駕駛人保持警覺心並促使降速。", ans: "○", exp: "不刻意劃分明確車道線，能使車輛在巷弄內自然減速，保障行人安全。" },
    { id: 112, q: "人因工程在道路設計中的應用原則是：以車輛為設計主體，追求最大通行效率，用路人必須絕對配合環境標誌。", ans: "✕", exp: "人因工程是以「用路人」為設計主體，認識人的限制與能力，並創造直覺、符合預期的道路環境。" },
    { id: 113, q: "「自我解釋道路」(Self-Explaining Roads) 核心精神是藉由大量、複雜的文字警告告示牌，來強迫駕駛人降速。", ans: "✕", exp: "SER 強調的是利用道路物理幾何與無視覺特徵的一致性，讓駕駛人直覺採取安全速度，而非依賴過多告示牌。" },
    { id: 114, q: "道路設計中，「設計速率」一旦在規劃初期設定過高，往往會導致完工後的實際行駛速率偏高，進而增加超速與事故風險。", ans: "○", exp: "過高的設計速度會使道路環境過於寬闊、直順，容易導致駕駛人無意間超速。" },
    { id: 115, q: "在彎曲路段或進入村落前，路面上劃設的「楔形標線」（視覺縮減標線），是利用人因工程視覺錯覺來促使駕駛人提前降速。", ans: "○", exp: "楔形標線是利用人因工程視覺錯覺，製造車道寬度縮減之感，讓駕駛人不自覺地事先降低車速。" },
    { id: 116, q: "根據我國《市區道路及附屬工程設計標準》，一般情況下市區道路人行道的淨寬度最低不得小於 1.5 公尺。", ans: "○", exp: "法規規定人行道淨寬一般情況下不得小於 1.5 公尺，受限條件下才可放寬至 0.9 公尺。" },
    { id: 117, q: "為了防止車輛同車道併行或機車任意鑽行危險，都市多車道主要道路的單一車道寬度建議不要大於 3.2 公尺。", ans: "○", exp: "維持 3.0 ~ 3.2 公尺能有效維持車道化行駛樣態，避免超速或併行危險。" },
    { id: 118, q: "美國公路及交通協會 (AASHTO) 規範將 12 英尺（約 3.6 公尺）作為所有都市地區一般市區道路車道的基本唯一標準寬度。", ans: "✕", exp: "3.6 公尺是高速公路（Highways）的基本設計寬度，都市一般市區道路應視速限與位階適度縮減。" },
    { id: 119, q: "在台灣市區道路法規體系中，《市區道路及附屬工程設計標準》屬於經立法院三讀通過的「法律」層級文件。", ans: "✕", exp: "《市區道路及附屬工程設計標準》在法規命令層級，而非立法院通過的「法律」層級。" },

    { id: 122, q: "為了美化環境，主要道路上的植栽帶設計應盡量選擇高大且根系會嚴重盤根、突出的樹種，不需考慮對鋪面的破壞。", ans: "✕", exp: "路側植栽應避免選擇易造成根突或盤根的植物，以免破壞人行道鋪面、影響通行安全。" },

    { id: 124, q: "路口「行人保護時相」（包含行人專用時相）的劃設，能徹底分離行人與轉彎車輛的衝突，大幅提升交織路口的安全度。", ans: "○", exp: "行人專用時相能完全隔絕人車衝突點，是解決路口交織的重要安全措施。" },
    { id: 125, q: "路口進行「街角擴大」（或稱人行道外推）的設計，會拉長行人在路口通過馬路的步行距離，增加暴露風險。", ans: "✕", exp: "街角擴大能窄化車道、縮短行人穿越馬路的距離，同時降低車輛轉彎車速，進而提升安全。" },
    { id: 126, q: "行道樹的植穴空間如果設計得過於狹小，不僅會限制喬木的生長，更會加速其根系往地表鋪面生長，進而造成嚴重的「根突」問題。", ans: "○", exp: "人行道環境對植栽來說是限制條件，縮小植穴只會加速破壞鋪面，植穴空間應在可行範圍內盡量加大。" },
    { id: 127, q: "理想的無障礙人行道設計中，當人行道與騎樓或建築物出入口相接時，介面應儘量維持整平順接，避免產生突兀的階梯斷差。", ans: "○", exp: "整平順接是確保高齡者、身障者與推車族能無礙通行的關鍵基本要素。" },
    { id: 128, q: "「完整街道」政策核心在於將所有的道路空間平均分配給每一種運具，因此不論道路寬窄，都必須塞入自行車道與輕軌軌道。", ans: "✕", exp: "完整街道強調的是因地制宜包容多元需求，而非盲目地在所有道路塞入固定設施。" },
    { id: 129, q: "捷運或輕軌等大眾運輸系統的引進，能有效承載大量的通勤旅次，進而騰出更多的地面道路空間來進行人本街道改造。", ans: "○", exp: "大眾運輸的普及能減少私人機動車輛密度，為地面人本街道與廣場改造創造空間條件。" },
    { id: 130, q: "推動人本交通環境的改善，其最大的阻力往往來自於民眾對於「路邊免費停車便利性」傳統觀念的依賴與抗拒。", ans: "○", exp: "習慣車輛隨意臨停、免費佔用路側空間的舊思維，常是人行道收復與拓寬工程中最需溝通的社會議題。" },
    { id: 131, q: "路口轉角處之人行道設計，其緣石斜坡（無障礙坡道）應儘量對準行人穿越線（斑馬線）的方向，以利視障者及輪椅使用者直行通過。", ans: "○", exp: "緣石斜坡方向應與行人穿越線一致，避免將行動不便者或視障者誤導至路口中央衝突區。" },
    { id: 132, q: "在進行都市既有道路改善時，只要人行道的總寬度足夠，中央設置的變電箱、路燈或路樹不需要特別對齊、可以隨意交錯擺放。", ans: "✕", exp: "路側設施應儘量整合於「設施帶」並排列對齊，以確保「步行淨空動線」的連續性與直線性，避免行人因避開障礙物曲折前行。" },
    { id: 133, q: "所謂「人本交通」就是完全不考慮汽車的通行需求，甚至應該在所有都市主要幹道上全面禁止機動車輛行駛。", ans: "✕", exp: "人本交通的核心在於「重新平衡人與車的空間關係」，在確保弱勢用路人安全前提下，合理分配各運具空間，而非盲目全面禁止汽車。" },
    { id: 134, q: "推動完整街道（Complete Streets）的阻力，主要常來自民眾對於路邊免費停車空間被壓縮的抗拒與舊觀念之衝突。", ans: "○", exp: "路側空間由「免費停放私人車輛」轉化為「大眾通行與步行安全空間」，常需要長期的社會溝通與觀念轉變。" },
    { id: 135, q: "在寬度有限的鄰里巷弄中，劃設「標線型人行道」雖然缺乏實體物理防護，但仍是現階段改善無人行空間的一種可行過渡手段。", ans: "○", exp: "標線型人行道係受限空間下的階段性改善工具，長遠目標仍應視條件逐步提升為實體實高人行道。" },
    { id: 136, q: "市區道路設計中，為了徹底提升高齡者或行動不便者的通行品質，人行道的縱向坡度應越陡越好，以節省建造成本。", ans: "✕", exp: "無障礙設計規範要求人行道坡度應儘量平緩（縱坡度通常建議小於5%，受限時不大於8%），越平緩越安全，而非越陡越好。" },
    { id: 137, q: "「交通寧靜區」主要是在特定區域內透過微幾何工程手段（如曲折路徑、減速丘等）強迫車輛降低行駛速度，以保障居民與行人的安全。", ans: "○", exp: "交通寧靜區的核心手法即是運用物理性或視覺性的工程設計限制車速（如限制在30km/h以下），而非僅依賴宣導。" },
    { id: 138, q: "在人本交通路網中，所有的都市聯外道路與快速道路都應該設置大量的行人徒步區，完全取代原有的高架車行功能。", ans: "✕", exp: "都市道路具備不同位階（如Movement流通型與Place場所型）。快速道路及聯外道路以高效率流通為主，不適合盲目設置行人徒步區。" },
    { id: 139, q: "根據人因工程原理，當駕駛人的行車速度越快時，其注視前方的視野範圍會變得越狹窄（即隧道效應），因此更需要良好的路側視覺提示。", ans: "○", exp: "高速行駛會導致駕駛人視野縮減、動態視覺退化，環境設計需利用物理與視覺手段引導駕駛自然減速。" },
    { id: 140, q: "「自我解釋道路」（SER）的概念是指，透過精準且直覺的幾何道路設計，讓駕駛人不需要看滿街的警告告示牌就能本能地採取安全速限。", ans: "○", exp: "SER強調透過道路物理環境（路幅、標線、植栽）向駕駛傳達正確的速度訊息，達到「環境引導行為」的功效。" },
    { id: 141, q: "為了增加行人穿越馬路的安全性，路口設計中採用的「街角擴大」（人行道外推）可以有效窄化路口車道，縮短行人的暴露距離。", ans: "○", exp: "街角擴大能有效縮短行人跨越馬路的距離、增加行人等候空間，並強迫轉彎車輛減速。" },
    { id: 142, q: "都市計畫與道路設計不需互相配合，兩者是完全獨立發展的系統，因此設計街道時不需考慮周邊土地的使用分區屬性。", ans: "✕", exp: "道路設計（M/P矩陣）必須與周邊土地使用（如商業區、住宅區、學校）緊密結合，才能符合該街道的「場所（Place）」屬性需求。" },
    { id: 143, q: "「寬容設計」（Forgiving Design）的精神在於：認清用路人必然會犯錯，因此路側應提供實體防護、緩衝帶或排除障礙物，以降低事故傷害。", ans: "○", exp: "寬容道路設計承認人類非聖賢、孰能無過，旨在提供容錯空間，確保無心之過不至於演變成致命悲劇。" },
    { id: 144, q: "在既有市區狹窄道路上進行拓寬人行道工程時，如果無法取得更多路權，適度縮減過寬的車道寬度（如由3.5米調至3.0米）是常見的空間重分配策略。", ans: "○", exp: "透過車道瘦身（Lane Narrowing）將多餘空間提撥給行人或設施帶，是落實完整街道及空間正義的典型做法。" },
    { id: 145, q: "道路橫斷面中的「公共設施帶」只能用來擺放電力變電箱，絕對不允許規劃作為路邊公共機車停車格位使用。", ans: "✕", exp: "設施帶具備複合功能，在滿足行人通行淨空前提下，可適度規劃作為路邊停車帶（汽機車）、植穴、路燈、候車亭等整合空間。" },
    { id: 146, q: "「大眾運輸導向發展」（TOD）的核心理念之一，是藉由高品質、高密度的公共運輸站點結合友善的步行環境，以降低私人機動車輛的依賴。", ans: "○", exp: "TOD強調以大眾運輸站點為核心進行高密度混合開發，並提供無縫銜接的「最後一哩路」人本步行空間。" },
    { id: 147, q: "為了節省空間，人行道上的喬木植穴應該越小越好，甚至直接把樹幹用混凝土完全封閉填滿，最有利於行人通行與樹木生長。", ans: "✕", exp: "縮小植穴或用混凝土封死會阻斷根部呼吸及吸收水分，導致樹木枯死或產生嚴重的「根突」破壞鋪面。植穴應維持足夠透水面積。" },
    { id: 148, q: "都市路口劃設「行人保護時相」（包括專用時相或優先時相），主要目的在於徹底或部分分離行人與轉彎車輛的衝突時間，提升路口安全。", ans: "○", exp: "行人專用/優先時相能實施時間分流，有效減少或消除「行人綠燈過馬路卻被轉彎車輛撞擊」的常見交織衝突。" },
    { id: 149, q: "台灣街道在1943年《台灣都市計畫令》時期已有初步的街道塑造觀念，當時即規定部分商業街道需退縮建築或設置騎樓，以提供遮蔭與步行空間。", ans: "○", exp: "歷史文獻顯示，台灣早期的都市治理即存在透過騎樓提供遮蔭與公共步行空間的「街道塑造」思維。" },
    { id: 150, q: "在鄰里服務性道路中，將車道設計成完全筆直且無限寬廣，是國際公認實施「交通寧靜化」最有效的幾何工程手段。", ans: "✕", exp: "寬大平直的道路會誘導駕駛人加速。交通寧靜化應採用曲折道路（Chicanes）、窄化車道、設置減速平台等工程手段來約束車速。" },
    { id: 151, q: "南韓為了解決學區與市區的交通安全問題所推行的「5030政策」，是指市區幹道最高速限50公里/小時，學區及鄰里巷弄限速30公里/小時。", ans: "○", exp: "南韓「5030政策」透過實施全面性的法定速限管理，配合都市道路物理工程改造，顯著降低了行人的致死率。" },
    { id: 152, q: "「大道至簡」的現代街道規劃觀念，是指在複雜的都市路口應盡量架設、重疊越多越好的文字告示牌與管制標誌，以提醒駕駛人注意力。", ans: "✕", exp: "「大道至簡」強調去除過多、混亂、互相干擾的標誌號誌，降低駕車者的視覺負載，以簡單直觀的幾何工程（如實體島頭）引導正確行為。" },
    { id: 153, q: "瑞典在1997年提出的「Vision Zero」（零死亡願景），其核心精神在於：交通系統的設計與營運責任應由「設計者」與「用路人」共同承擔，且死亡不是不可避免的必然結果。", ans: "○", exp: "Vision Zero顛覆傳統將車禍全歸咎於個人違規的觀念，強調系統設計者（政策與工程端）必須承擔打造防錯容錯環境的最高責任。" },
    { id: 154, q: "人本街道設計中的「健康」效益，主要體現在透過打造舒適安全的步行環境，誘發民眾主動選擇走路或騎乘自行車，藉此增加日常運動量。", ans: "○", exp: "優質的街道設計具備提升公共健康的效益，能鼓勵主動運輸（Active Transportation），降低肥胖與慢性病風險。" },
    { id: 155, q: "紐約市時代廣場（Times Square）改造計畫的成功，實證了將原有的「車行空間」縮減並轉化為「行人廣場」，反而能帶動更高的周邊商業零售經濟效益。", ans: "○", exp: "實證顯示，時代廣場轉化為行人徒步廣場後，周邊店家的零售額與行人流量均大幅成長，打破了「減車道會破壞經濟」的傳統迷思。" },
    { id: 156, q: "在無障礙人行道設計中，所謂的「導盲磚」或「點狀警示帶」，其主要功能是為視障者提供方向指引，或在地形變更、路口銜接處提供危險警示。", ans: "○", exp: "視覺障礙者引導設施（如點狀警示、條狀定向）是用於無障礙動線中提供重要介面變化之物理提醒與動線定位。" },
    { id: 157, q: "「綠色基盤與都市韌性」融入街道設計，是指利用低影響開發（LID）技術、透水鋪面與生態草溝，使街道在暴雨時能協助分擔城市排水並減緩都市熱島效應。", ans: "○", exp: "現代理想人本街道不僅關注交通功能，更扮演了都市生態基盤（韌性城市、微氣候調節、透水保水）的重要角色。" },
    { id: 158, q: "根據我國規範，市區道路之單一車道寬度若設計得過於寬闊（例如大於3.5米以上），容易導致機車任意在同車道內鑽行或與汽車倂行，進增加擦撞風險。", ans: "○", exp: "過寬的車道容易造成車種併行混亂、不按車道化行駛，市區道路適度維持3.0-3.2米能穩定車流秩序。" },
    { id: 159, q: "在進行既有道路人行道改善工程時，若遇到路側大樹的根系隆起破壞鋪面，應本著速戰速決原則，直接用機具將主根刨除並覆蓋水泥即可，不需考量樹木倒伏危險。", ans: "✕", exp: "直接砍斷或刨除粗大主根會嚴重破壞樹木的結構結構，使其在颱風或強風中極易倒伏，危及用路人生命安全。應採樹穴擴大或抬高鋪面等生態工程手段解決。" },
    { id: 160, q: "人本交通環境的改善，不僅需要仰賴第一線工程設計（Engineering）的優化，更需要配合法規與執法（Enforcement）以及全面的教育宣導（Education）才能克竟全功。", ans: "○", exp: "交通安全與改善是一門跨領域學問，必須透過工程、教育、執法（即3E原則）多管齊下，方能徹底根治、翻轉交通環境。" },
    { id: 241, q: "人本交通環境改善需要「3E」原則互為表裡，也就是第一線工程設計優化（Engineering）、配合法規與執法（Enforcement）以及全面性的教育宣導（Education）。", ans: "○", exp: "交通安全與人本環境改善是一門綜合學問，必須透過工程、教育、執法三管齊下才能扭轉用路文化。" },
    { id: 242, q: "所謂「工程」（Engineering）手段，僅指將馬路鋪平、多蓋幾座高架橋，與人行道拓寬或路口外推無關。", ans: "✕", exp: "現代人本交通的工程手段，核心包含路口幾何改造、車道瘦身、行車寧靜化、無障礙人行道建置等空間重分配工程。" },
    { id: 243, q: "「執法」（Enforcement）在人本交通中的目的，是為了無限制地開罰單賺取財政收入，而非為了建立用路人「禮讓弱勢」的守法習慣。", ans: "✕", exp: "執法的核心目的在於透過合適的科技執法或實體取締，導正違規停車、不禮讓行人等惡習，保障弱勢用路人的生命財產安全。" },
    { id: 244, q: "「教育」（Education）手段的對象不僅包含普通駕駛人，也應包含道路規劃設計者、決策官員，甚至基層學童，以形成全社會的共識。", ans: "○", exp: "人本觀念翻轉需要全體社會階層的共同參與，從教育端紮根，方能落實人本交通文化的長遠轉型。" },
    { id: 245, q: "只要人本工程做得足夠完美，就完全不需要執法與教育的配合，用路人自然會達成100%守法。", ans: "✕", exp: "雖然良好的工程幾何能引導正確用路行為，但 3E 原則（工程、教育、執法）仍須互為表裡、相輔相成，缺一不可。" },
    { id: 246, q: "南韓在推動人本交通轉型的過程中，也同樣強調了跨部會整合與 3E 策略的共同推進，此經驗與我國目前推動的政策方向一致。", ans: "○", exp: "南韓藉由修法、嚴格執法、大規模改造學區路型工程等 3E 綜合手段，在近年內成功大幅降低了行人死亡率。" },
    { id: 247, q: "都市計畫中若將「商業區」與「住宅區」完全用高牆及高速公路徹底隔絕，最有利於落實低碳步行的鄰里生活圈。", ans: "✕", exp: "過度絕對的土地分區與車行導向隔離會增加兩地間的通勤距離與機動車依賴。人本交通更支持混合使用（Mixed Use）與緊湊城市思維。" },
    { id: 248, q: "「大道至簡」的工程設計思維，提倡用簡明直觀的幾何導引（如實體島頭、明確標線）來降低駕駛人的大腦認知負荷，減少因判斷混亂造成的車禍。", ans: "○", exp: "過多、重疊且矛盾的交通告示與混亂標誌常造成駕駛人分心，簡約直觀的道路幾何工程設計才是上策。" },
    { id: 249, q: "在多車道路口，為了方便機動車輛以 60 公里以上的高速右轉，路口街角處應設計得越尖銳、人行道外推越多越好。", ans: "✕", exp: "人行道外推（街角擴大）的幾何效果是「窄化路口、縮減轉彎半徑」，其目的是「強迫轉彎車輛減速」，以保障穿越馬路行人的安全。" },
    { id: 250, q: "在推動安全街道改造時，「溝通」是極為關鍵的一環。不論是向店家說明停車格調整，或向居民宣導車道瘦身，皆需要充分的公眾參與。", ans: "○", exp: "街道改造往往涉及路側空間利益的調整（如免費臨停空間變人行道），積極與地方居民、店家溝通並建立共識是專案成功的基礎。" },
    { id: 251, q: "在進行無障礙人行道鋪面設計時，為了防止雨天滑倒，應該選擇具備適當防滑係數（BPN值）的材質，並確保鋪面平整度。", ans: "○", exp: "防滑性與平整度是無障礙人行道的基本工程品質要求，尤其對高齡者、輪椅族及盲人通行至關重要。" },
    { id: 252, q: "路側公共設施（如路燈桿、號誌桿、郵筒）只要其底座不超過人行道邊緣，就可以任意橫跨在人行道的正中央，不需保留連續通行淨寬。", ans: "✕", exp: "所有路側公共設施應盡量整合規劃在「設施帶」內，人行道必須保留符合法規規範的「徒步通行淨空間（淨寬度至少1.5米）」，且不得有任何障礙物橫阻。" },
    { id: 253, q: "完整街道（Complete Streets）的精髓在於因地制宜。一條服務社區的鄰里巷弄，其設計重點應在於約束車速與生活環境營造，而非追求車流高效率通過。", ans: "○", exp: "街道具備 Movement（流通）與 Place（場所）雙重屬性。鄰里生活巷弄的 Place 屬性高，設計應偏向交通寧靜化以保障生活品質。" },
    { id: 254, q: "「零死亡願景」（Vision Zero）認為，人類在交通系統中犯錯是不可避免的，因此系統設計者有責任打造一個能容許犯錯且不致致命的「容錯環境」。", ans: "○", exp: "Vision Zero 的核心立論在於承認人類非聖賢、孰能無過，道路與車輛安全系統應提供足夠防護緩衝，包容無心之錯。" },
    { id: 255, q: "台灣街道在戰後初期完全沒有任何發展，直到近年才突然引進人本交通概念，歷史上從未出現過對步行空間的法令規範。", ans: "✕", exp: "歷史文獻表明，台灣早在 1943 年《台灣都市計畫令》時期就有街道塑造與騎樓留設以利遮蔭步行的法令思維，並非近代才憑空出現。" },
    { id: 256, q: "大眾運輸系統（如捷運、BRT、輕軌）的成功營運，必須搭配高品質、無縫銜接的末端步行環境，才能徹底翻轉市民的運具使用習慣。", ans: "○", exp: "步行是大眾運輸的延伸與最後一哩路，若車站周邊人行道殘破、危險，會大幅降低民眾搭乘大眾運輸的意願。" },
    { id: 257, q: "在推行交通寧靜區時，將區域內的法定最高速限調降至 30 公里/小時，是各國保護住宅區或學區行人的常見作法。", ans: "○", exp: "速限 30 km/h 是行人不幸遭撞擊時致死率大幅下降的關鍵臨界速度，國際寧靜區多以此為速限標準。" },
    { id: 258, q: "「綠色基盤與街道韌性」理念認為，現代街道在滿足交通功能之餘，也應結合生態設計（如透水鋪面、雨水花園），以提升城市對氣候變遷的適應力。", ans: "○", exp: "街道佔都市公共空間極大比例，結合低影響開發（LID）工程能有效減緩都市熱島效應與暴雨積水危機。" },

// 從題庫中隨機挑選 50 題作為本次測驗
let selectedQuestions = [];
let userAnswers = {};

function initQuiz() {
    document.getElementById('total-pool-count').innerText = rawBank.length;
    
    // 洗牌演算法 (Shuffle) 隨機選出 50 題
    const shuffled = [...rawBank].sort(() => 0.5 - Math.random());
    selectedQuestions = shuffled.slice(0, 50);
    
    document.getElementById('quiz-count-info').innerText = `本次隨機抽考：${selectedQuestions.length} 題`;
    renderQuestions();
}

function renderQuestions() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    selectedQuestions.forEach((qItem, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${index}`;
        
        card.innerHTML = `
            <div class="question-text"><strong>第 ${index + 1} 題 (原題號:${qItem.id})：</strong>${qItem.q}</div>
            <div class="options">
                <button type="button" class="btn-option" id="opt-${index}-O" onclick="selectAnswer(${index}, '○')">⭕ 正確 (○)</button>
                <button type="button" class="btn-option" id="opt-${index}-X" onclick="selectAnswer(${index}, '✕')">❌ 錯誤 (✕)</button>
            </div>
            <div id="feedback-${index}"></div>
        `;
        container.appendChild(card);
    });
}

function selectAnswer(qIndex, choice) {
    // 若已交卷則鎖定不再允許更改答案
    if (document.getElementById('result-box').style.display === 'block') return;
    
    userAnswers[qIndex] = choice;
    
    document.getElementById(`opt-${qIndex}-O`).classList.remove('selected');
    document.getElementById(`opt-${qIndex}-X`).classList.remove('selected');
    
    const targetId = (choice === '○') ? `opt-${qIndex}-O` : `opt-${qIndex}-X`;
    document.getElementById(targetId).classList.add('selected');
}

function submitQuiz() {
    let unanswered = [];
    selectedQuestions.forEach((_, index) => {
        if (!userAnswers[index]) unanswered.push(index + 1);
    });
    
    if (unanswered.length > 0) {
        if (!confirm(`第 [${unanswered.join(', ')}] 題尚未回答，確定要直接提交嗎？`)) return;
    }
    
    let correctCount = 0;
    let wrongCount = 0;
    
    selectedQuestions.forEach((qItem, index) => {
        const userAns = userAnswers[index] || "未答";
        const isCorrect = (userAns === qItem.ans);
        
        if (isCorrect) correctCount++; else wrongCount++;
        
        const feedbackDiv = document.getElementById(`feedback-${index}`);
        const statusClass = isCorrect ? 'status-correct' : 'status-wrong';
        const statusText = isCorrect ? '✓ 回答正確' : '✕ 回答錯誤';
        
        feedbackDiv.innerHTML = `
            <div style="margin-top: 15px;">
                <span class="status-tag ${statusClass}">${statusText}</span>
                <div>您的答案：<span class="${isCorrect ? 'correct-ans-highlight' : 'wrong-ans-highlight'}">${userAns}</span></div>
                <div>正確答案：<span class="correct-ans-highlight">${qItem.ans}</span></div>
            </div>
            <div class="explanation">
                <strong>💡 題庫解析：</strong>${qItem.exp}
            </div>
        `;
        
        if (!isCorrect) {
            document.getElementById(`card-${index}`).style.backgroundColor = '#fff5f5';
        } else {
            document.getElementById(`card-${index}`).style.backgroundColor = '#f0fdf4';
        }
    });
    
    document.getElementById('correct-count').innerText = correctCount;
    document.getElementById('wrong-count').innerText = wrongCount;
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = initQuiz;
</script>

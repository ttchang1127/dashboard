、③"}];

let userAnswers = {};
let showExplanations = false;
let currentFilter = 'all';

function buildQuiz(questions) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.id;
    card.dataset.tag = q.tag;
    const tagLabel = TAG_LABELS[q.tag] || q.tag;
    const isMulti = q.is_multi;
    const inputType = isMulti ? 'checkbox' : 'radio';
    const keys = ['①','②','③','④'];

    const optsHtml = q.opts.map((opt, i) => {
      return '<div class="option-label" id="opt-' + q.id + '-' + i + '" onclick="handleSelect(event,' + q.id + ',' + i + ')">' +
        '<span class="opt-key">' + keys[i] + '</span>' +
        '<span>' + opt + '</span></div>';
    }).join('');

    const multiBtn = isMulti
      ? '<div class="multi-submit" id="msbtn-' + q.id + '"><button onclick="submitMulti(' + q.id + ')">確認作答</button></div>'
      : '';
    const delBadge = q.is_deleted ? '<span class="q-deleted">本題刪題</span>' : '';
    const multiBadge = isMulti ? '<span class="q-multi">複選</span>' : '';

    card.innerHTML =
      '<div class="q-header">' +
        '<span class="q-num">Q ' + q.id + '</span>' +
        '<span class="q-tag">' + tagLabel + '</span>' +
        delBadge + multiBadge +
      '</div>' +
      '<div class="q-text">' + q.q + '</div>' +
      '<div class="options">' + optsHtml + '</div>' +
      multiBtn +
      '<div class="explanation" id="exp-' + q.id + '">💡 ' + q.exp + '</div>';

    if (userAnswers[q.id] !== undefined) restoreAnswer(q, card);
    container.appendChild(card);
  });
}

function handleSelect(event, qid, optIdx) {
  const q = QUESTIONS.find(x => x.id === qid);
  if (!q) return;
  if (userAnswers[qid] !== undefined) { event.preventDefault(); return; }
  if (!q.is_multi) {
    selectSingle(qid, optIdx);
  } else {
    const lbl = document.getElementById('opt-' + qid + '-' + optIdx);
    lbl.classList.toggle('selected');
  }
}

function selectSingle(qid, optIdx) {
  const q = QUESTIONS.find(x => x.id === qid);
  userAnswers[qid] = optIdx;
  const correct = q.ans;
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById('opt-' + qid + '-' + i);
    if (i === optIdx) lbl.classList.add(optIdx === correct ? 'correct-answer' : 'wrong-answer', 'selected');
    if (i === correct && optIdx !== correct) lbl.classList.add('correct-answer');
  }
  document.getElementById('card-' + qid).classList.add(optIdx === correct ? 'answered-correct' : 'answered-wrong');
  if (showExplanations) document.getElementById('exp-' + qid).classList.add('show');
  updateScore(); updateProgress();
}

function submitMulti(qid) {
  if (userAnswers[qid] !== undefined) return;
  const q = QUESTIONS.find(x => x.id === qid);
  const selected = [];
  for (let i = 0; i < q.opts.length; i++) {
    if (document.getElementById('opt-' + qid + '-' + i).classList.contains('selected')) selected.push(i);
  }
  if (selected.length === 0) { alert('請先選擇答案'); return; }
  userAnswers[qid] = selected;
  const correct = Array.isArray(q.ans) ? q.ans : [q.ans];
  const isAllCorrect = selected.length === correct.length && selected.every(s => correct.includes(s));
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById('opt-' + qid + '-' + i);
    const isC = correct.includes(i), isS = selected.includes(i);
    if (isS && isC) lbl.classList.add('correct-answer', 'selected');
    else if (isS && !isC) lbl.classList.add('wrong-answer', 'selected');
    else if (!isS && isC) lbl.classList.add('missed-answer');
  }
  document.getElementById('card-' + qid).classList.add(isAllCorrect ? 'answered-correct' : 'answered-wrong');
  const btn = document.getElementById('msbtn-' + qid);
  if (btn) btn.style.display = 'none';
  if (showExplanations) document.getElementById('exp-' + qid).classList.add('show');
  updateScore(); updateProgress();
}

function restoreAnswer(q, card) {
  const ans = userAnswers[q.id];
  if (!q.is_multi) {
    const correct = q.ans;
    for (let i = 0; i < q.opts.length; i++) {
      const lbl = document.getElementById('opt-' + q.id + '-' + i);
      if (!lbl) continue;
      if (i === ans) lbl.classList.add(ans === correct ? 'correct-answer' : 'wrong-answer', 'selected');
      if (i === correct && ans !== correct) lbl.classList.add('correct-answer');
    }
    card.classList.add(ans === correct ? 'answered-correct' : 'answered-wrong');
  } else {
    const selected = Array.isArray(ans) ? ans : [ans];
    const correct = Array.isArray(q.ans) ? q.ans : [q.ans];
    const isAllCorrect = selected.length === correct.length && selected.every(s => correct.includes(s));
    for (let i = 0; i < q.opts.length; i++) {
      const lbl = document.getElementById('opt-' + q.id + '-' + i);
      if (!lbl) continue;
      const isC = correct.includes(i), isS = selected.includes(i);
      if (isS && isC) lbl.classList.add('correct-answer', 'selected');
      else if (isS && !isC) lbl.classList.add('wrong-answer', 'selected');
      else if (!isS && isC) lbl.classList.add('missed-answer');
    }
    card.classList.add(isAllCorrect ? 'answered-correct' : 'answered-wrong');
    const btn = document.getElementById('msbtn-' + q.id);
    if (btn) btn.style.display = 'none';
  }
}

function isCorrectAnswer(q) {
  const ans = userAnswers[q.id];
  if (ans === undefined) return false;
  if (!q.is_multi) return ans === q.ans;
  const sel = Array.isArray(ans) ? ans : [ans];
  const cor = Array.isArray(q.ans) ? q.ans : [q.ans];
  return sel.length === cor.length && sel.every(s => cor.includes(s));
}

function getVisibleQuestions() {
  return currentFilter === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.tag === currentFilter);
}

function updateScore() {
  const vis = getVisibleQuestions();
  const answered = vis.filter(q => userAnswers[q.id] !== undefined).length;
  const correct = vis.filter(q => isCorrectAnswer(q)).length;
  const wrong = answered - correct;
  const rate = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-rate').textContent = answered > 0 ? rate + '%' : '—';
}

function updateProgress() {
  const vis = getVisibleQuestions();
  const answered = vis.filter(q => userAnswers[q.id] !== undefined).length;
  document.getElementById('progress-fill').style.width = (answered / Math.max(vis.length, 1) * 100) + '%';
}

function showResult() {
  const allQ = getVisibleQuestions();
  const answered = allQ.filter(q => userAnswers[q.id] !== undefined).length;
  const correct = allQ.filter(q => isCorrectAnswer(q)).length;
  const score = Math.round(correct / allQ.length * 100);
  document.getElementById('modal-score-num').textContent = score;
  document.getElementById('modal-detail').textContent =
    '共 ' + allQ.length + ' 題，已作答 ' + answered + ' 題，答對 ' + correct + ' 題，答錯 ' + (answered - correct) + ' 題';
  let grade = '';
  if (answered < allQ.length) grade = '⚠️ 尚有 ' + (allQ.length - answered) + ' 題未作答';
  else if (score >= 90) grade = '🏆 優異！知識掌握精熟';
  else if (score >= 80) grade = '✅ 良好！建議複習錯題';
  else if (score >= 70) grade = '📖 及格！仍有進步空間';
  else grade = '❌ 需加強！建議重新研讀';
  document.getElementById('modal-grade').textContent = grade;
  document.getElementById('result-modal').classList.add('show');
}

function resetAll() {
  userAnswers = {};
  buildQuiz(getVisibleQuestions());
  updateScore(); updateProgress();
  document.getElementById('hidden-count').textContent = '';
  showExplanations = false;
}

function toggleExplanations() {
  showExplanations = !showExplanations;
  document.querySelectorAll('.explanation').forEach(el => {
    const qid = parseInt(el.id.replace('exp-', ''));
    if (userAnswers[qid] !== undefined)
      showExplanations ? el.classList.add('show') : el.classList.remove('show');
  });
}

function filterTag(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildQuiz(getVisibleQuestions());
  const vis = getVisibleQuestions();
  const hidden = TOTAL - vis.length;
  document.getElementById('hidden-count').textContent =
    tag !== 'all' ? '目前顯示 ' + vis.length + ' 題（隱藏 ' + hidden + ' 題）' : '';
  updateScore(); updateProgress();
}

function showOnlyWrong() {
  const wrongIds = QUESTIONS.filter(q => {
    return userAnswers[q.id] !== undefined && !isCorrectAnswer(q);
  }).map(q => q.id);
  if (wrongIds.length === 0) { alert('目前沒有錯題！'); return; }
  buildQuiz(QUESTIONS.filter(q => wrongIds.includes(q.id)));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('hidden-count').textContent = '顯示 ' + wrongIds.length + ' 道錯題';
}

buildQuiz(QUESTIONS);
updateScore();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人行道工程施工規範題庫</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --card: #2e2e2e;
    --border: #3a3a3a;
    --accent: #d4a04a;
    --accent-light: #e8bf7a;
    --text: #e8e4dc;
    --text-dim: #9a9690;
    --correct: #4caf7a;
    --wrong: #e05555;
    --correct-bg: rgba(76,175,122,0.12);
    --wrong-bg: rgba(224,85,85,0.12);
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2418 100%);
    border-bottom: 2px solid var(--accent);
    padding: 32px 24px 28px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 26px);
    font-weight: normal;
    letter-spacing: 0.06em;
    color: var(--accent-light);
    margin-bottom: 6px;
  }
  header p { color: var(--text-dim); font-size: 13px; letter-spacing: 0.04em; }
  #scoreboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 97px;
    z-index: 99;
  }
  .score-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .score-chip span { font-weight: bold; color: var(--accent); }
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px 8px;
  }
  button {
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px 20px;
    transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #1a1200; font-weight: bold; }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  #filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 24px 12px;
    justify-content: center;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 14px;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: bold; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  #quiz-container { max-width: 900px; margin: 0 auto; padding: 12px 20px 60px; }
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong   { border-color: var(--wrong); }
  .q-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .q-num { font-size: 11px; color: var(--accent); font-weight: bold; letter-spacing: 0.08em; min-width: 38px; }
  .q-tag {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border-radius: 10px;
    padding: 1px 8px;
    border: 1px solid var(--border);
  }
  .q-text { padding: 12px 18px 4px; font-size: 14.5px; line-height: 1.65; }
  .options { padding: 8px 14px 14px; display: grid; gap: 6px; }
  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1.55;
  }
  .option-label:hover { background: rgba(212,160,74,0.07); border-color: rgba(212,160,74,0.3); }
  .option-label input[type=radio] { display: none; }
  .opt-key {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .option-label.selected .opt-key { background: var(--accent); border-color: var(--accent); color: #1a1200; }
  .option-label.correct-answer { background: var(--correct-bg); border-color: var(--correct); }
  .option-label.correct-answer .opt-key { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option-label.wrong-answer { background: var(--wrong-bg); border-color: var(--wrong); }
  .option-label.wrong-answer .opt-key { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .explanation {
    display: none;
    margin: 2px 14px 14px;
    padding: 10px 14px;
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .explanation.show { display: block; }
  #progress-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 6px; }
  #progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
    width: 0;
    transition: width 0.4s ease;
  }
  #result-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #result-modal.show { display: flex; }
  .modal-box {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 36px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }
  .modal-box h2 { font-family: var(--font-display); color: var(--accent-light); font-size: 22px; margin-bottom: 16px; }
  .modal-score { font-size: 56px; font-weight: bold; color: var(--accent); line-height: 1; margin: 16px 0; }
  .modal-detail { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .modal-grade { font-size: 15px; margin: 8px 0 24px; font-weight: bold; }
  #hidden-count {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px 16px 14px;
    max-width: 900px;
    margin: 0 auto;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>⬛ 人行道工程施工規範題庫</h1>
  <p>桃工規 02752 · 02753 · 02770 · 02778 · 02779 · 02781 · 02786 · 03050 · 03110 · 03220 · 03310 ｜ 共 100 題</p>
</header>

<div id="scoreboard">
  <div class="score-chip">作答 <span id="s-answered">0</span> / 100</div>
  <div class="score-chip">正確 <span id="s-correct">0</span></div>
  <div class="score-chip">錯誤 <span id="s-wrong">0</span></div>
  <div class="score-chip">正確率 <span id="s-rate">—</span></div>
</div>

<div id="controls">
  <button class="btn-primary" onclick="showResult()">📊 查看成績</button>
  <button class="btn-outline" onclick="resetAll()">🔄 重新作答</button>
  <button class="btn-outline" onclick="toggleExplanations()">💡 顯示解析</button>
  <button class="btn-outline" onclick="showOnlyWrong()">❌ 只看錯題</button>
</div>

<div id="filter-bar">
  <button class="filter-btn active" onclick="filterTag('all',this)">全部 (100)</button>
  <button class="filter-btn" onclick="filterTag('03310',this)">03310 結構混凝土</button>
  <button class="filter-btn" onclick="filterTag('03050',this)">03050 混凝土基本材料</button>
  <button class="filter-btn" onclick="filterTag('03110',this)">03110 混凝土模板</button>
  <button class="filter-btn" onclick="filterTag('03220',this)">03220 銲接鋼線網</button>
  <button class="filter-btn" onclick="filterTag('02781',this)">02781 人行道更新</button>
  <button class="filter-btn" onclick="filterTag('02779',this)">02779 人行道底層</button>
  <button class="filter-btn" onclick="filterTag('02778',this)">02778 人行道面層</button>
  <button class="filter-btn" onclick="filterTag('02770',this)">02770 緣石及緣石側溝</button>
  <button class="filter-btn" onclick="filterTag('02786',this)">02786 高壓混凝土地磚</button>
  <button class="filter-btn" onclick="filterTag('02752',this)">02752 壓花地坪</button>
  <button class="filter-btn" onclick="filterTag('02753',this)">02753 噴花地坪</button>
</div>

<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="hidden-count"></div>
<div id="quiz-container"></div>

<div id="result-modal">
  <div class="modal-box">
    <h2>測驗結果</h2>
    <div class="modal-score" id="modal-score-num">0</div>
    <div style="color:var(--text-dim);font-size:13px;">分（滿分 100 分）</div>
    <div class="modal-detail" id="modal-detail"></div>
    <div class="modal-grade" id="modal-grade"></div>
    <button class="btn-primary" onclick="document.getElementById('result-modal').classList.remove('show')" style="width:100%;padding:10px">關閉</button>
    <br><br>
    <button class="btn-outline" onclick="resetAll();document.getElementById('result-modal').classList.remove('show')" style="width:100%;padding:10px">重新作答</button>
  </div>
</div>

<script>
const TOTAL = 100;
const TAG_LABELS = {
  '03310': '03310 結構混凝土',

  '03110': '03110 混凝土模板',
  '03220': '03220 銲接鋼線網',

const QUESTIONS = [
  // ===== 03310 結構用混凝土 (18題) =====

  {

    opts: ['A. 30分鐘', 'B. 45分鐘', 'C. 60分鐘', 'D. 90分鐘'],

    exp: '第03310章第3.3.1(4)款：巨積混凝土澆置每層厚度為20～50cm。'

  {

    tag: '03310',

    exp: '第03310章第3.3.3款：周圍氣溫為5℃且繼續下降時，應採取加溫或模板隔熱等保護措施。'

    opts: ['A. 3 kgf/cm²', 'B. 5 kgf/cm²', 'C. 7 kgf/cm²', 'D. 10 kgf/cm²'],
    ans: 1,
    exp: '第02753章第2.1.1款：接著劑以適當比例調合水性樹脂與水，其黏著強度依CNS 8082規定應≧5 kgf/cm²。'
  },
  {
    id: 100,
    tag: '02753',
    q: '依第02753章規定，噴花地坪封面劑之附著性（方格法）檢測幾點無剝落為合格標準？',
    opts: ['A. 5點', 'B. 8點', 'C. 10點', 'D. 12點'],
    ans: 2,
    exp: '第02753章第2.1.3款：封面劑（油性壓克力樹脂）其附著性：依CNS 10757方格法檢測10點無剝落。'
  }
];

let userAnswers = {};
let showExplanations = false;
let currentFilter = 'all';

function buildQuiz(questions) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.id}`;
    card.dataset.tag = q.tag;
    const tagLabel = TAG_LABELS[q.tag] || q.tag;
    const optsHtml = q.opts.map((opt, i) => {
      const key = ['A','B','C','D'][i];
      const txt = opt.replace(/^[A-D]\.\s*/, '');
      return `<label class="option-label" id="opt-${q.id}-${i}" onclick="selectAnswer(${q.id}, ${i})">
        <input type="radio" name="q${q.id}" value="${i}">
        <span class="opt-key">${key}</span>
        <span>${txt}</span>
      </label>`;
    }).join('');
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q ${q.id}</span>
        <span class="q-tag">${tagLabel}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div class="explanation" id="exp-${q.id}">💡 ${q.exp}</div>
    `;
    if (userAnswers[q.id] !== undefined) restoreAnswer(q, card);
    container.appendChild(card);
  });
}

function selectAnswer(qid, optIdx) {
  if (userAnswers[qid] !== undefined) return;
  const q = QUESTIONS.find(x => x.id === qid);
  userAnswers[qid] = optIdx;
  const card = document.getElementById(`card-${qid}`);
  const correct = q.ans;
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById(`opt-${qid}-${i}`);
    if (i === optIdx) lbl.classList.add(optIdx === correct ? 'correct-answer' : 'wrong-answer', 'selected');
    if (i === correct && optIdx !== correct) lbl.classList.add('correct-answer');
  }
  card.classList.add(optIdx === correct ? 'answered-correct' : 'answered-wrong');
  if (showExplanations) document.getElementById(`exp-${qid}`).classList.add('show');
  updateScore();
  updateProgress();
}

function restoreAnswer(q, card) {
  const optIdx = userAnswers[q.id];
  const correct = q.ans;
  for (let i = 0; i < q.opts.length; i++) {
    const lbl = document.getElementById(`opt-${q.id}-${i}`);
    if (!lbl) continue;
    if (i === optIdx) lbl.classList.add(optIdx === correct ? 'correct-answer' : 'wrong-answer', 'selected');
    if (i === correct && optIdx !== correct) lbl.classList.add('correct-answer');
  }
  card.classList.add(optIdx === correct ? 'answered-correct' : 'answered-wrong');
}

function updateScore() {
  const answered = Object.keys(userAnswers).length;
  const correct = Object.entries(userAnswers).filter(([id, ans]) => {
    const q = QUESTIONS.find(x => x.id === parseInt(id));
    return q && q.ans === ans;
  }).length;
  const wrong = answered - correct;
  const rate = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-rate').textContent = answered > 0 ? rate + '%' : '—';
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('progress-fill').style.width = (answered / TOTAL * 100) + '%';
}

function showResult() {
  const answered = Object.keys(userAnswers).length;
  const correct = Object.entries(userAnswers).filter(([id, ans]) => {
    const q = QUESTIONS.find(x => x.id === parseInt(id));
    return q && q.ans === ans;
  }).length;
  const score = Math.round(correct / TOTAL * 100);
  document.getElementById('modal-score-num').textContent = score;
  document.getElementById('modal-detail').textContent =
    `共作答 ${answered} 題，答對 ${correct} 題，答錯 ${answered - correct} 題`;
  let grade = '';
  if (answered < TOTAL) grade = '⚠️ 尚有 ' + (TOTAL - answered) + ' 題未作答';
  else if (score >= 90) grade = '🏆 優異！知識掌握精熟';
  else if (score >= 80) grade = '✅ 良好！建議複習錯題';
  else if (score >= 70) grade = '📖 及格！仍有進步空間';
  else grade = '❌ 需加強！建議重新研讀規範';
  document.getElementById('modal-grade').textContent = grade;
  document.getElementById('result-modal').classList.add('show');
}

function resetAll() {
  userAnswers = {};
  buildQuiz(filterQuestions(currentFilter));
  updateScore();
  updateProgress();
  document.getElementById('hidden-count').textContent = '';
  showExplanations = false;
}

function toggleExplanations() {
  showExplanations = !showExplanations;
  document.querySelectorAll('.explanation').forEach(el => {
    const qid = parseInt(el.id.replace('exp-', ''));
    if (userAnswers[qid] !== undefined)
      showExplanations ? el.classList.add('show') : el.classList.remove('show');
  });
}

function filterQuestions(tag) {
  return tag === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.tag === tag);
}

function filterTag(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = filterQuestions(tag);
  buildQuiz(filtered);
  const hidden = TOTAL - filtered.length;
  document.getElementById('hidden-count').textContent =
    tag !== 'all' ? `目前顯示 ${filtered.length} 題（共隱藏 ${hidden} 題）` : '';
}

function showOnlyWrong() {
  const wrongIds = Object.entries(userAnswers)
    .filter(([id, ans]) => {
      const q = QUESTIONS.find(x => x.id === parseInt(id));
      return q && q.ans !== ans;
    }).map(([id]) => parseInt(id));
  if (wrongIds.length === 0) { alert('目前沒有錯題！'); return; }
  buildQuiz(QUESTIONS.filter(q => wrongIds.includes(q.id)));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('hidden-count').textContent = `顯示 ${wrongIds.length} 道錯題`;
}

buildQuiz(QUESTIONS);
updateScore();
</script>
</body>
</html>

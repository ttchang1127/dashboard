
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃辦新北辦3個月的週工作追蹤頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3efe7;
            --panel: #fffdf8;
            --ink: #1f2937;
            --line: #e7ddcf;
            --teal: #1f766e;
        }
        body {
            font-family: "DM Sans", "Noto Sans TC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(201, 111, 59, 0.12), transparent 30%),
                radial-gradient(circle at right 20%, rgba(31, 118, 110, 0.12), transparent 24%),
                linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
            color: var(--ink);
        }
        .panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,253,248,0.96));
            border: 1px solid var(--line);
            box-shadow: 0 12px 36px rgba(98, 72, 44, 0.08);
        }
        .pill {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 9999px;
            padding: 0.25rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }
        .summary-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.98), rgba(248,241,231,0.95));
            border: 1px solid var(--line);
        }
        .task-chip-design { background: #efe4ff; color: #6b21a8; }
        .task-chip-supervision { background: #dff7f4; color: #0f766e; }
        .task-chip-docs { background: #fff3da; color: #9a6700; }
        .task-chip-meeting { background: #ffe1da; color: #c2410c; }
        .task-chip-safety { background: #e7f2dd; color: #3f6212; }
        .task-chip-other { background: #eceff3; color: #475569; }
        .project-link {
            color: var(--teal);
            font-weight: 700;
        }
        .project-link:hover {
            color: #14534d;
        }
        .week-option input:checked + span {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="panel rounded-[28px] p-6 lg:p-8">
            <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
                <div class="space-y-3">
                    <p class="text-sm font-semibold tracking-[0.2em] uppercase text-stone-500">Taoyuan Weekly Workboard</p>
                    <div>
                        <h1 class="text-3xl lg:text-5xl font-bold leading-tight">桃辦週工作追蹤頁</h1>
                        <p class="mt-2 text-stone-500">Google Sheet 自動更新。</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 lg:min-w-[360px]">
                    <div class="summary-card rounded-2xl p-4">
                        <p class="text-xs text-stone-500">資料來源</p>
                        <p class="mt-1 text-lg font-bold">Google Sheet 工作表6</p>
                    </div>
                    <div class="summary-card rounded-2xl p-4">
                        <p class="text-xs text-stone-500">辦公室</p>
                        <p class="mt-1 text-lg font-bold">桃園辦 5 組</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="panel rounded-[28px] p-5 lg:p-6 space-y-5">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                <div class="lg:col-span-2">
                    <div class="mb-2 flex items-center justify-between gap-2">
                        <label class="block text-sm font-semibold text-stone-600">週次</label>
                        <div class="flex gap-3 text-xs font-semibold text-stone-500">
                            <button id="selectAllWeeksBtn" class="hover:text-stone-700">全選</button>
                            <button id="clearWeeksBtn" class="hover:text-stone-700">清空</button>
                        </div>
                    </div>
                    <div id="weekFilter" class="flex min-h-[56px] flex-wrap gap-2 rounded-2xl border border-stone-300 bg-white px-3 py-3"></div>
                </div>
                <div>
                    <label for="groupFilter" class="block text-sm font-semibold mb-2 text-stone-600">組別</label>
                    <select id="groupFilter" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-orange-300">
                        <option value="全部">全部組別</option>
                    </select>
                </div>
                <div>
                    <label for="searchInput" class="block text-sm font-semibold mb-2 text-stone-600">搜尋</label>
                    <input id="searchInput" type="text" placeholder="搜尋人名、案號、關鍵字" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-orange-300">
                </div>
                <div class="flex items-end">
                    <button id="resetBtn" class="w-full rounded-2xl border border-stone-300 bg-stone-100 px-4 py-3 font-semibold text-stone-700 hover:bg-stone-200">重設篩選</button>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3" id="topStats"></div>
            <p id="dataMeta" class="text-xs text-stone-500"></p>

            <div class="flex flex-wrap gap-3" id="tabBar">
                <button class="tab-btn active rounded-full border border-stone-300 px-4 py-2 text-sm font-semibold transition" data-tab="overview">總覽</button>
                <button class="tab-btn rounded-full border border-stone-300 px-4 py-2 text-sm font-semibold transition" data-tab="groups">以組看</button>
                <button class="tab-btn rounded-full border border-stone-300 px-4 py-2 text-sm font-semibold transition" data-tab="people">以人看</button>
                <button class="tab-btn rounded-full border border-stone-300 px-4 py-2 text-sm font-semibold transition" data-tab="projects">以案看</button>
            </div>
        </section>

        <main id="mainContent" class="space-y-6">
            <div class="panel rounded-[24px] p-6 text-stone-500">資料載入中...</div>
        </main>
    </div>

    <script src="./taoyuan_weekly_dashboard.js"></script>
</body>
</html>

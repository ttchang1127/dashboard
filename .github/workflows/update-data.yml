name: Update Dashboard Data

permissions:
  contents: write

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PA_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch data from Google Sheets and save to JSON
        run: |
          set -e
          node -e "
            const https = require('https');
            const fs = require('fs');

            const SPREADSHEET_ID = '1GjhgGAUuI5g6rtOGiUceMLgeGy12sp93fNQlWKM-UGc';
            const API_KEY = process.env.GOOGLE_API_KEY;

            const PERSONNEL_SHEET    = { name: '工作表3', range: 'E1:K200',  file: 'personnelData.json' };
            const PERFORMANCE_SHEET_114 = { name: '工作表2', range: 'B5:G6',   file: 'performanceData.json' };
            const PERFORMANCE_SHEET_115 = { name: '工作表2', range: 'B14:G16', file: '115performanceData.json' };

            if (!API_KEY) {
              console.error('錯誤: 找不到 GOOGLE_API_KEY secret！');
              process.exit(1);
            }

            function fetchSheetData(sheetName, range) {
              return new Promise((resolve, reject) => {
                const url = \`https://sheets.googleapis.com/v4/spreadsheets/\${SPREADSHEET_ID}/values/\${encodeURIComponent(sheetName)}!\${range}?key=\${API_KEY}\`;
                https.get(url, (res) => {
                  res.setEncoding('utf8');
                  let rawData = '';
                  res.on('data', (chunk) => { rawData += chunk; });
                  res.on('end', () => {
                    try {
                      const parsed = JSON.parse(rawData);
                      if (parsed.values) {
                        resolve(parsed.values);
                      } else {
                        const errorMsg = parsed.error ? JSON.stringify(parsed.error) : '在工作表回應中找不到 values 欄位。';
                        reject(new Error(errorMsg));
                      }
                    } catch (e) { reject(e); }
                  });
                }).on('error', (e) => reject(e));
              });
            }

            function processPersonnelData(values) {
              const headerMapping = {
                '姓名': 'name',
                '組別': 'group',
                '職稱': 'role',
                '學歷': 'education',
                '證照': 'certificates',
                '年資': 'seniority'
              };
              const headers = values[0];
              const dataRows = values.slice(1);

              const personnel = dataRows.map(row => {
                const person = {};
                headers.forEach((header, index) => {
                  const englishKey = headerMapping[header];
                  if (englishKey) {
                    const value = row[index] || '';
                    if (englishKey === 'certificates') {
                      person[englishKey] = value
                        .split(/[,、，\s]+/)
                        .filter(cert => cert.trim() !== '' && cert.trim() !== '#N/A')
                        .map(certName => ({ name: certName.trim(), number: '' }));
                    } else {
                      person[englishKey] = value.trim();
                    }
                  }
                });
                return person;
              }).filter(p => p.name);

              fs.writeFileSync(PERSONNEL_SHEET.file, JSON.stringify(personnel, null, 2), 'utf8');
              console.log(\`✅ 成功擷取資料並寫入 \${PERSONNEL_SHEET.file}\`);
            }

            function processPerformanceData(sheetConfig, values) {
              fs.writeFileSync(sheetConfig.file, JSON.stringify(values, null, 2), 'utf8');
              console.log(\`✅ 成功擷取資料並寫入 \${sheetConfig.file}\`);
            }

            async function main() {
              console.log('🚀 開始從 Google Sheets 更新資料...');
              try {
                const [personnelValues, perf114Values, perf115Values] = await Promise.all([
                  fetchSheetData(PERSONNEL_SHEET.name,       PERSONNEL_SHEET.range),
                  fetchSheetData(PERFORMANCE_SHEET_114.name, PERFORMANCE_SHEET_114.range),
                  fetchSheetData(PERFORMANCE_SHEET_115.name, PERFORMANCE_SHEET_115.range)
                ]);

                processPersonnelData(personnelValues);
                processPerformanceData(PERFORMANCE_SHEET_114, perf114Values);
                processPerformanceData(PERFORMANCE_SHEET_115, perf115Values);

                console.log('✨ 所有資料更新完成！');
              } catch (error) {
                console.error('❌ 更新過程中發生錯誤:', error);
                process.exit(1);
              }
            }

            main();
          "
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Commit and push if there are changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "資料無變動，無需推送。"
            exit 0
          fi

          echo "偵測到資料變動，暫存本地變更..."
          git stash

          echo "與遠端同步..."
          git pull --rebase

          if git stash list | grep -q 'stash@{0}'; then
            echo "重新套用本地變更..."
            git stash pop
          fi

          if [ -z "$(git status --porcelain)" ]; then
            echo "與遠端同步後，發現資料內容無差異，無需推送。"
            exit 0
          fi

          echo "提交並推送最終變更..."
          # ✅ 修正：改用萬用字元，確保所有 JSON 都被追蹤
          git add *.json
          git commit -m "chore: 自動更新儀表板資料"
          git push

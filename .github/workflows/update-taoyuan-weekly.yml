name: Update Taoyuan Weekly Dashboard

permissions:
  contents: write

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  update-weekly-dash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PA_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update taoyuan weekly data
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python weekly-dash/update_taoyuan_weekly.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- weekly-dash/taoyuan_weekly_data.json; then
            echo "weekly dashboard data unchanged"
            exit 0
          fi

          git add weekly-dash/taoyuan_weekly_data.json
          git commit -m "chore: update taoyuan weekly dashboard data"
          git push origin main
